   <g id="text_1">
    <text style="font-weight: 700; font-size: 26px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #111111" x="457.2" y="55.503938" transform="rotate(-0 457.2 55.503938)">Positive vs. Negative Symptoms of Schizophrenia</text>
   </g>
   <g id="text_2">
    <text style="font-weight: 700; font-size: 24px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #ffffff" x="117.936" y="124.6989" transform="rotate(-0 117.936 124.6989)">+</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 28px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #ffffff" x="519.696" y="125.80265" transform="rotate(-0 519.696 125.80265)">–</text>
   </g>
   <g id="text_4">
    <text style="font-weight: 700; font-size: 16px; font-family: 'DejaVu Sans'" transform="translate(184.3995 113.47065)">Positive symptoms</text>
    <text style="font-weight: 700; font-size: 16px; font-family: 'DejaVu Sans'" transform="translate(177.13325 131.51215)">(experiences added)</text>
   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 16px; font-family: 'DejaVu Sans'" transform="translate(590.705 113.47065)">Negative symptoms</text>
    <text style="font-weight: 700; font-size: 16px; font-family: 'DejaVu Sans'" transform="translate(588.11 131.51215)">(capacities reduced)</text>
   </g>
   <g id="text_6">
    <text style="font-size: 16px; font-family: 'DejaVu Sans'; text-anchor: start" x="117.936" y="194.8406" transform="rotate(-0 117.936 194.8406)">• Hallucinations</text>
   </g>
   <g id="text_7">
    <text style="font-size: 16px; font-family: 'DejaVu Sans'; text-anchor: start" x="117.936" y="239.747" transform="rotate(-0 117.936 239.747)">• Delusions</text>
   </g>
   <g id="text_8">
    <text style="font-size: 16px; font-family: 'DejaVu Sans'; text-anchor: start" x="117.936" y="284.6534" transform="rotate(-0 117.936 284.6534)">• Disorganized speech</text>
   </g>
   <g id="text_9">
    <text style="font-size: 16px; font-family: 'DejaVu Sans'; text-anchor: start" x="117.936" y="329.5598" transform="rotate(-0 117.936 329.5598)">• Disorganized behavior</text>
   </g>
   <g id="text_10">
    <text style="font-size: 16px; font-family: 'DejaVu Sans'; text-anchor: start" x="519.696" y="194.8406" transform="rotate(-0 519.696 194.8406)">• Flat affect</text>
   </g>
   <g id="text_11">
    <text style="font-size: 16px; font-family: 'DejaVu Sans'; text-anchor: start" x="519.696" y="234.7574" transform="rotate(-0 519.696 234.7574)">• Alogia (reduced speech)</text>
   </g>
   <g id="text_12">
    <text style="font-size: 16px; font-family: 'DejaVu Sans'; text-anchor: start" x="519.696" y="274.6742" transform="rotate(-0 519.696 274.6742)">• Avolition (reduced motivation)</text>
   </g>
   <g id="text_13">
    <text style="font-size: 16px; font-family: 'DejaVu Sans'; text-anchor: start" x="519.696" y="314.591" transform="rotate(-0 519.696 314.591)">• Anhedonia</text>
   </g>
   <g id="text_14">
    <text style="font-size: 16px; font-family: 'DejaVu Sans'; text-anchor: start" x="519.696" y="354.5078" transform="rotate(-0 519.696 354.5078)">• Social withdrawal</text>
   </g>
   <g id="text_15">
    <text style="font-size: 14px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #111111" x="457.2" y="456.242725" transform="rotate(-0 457.2 456.242725)">Positive symptoms often respond better to antipsychotic medication; negative symptoms are usually harder to treat.</text>
   </g>
