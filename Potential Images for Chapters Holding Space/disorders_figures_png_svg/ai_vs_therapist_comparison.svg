   <g id="text_1">
    <text style="font-weight: 700; font-size: 26px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #111111" x="457.2" y="55.503938" transform="rotate(-0 457.2 55.503938)">Same Surface, Different Function</text>
   </g>
   <g id="text_2">
    <text style="font-weight: 700; font-size: 18px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #1c4b83" x="247.392" y="130.527675" transform="rotate(-0 247.392 130.527675)">AI mental-health chatbot</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 18px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #255d2c" x="667.008" y="130.527675" transform="rotate(-0 667.008 130.527675)">Licensed therapist</text>
   </g>
   <g id="text_4">
    <text style="font-size: 14.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="82.224" y="189.354313" transform="rotate(-0 82.224 189.354313)">• Generates therapy-shaped language</text>
   </g>
   <g id="text_5">
    <text style="font-size: 14.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="82.224" y="224.281513" transform="rotate(-0 82.224 224.281513)">• May be available 24/7</text>
   </g>
   <g id="text_6">
    <text style="font-size: 14.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="82.224" y="259.208713" transform="rotate(-0 82.224 259.208713)">• Limited clinical continuity</text>
   </g>
   <g id="text_7">
    <text style="font-size: 14.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="82.224" y="294.135913" transform="rotate(-0 82.224 294.135913)">• No reliable nonverbal monitoring</text>
   </g>
   <g id="text_8">
    <text style="font-size: 14.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="82.224" y="329.063113" transform="rotate(-0 82.224 329.063113)">• No clinical accountability</text>
   </g>
   <g id="text_9">
    <text style="font-size: 14.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="82.224" y="363.990313" transform="rotate(-0 82.224 363.990313)">• No therapist-client privilege</text>
   </g>
   <g id="text_10">
    <text style="font-size: 14.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="82.224" y="398.917513" transform="rotate(-0 82.224 398.917513)">• Not a crisis-response system</text>
   </g>
   <g id="text_11">
    <text style="font-size: 14.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="501.84" y="189.354313" transform="rotate(-0 501.84 189.354313)">• Builds longitudinal relationship</text>
   </g>
   <g id="text_12">
    <text style="font-size: 14.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="501.84" y="224.281513" transform="rotate(-0 501.84 224.281513)">• Reads nonverbal cues</text>
   </g>
   <g id="text_13">
    <text style="font-size: 14.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="501.84" y="259.208713" transform="rotate(-0 501.84 259.208713)">• Conducts risk assessment</text>
   </g>
   <g id="text_14">
    <text style="font-size: 14.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="501.84" y="294.135913" transform="rotate(-0 501.84 294.135913)">• Makes referrals</text>
   </g>
   <g id="text_15">
    <text style="font-size: 14.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="501.84" y="329.063113" transform="rotate(-0 501.84 329.063113)">• Legally accountable</text>
   </g>
   <g id="text_16">
    <text style="font-size: 14.2px; font-family: 'DejaVu Sans'" transform="translate(501.84 356.579355)">• Bound by confidentiality and duty-</text>
    <text style="font-size: 14.2px; font-family: 'DejaVu Sans'" transform="translate(501.84 371.40127)">to-warn rules</text>
   </g>
   <g id="text_17">
    <text style="font-size: 14.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="501.84" y="398.917513" transform="rotate(-0 501.84 398.917513)">• Crisis response</text>
   </g>
   <g id="text_18">
    <text style="font-size: 14px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #111111" x="457.2" y="471.211525" transform="rotate(-0 457.2 471.211525)">AI can mimic some surface features of therapy; it is not the same clinical function.</text>
   </g>
  </g>
