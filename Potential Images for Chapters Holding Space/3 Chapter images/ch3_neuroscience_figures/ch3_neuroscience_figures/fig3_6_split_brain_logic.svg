   <g id="text_1">
    <text style="font-weight: 700; font-size: 18px; font-family: 'DejaVu Sans'; text-anchor: start" x="24.914593" y="34.326563" transform="rotate(-0 24.914593 34.326563)">Fig. 3.6 — Split-brain logic: real lateralization, not personality types</text>
   </g>
   <g id="text_2">
    <text style="font-weight: 700; font-size: 12.5px; font-family: 'DejaVu Sans'" transform="translate(50.728712 137.915586)">Word appears in</text>
    <text style="font-weight: 700; font-size: 12.5px; font-family: 'DejaVu Sans'" transform="translate(51.012891 151.912852)">LEFT visual field</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 12.5px; font-family: 'DejaVu Sans'" transform="translate(222.14865 137.915586)">RIGHT hemisphere</text>
    <text style="font-weight: 700; font-size: 12.5px; font-family: 'DejaVu Sans'" transform="translate(224.540252 151.912852)">receives the word</text>
   </g>
   <g id="text_4">
    <text style="font-weight: 700; font-size: 12.5px; font-family: 'DejaVu Sans'" transform="translate(469.525941 110.09793)">Cannot say</text>
    <text style="font-weight: 700; font-size: 12.5px; font-family: 'DejaVu Sans'" transform="translate(450.323792 124.192852)">what was shown</text>
   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 12.5px; font-family: 'DejaVu Sans'" transform="translate(454.895081 184.115586)">Can point/draw</text>
    <text style="font-weight: 700; font-size: 12.5px; font-family: 'DejaVu Sans'" transform="translate(454.422425 198.112852)">with LEFT hand</text>
   </g>
   <g id="text_6">
    <text style="font-weight: 700; font-size: 11px; font-family: 'DejaVu Sans'" transform="translate(633.811218 139.112719)">Evidence for</text>
    <text style="font-weight: 700; font-size: 11px; font-family: 'DejaVu Sans'" transform="translate(634.434265 151.430312)">hemispheric</text>
    <text style="font-weight: 700; font-size: 11px; font-family: 'DejaVu Sans'" transform="translate(629.720593 163.747906)">specialization</text>
   </g>
   <g id="text_7">
    <text style="font-size: 10.5px; font-family: 'DejaVu Sans'" transform="translate(273.104938 260.809641)">Left</text>
    <text style="font-size: 10.5px; font-family: 'DejaVu Sans'" transform="translate(251.957282 272.567344)">hemisphere</text>
    <text style="font-size: 10.5px; font-family: 'DejaVu Sans'" transform="translate(264.240641 284.325047)">speech</text>
   </g>
   <g id="text_8">
    <text style="font-size: 10.5px; font-family: 'DejaVu Sans'" transform="translate(362.15609 266.688492)">Right</text>
    <text style="font-size: 10.5px; font-family: 'DejaVu Sans'" transform="translate(344.954957 278.446195)">hemisphere</text>
   </g>
   <g id="text_9">
    <text style="font-size: 10.5px; font-family: 'DejaVu Sans'" transform="translate(262.408307 317.972297)">corpus callosum severed:</text>
    <text style="font-size: 10.5px; font-family: 'DejaVu Sans'" transform="translate(239.450221 329.73)">word cannot reach speech system</text>
   </g>
   <g id="text_10">
    <text style="font-weight: 700; font-size: 12.2px; font-family: 'DejaVu Sans'" transform="translate(130.453497 359.665459)">What it does NOT show: ordinary intact-brained people are not split into</text>
    <text style="font-weight: 700; font-size: 12.2px; font-family: 'DejaVu Sans'" transform="translate(158.823263 373.422103)">“logical left-brain” and “creative right-brain” personality types.</text>
   </g>
   <g id="text_11">
    <text style="font-size: 13.2px; font-family: 'DejaVu Sans'; text-anchor: start" x="29.564477" y="412.454813" transform="rotate(-0 29.564477 412.454813)">Key idea: a real clinical finding was overgeneralized into a popular personality myth.</text>
   </g>
  </g>
