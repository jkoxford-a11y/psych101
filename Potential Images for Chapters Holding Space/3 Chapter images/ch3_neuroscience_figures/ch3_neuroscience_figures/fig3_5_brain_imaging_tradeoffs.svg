    <text style="font-weight: 700; font-size: 19px; font-family: 'DejaVu Sans'; text-anchor: start" x="24.914593" y="34.598594" transform="rotate(-0 24.914593 34.598594)">Fig. 3.5 — Brain research methods: what each method is good for</text>
   </g>
   <g id="text_2">
    <text style="font-weight: 700; font-size: 13px; font-family: 'DejaVu Sans'; text-anchor: middle" x="87.688024" y="141.009688" transform="rotate(-0 87.688024 141.009688)">Method</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 13px; font-family: 'DejaVu Sans'; text-anchor: middle" x="208.585001" y="141.009688" transform="rotate(-0 208.585001 141.009688)">What it measures</text>
   </g>
   <g id="text_4">
    <text style="font-weight: 700; font-size: 13px; font-family: 'DejaVu Sans'; text-anchor: middle" x="341.106688" y="140.958906" transform="rotate(-0 341.106688 140.958906)">Best strength</text>
   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 13px; font-family: 'DejaVu Sans'; text-anchor: middle" x="466.653549" y="141.009688" transform="rotate(-0 466.653549 141.009688)">Main limitation</text>
   </g>
   <g id="text_6">
    <text style="font-weight: 700; font-size: 13px; font-family: 'DejaVu Sans'; text-anchor: middle" x="620.099713" y="141.009688" transform="rotate(-0 620.099713 141.009688)">Good question</text>
   </g>
   <g id="text_7">
    <text style="font-weight: 700; font-size: 12px; font-family: 'DejaVu Sans'; text-anchor: middle" x="87.688024" y="188.43525" transform="rotate(-0 87.688024 188.43525)">EEG</text>
   </g>
   <g id="text_8">
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(163.622501 181.716563)">scalp electrical</text>
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(186.468439 195.153938)">activity</text>
   </g>
   <g id="text_9">
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(321.964813 181.716563)">timing</text>
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(299.387938 195.153938)">(milliseconds)</text>
   </g>
   <g id="text_10">
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(431.154174 181.716563)">poor spatial</text>
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(439.588862 195.153938)">precision</text>
   </g>
   <g id="text_11">
    <text style="font-size: 11.5px; font-family: 'DejaVu Sans'" transform="translate(564.992252 181.858539)">When did the brain</text>
    <text style="font-size: 11.5px; font-family: 'DejaVu Sans'" transform="translate(593.816822 194.736023)">respond?</text>
   </g>
   <g id="text_12">
    <text style="font-weight: 700; font-size: 12px; font-family: 'DejaVu Sans'; text-anchor: middle" x="87.688024" y="242.95125" transform="rotate(-0 87.688024 242.95125)">fMRI</text>
   </g>
   <g id="text_13">
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(158.801876 236.232562)">blood-flow proxy</text>
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(176.311564 249.669937)">for activity</text>
   </g>
   <g id="text_14">
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(317.299813 236.232562)">location</text>
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(302.740438 249.669937)">(millimeters)</text>
   </g>
   <g id="text_15">
    <text style="font-size: 12px; font-family: 'DejaVu Sans'; text-anchor: middle" x="466.653549" y="242.95125" transform="rotate(-0 466.653549 242.95125)">slow blood-flow lag</text>
   </g>
   <g id="text_16">
    <text style="font-size: 11.5px; font-family: 'DejaVu Sans'" transform="translate(572.017135 236.374539)">Where is activity</text>
    <text style="font-size: 11.5px; font-family: 'DejaVu Sans'" transform="translate(598.609987 249.252023)">higher?</text>
   </g>
   <g id="text_17">
    <text style="font-weight: 700; font-size: 12px; font-family: 'DejaVu Sans'; text-anchor: middle" x="87.688024" y="297.46725" transform="rotate(-0 87.688024 297.46725)">PET</text>
   </g>
   <g id="text_18">
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(155.196251 290.748562)">radioactive tracer</text>
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(148.848439 304.185938)">binding/metabolism</text>
   </g>
   <g id="text_19">
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(314.159188 290.748562)">chemical</text>
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(310.865751 304.185938)">specificity</text>
   </g>
   <g id="text_20">
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(417.294174 290.748562)">invasive; limited</text>
    <text style="font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(427.072299 304.185938)">repeated use</text>
   </g>
   <g id="text_21">
    <text style="font-size: 11.5px; font-family: 'DejaVu Sans'" transform="translate(563.602369 290.890539)">Where is a receptor</text>
    <text style="font-size: 11.5px; font-family: 'DejaVu Sans'" transform="translate(559.592643 303.768023)">or chemical process?</text>
   </g>
   <g id="text_22">
    <text style="font-weight: 700; font-size: 12px; font-family: 'DejaVu Sans'" transform="translate(53.508649 345.264563)">Structural</text>
