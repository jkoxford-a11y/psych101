   </g>
   <g id="text_23">
    <text style="font-size: 12px; font-family: 'DejaVu Sans'; text-anchor: middle" x="208.585001" y="351.98325" transform="rotate(-0 208.585001 351.98325)">brain anatomy</text>
   </g>
   <g id="text_24">
    <text style="font-size: 12px; font-family: 'DejaVu Sans'; text-anchor: middle" x="341.106688" y="351.98325" transform="rotate(-0 341.106688 351.98325)">detailed structure</text>
   </g>
   <g id="text_25">
    <text style="font-size: 12px; font-family: 'DejaVu Sans'; text-anchor: middle" x="466.653549" y="351.98325" transform="rotate(-0 466.653549 351.98325)">not activity</text>
   </g>
   <g id="text_26">
    <text style="font-size: 11.5px; font-family: 'DejaVu Sans'" transform="translate(561.592565 345.406539)">What does the brain</text>
    <text style="font-size: 11.5px; font-family: 'DejaVu Sans'" transform="translate(593.402643 358.284023)">look like?</text>
   </g>
   <g id="text_27">
    <text style="font-size: 14px; font-family: 'DejaVu Sans'; text-anchor: start" x="29.564477" y="405.358437" transform="rotate(-0 29.564477 405.358437)">Key idea: no brain method gives perfect timing, location, chemistry, and anatomy at once.</text>
