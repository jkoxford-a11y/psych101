<?xml version="1.0" encoding="utf-8" ?>
<svg baseProfile="full" height="1080" version="1.1" viewBox="0,0,1920,1080" width="1920" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#ffffff" height="1080" width="1920" x="0" y="0" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="bold" text-anchor="middle" x="960.0" y="82.0"><tspan dy="0" x="960.0">Exposure Is Not Learning</tspan></text><text fill="#4b5563" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="normal" text-anchor="middle" x="960.0" y="142.0"><tspan dy="0" x="960.0">Use this as a checkpoint: what can you produce without looking?</tspan></text><rect fill="#dbeafe" height="95" rx="26" ry="26" stroke="#1d4ed8" stroke-width="3" width="540" x="690" y="185" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" x="960.0" y="213.62"><tspan dy="0" x="960.0">Exposure</tspan><tspan dy="37.76" x="960.0">Information is present</tspan></text><polygon fill="#fef3c7" points="960,315.0 1220.0,405 960,495.0 700.0,405" stroke="#b45309" stroke-width="3" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" text-anchor="middle" x="960" y="387.3"><tspan dy="0" x="960">Can I produce it from</tspan><tspan dy="35.4" x="960">memory?</tspan></text><line stroke="#374151" stroke-width="4" x1="960" x2="960.0" y1="280" y2="297.0" /><polygon fill="#374151" points="960,315 953.5,297.0 966.5,297.0" stroke="#374151" /><rect fill="#fee2e2" height="125" rx="26" ry="26" stroke="#be123c" stroke-width="3" width="520" x="155" y="580" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="bold" text-anchor="middle" x="415.0" y="624.21"><tspan dy="0" x="415.0">Familiarity or recognition</tspan><tspan dy="36.58" x="415.0">only</tspan></text><rect fill="#f3f4f6" height="95" rx="26" ry="26" stroke="#6b7280" stroke-width="3" width="520" x="155" y="800" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="bold" text-anchor="middle" x="415.0" y="829.21"><tspan dy="0" x="415.0">Next move: retrieval</tspan><tspan dy="36.58" x="415.0">practice</tspan></text><line stroke="#be123c" stroke-width="4" x1="760" x2="681.8942704086078" y1="435" y2="623.3726419557106" /><polygon fill="#be123c" points="675,640 675.8899466703922,620.8830443081578 687.8985941468234,625.8622396032634" stroke="#be123c" /><rect fill="#ffffff" height="48" rx="12" ry="12" stroke="none" width="84" x="643.5" y="507.5" /><text fill="#be123c" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" x="685.5" y="533.5"><tspan dy="0" x="685.5">No</tspan></text><line stroke="#be123c" stroke-width="4" x1="415" x2="415.0" y1="705" y2="782.0" /><polygon fill="#be123c" points="415,800 408.5,782.0 421.5,782.0" stroke="#be123c" /><polygon fill="#fef3c7" points="1315,550.0 1575.0,640 1315,730.0 1055.0,640" stroke="#b45309" stroke-width="3" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" x="1315" y="623.48"><tspan dy="0" x="1315">Can I explain or apply</tspan><tspan dy="33.04" x="1315">it to a new case?</tspan></text><line stroke="#0f766e" stroke-width="4" x1="1165" x2="1300.7150854967456" y1="435" y2="539.0482322141715" /><polygon fill="#0f766e" points="1315,550 1296.7602804629742,544.206673562569 1304.669890530517,533.8897908657741" stroke="#0f766e" /><rect fill="#ffffff" height="48" rx="12" ry="12" stroke="none" width="84" x="1220.0" y="452.5" /><text fill="#0f766e" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" x="1262.0" y="478.5"><tspan dy="0" x="1262.0">Yes</tspan></text><rect fill="#dbeafe" height="105" rx="26" ry="26" stroke="#1d4ed8" stroke-width="3" width="420" x="760" y="800" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="bold" text-anchor="middle" x="970.0" y="852.5"><tspan dy="0" x="970.0">Recall only</tspan></text><rect fill="#f3f4f6" height="75" rx="26" ry="26" stroke="#6b7280" stroke-width="3" width="420" x="760" y="925" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="bold" text-anchor="middle" x="970.0" y="962.5"><tspan dy="0" x="970.0">Add application practice</tspan></text><line stroke="#1d4ed8" stroke-width="4" x1="1185" x2="1078.2687745236133" y1="690" y2="787.8369566866878" /><polygon fill="#1d4ed8" points="1065,800 1073.8765644382506,783.045454775383 1082.660984608976,792.6284585979927" stroke="#1d4ed8" /><rect fill="#ffffff" height="48" rx="12" ry="12" stroke="none" width="84" x="1078.0" y="725.0" /><text fill="#1d4ed8" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" x="1120.0" y="751.0"><tspan dy="0" x="1120.0">No</tspan></text><line stroke="#1d4ed8" stroke-width="4" x1="970" x2="970.0" y1="905" y2="907.0" /><polygon fill="#1d4ed8" points="970,925 963.5,907.0 976.5,907.0" stroke="#1d4ed8" /><rect fill="#dcfce7" height="105" rx="26" ry="26" stroke="#15803d" stroke-width="3" width="440" x="1325" y="800" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="bold" text-anchor="middle" x="1545.0" y="835.39"><tspan dy="0" x="1545.0">Stronger evidence of</tspan><tspan dy="34.22" x="1545.0">learning</tspan></text><rect fill="#f3f4f6" height="75" rx="26" ry="26" stroke="#6b7280" stroke-width="3" width="440" x="1325" y="925" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="bold" text-anchor="middle" x="1545.0" y="962.5"><tspan dy="0" x="1545.0">Space and repeat</tspan></text><line stroke="#15803d" stroke-width="4" x1="1445" x2="1532.8918897080664" y1="690" y2="786.6810786788731" /><polygon fill="#15803d" points="1545,800 1528.0822792309928,791.0534518398491 1537.70150018514,782.308705517897" stroke="#15803d" /><rect fill="#ffffff" height="48" rx="12" ry="12" stroke="none" width="84" x="1411.0" y="669.0" /><text fill="#15803d" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="bold" text-anchor="middle" x="1453.0" y="695.0"><tspan dy="0" x="1453.0">Yes</tspan></text><line stroke="#15803d" stroke-width="4" x1="1545" x2="1545.0" y1="905" y2="907.0" /><polygon fill="#15803d" points="1545,925 1538.5,907.0 1551.5,907.0" stroke="#15803d" /><rect fill="#f9fafb" height="38" rx="16" ry="16" stroke="none" width="1500" x="210" y="1018" /><text fill="#4b5563" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="bold" text-anchor="middle" x="960.0" y="1043.0"><tspan dy="0" x="960.0">Feeling familiar is not the same as being able to retrieve, explain, or apply.</tspan></text></svg>