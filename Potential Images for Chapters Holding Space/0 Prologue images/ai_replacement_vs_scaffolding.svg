<svg baseProfile="full" height="1080" version="1.1" viewBox="0,0,1920,1080" width="1920" xmlns="http://www.w3.org/2000/svg" xmlns:ev="http://www.w3.org/2001/xml-events" xmlns:xlink="http://www.w3.org/1999/xlink"><defs /><rect fill="#ffffff" height="1080" width="1920" x="0" y="0" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="bold" text-anchor="middle" x="960.0" y="82.0"><tspan dy="0" x="960.0">AI Can Replace Retrieval or Support It</tspan></text><text fill="#4b5563" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="normal" text-anchor="middle" x="960.0" y="142.0"><tspan dy="0" x="960.0">The difference is whether effort comes before the AI answer.</tspan></text><rect fill="#fff7f7" height="795" rx="34" ry="34" stroke="#be123c" stroke-width="4" width="805" x="105" y="185" /><rect fill="#f0fdfa" height="795" rx="34" ry="34" stroke="#0f766e" stroke-width="4" width="805" x="1010" y="185" /><text fill="#be123c" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" x="507" y="240.0"><tspan dy="0" x="507">Replacement pathway</tspan></text><text fill="#0f766e" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="bold" text-anchor="middle" x="1412" y="240.0"><tspan dy="0" x="1412">Scaffolding pathway</tspan></text><rect fill="#fee2e2" height="84" rx="26" ry="26" stroke="#be123c" stroke-width="3" width="545" x="235" y="315" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="bold" text-anchor="middle" x="507.5" y="357.0"><tspan dy="0" x="507.5">Stuck</tspan></text><line stroke="#be123c" stroke-width="4" x1="507.5" x2="507.5" y1="399" y2="422.0" /><polygon fill="#be123c" points="507.5,440 501.0,422.0 514.0,422.0" stroke="#be123c" /><rect fill="#fee2e2" height="84" rx="26" ry="26" stroke="#be123c" stroke-width="3" width="545" x="235" y="440" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="bold" text-anchor="middle" x="507.5" y="482.0"><tspan dy="0" x="507.5">Ask AI for the answer</tspan></text><line stroke="#be123c" stroke-width="4" x1="507.5" x2="507.5" y1="524" y2="547.0" /><polygon fill="#be123c" points="507.5,565 501.0,547.0 514.0,547.0" stroke="#be123c" /><rect fill="#fee2e2" height="84" rx="26" ry="26" stroke="#be123c" stroke-width="3" width="545" x="235" y="565" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="bold" text-anchor="middle" x="507.5" y="607.0"><tspan dy="0" x="507.5">Read fluent explanation</tspan></text><line stroke="#be123c" stroke-width="4" x1="507.5" x2="507.5" y1="649" y2="672.0" /><polygon fill="#be123c" points="507.5,690 501.0,672.0 514.0,672.0" stroke="#be123c" /><rect fill="#fee2e2" height="84" rx="26" ry="26" stroke="#be123c" stroke-width="3" width="545" x="235" y="690" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="bold" text-anchor="middle" x="507.5" y="732.0"><tspan dy="0" x="507.5">Feel prepared</tspan></text><line stroke="#be123c" stroke-width="4" x1="507.5" x2="507.5" y1="774" y2="797.0" /><polygon fill="#be123c" points="507.5,815 501.0,797.0 514.0,797.0" stroke="#be123c" /><rect fill="#ffe4e6" height="84" rx="26" ry="26" stroke="#be123c" stroke-width="3" width="545" x="235" y="815" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="bold" text-anchor="middle" x="507.5" y="857.0"><tspan dy="0" x="507.5">Weak retrieval later</tspan></text><rect fill="#ccfbf1" height="84" rx="26" ry="26" stroke="#0f766e" stroke-width="3" width="545" x="1140" y="315" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="bold" text-anchor="middle" x="1412.5" y="357.0"><tspan dy="0" x="1412.5">Try first without looking</tspan></text><line stroke="#0f766e" stroke-width="4" x1="1412.5" x2="1412.5" y1="399" y2="422.0" /><polygon fill="#0f766e" points="1412.5,440 1406.0,422.0 1419.0,422.0" stroke="#0f766e" /><rect fill="#ccfbf1" height="84" rx="26" ry="26" stroke="#0f766e" stroke-width="3" width="545" x="1140" y="440" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="bold" text-anchor="middle" x="1412.5" y="482.0"><tspan dy="0" x="1412.5">Explain your answer to AI</tspan></text><line stroke="#0f766e" stroke-width="4" x1="1412.5" x2="1412.5" y1="524" y2="547.0" /><polygon fill="#0f766e" points="1412.5,565 1406.0,547.0 1419.0,547.0" stroke="#0f766e" /><rect fill="#ccfbf1" height="84" rx="26" ry="26" stroke="#0f766e" stroke-width="3" width="545" x="1140" y="565" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="bold" text-anchor="middle" x="1412.5" y="607.0"><tspan dy="0" x="1412.5">Get critique and correction</tspan></text><line stroke="#0f766e" stroke-width="4" x1="1412.5" x2="1412.5" y1="649" y2="672.0" /><polygon fill="#0f766e" points="1412.5,690 1406.0,672.0 1419.0,672.0" stroke="#0f766e" /><rect fill="#ccfbf1" height="84" rx="26" ry="26" stroke="#0f766e" stroke-width="3" width="545" x="1140" y="690" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="bold" text-anchor="middle" x="1412.5" y="732.0"><tspan dy="0" x="1412.5">Revise from memory</tspan></text><line stroke="#0f766e" stroke-width="4" x1="1412.5" x2="1412.5" y1="774" y2="797.0" /><polygon fill="#0f766e" points="1412.5,815 1406.0,797.0 1419.0,797.0" stroke="#0f766e" /><rect fill="#dcfce7" height="84" rx="26" ry="26" stroke="#15803d" stroke-width="3" width="545" x="1140" y="815" /><text fill="#1f2937" font-family="Arial, Helvetica, sans-serif" font-size="31" font-weight="bold" text-anchor="middle" x="1412.5" y="857.0"><tspan dy="0" x="1412.5">Stronger retrieval later</tspan></text><rect fill="#f9fafb" height="48" rx="18" ry="18" stroke="none" width="1260" x="330" y="1000" /><text fill="#4b5563" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="bold" text-anchor="middle" x="960.0" y="1031.0"><tspan dy="0" x="960.0">Use AI after effort and feedback, not before the first retrieval attempt.</tspan></text></svg>