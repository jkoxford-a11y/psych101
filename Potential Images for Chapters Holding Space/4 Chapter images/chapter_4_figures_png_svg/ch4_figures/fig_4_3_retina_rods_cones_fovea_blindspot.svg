   <g id="text_1">
    <text style="font-weight: 700; font-size: 24px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #222831" x="35.099303" y="46.22625" transform="rotate(-0 35.099303 46.22625)">Fig. 4.3  The Retina Is Not a Camera Sensor</text>
   </g>
   <g id="text_2">
    <text style="font-size: 13.5px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #5f6670" x="35.099303" y="58.113891" transform="rotate(-0 35.099303 58.113891)">Rods, cones, the fovea, and the blind spot</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 14px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #b94e48" x="546.586515" y="129.63" transform="rotate(-0 546.586515 129.63)">retina</text>
   </g>
   <g id="text_4">
    <text style="font-size: 11.5px; font-family: 'DejaVu Sans'; fill: #c97832" transform="translate(581.460643 215.559797)">fovea:</text>
    <text style="font-size: 11.5px; font-family: 'DejaVu Sans'; fill: #c97832" transform="translate(581.460643 228.437281)">cones dense,</text>
    <text style="font-size: 11.5px; font-family: 'DejaVu Sans'; fill: #c97832" transform="translate(581.460643 241.314766)">sharp detail</text>
   </g>
   <g id="text_5">
    <text style="font-size: 11.5px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(567.510992 278.824539)">blind spot:</text>
    <text style="font-size: 11.5px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(567.510992 291.702023)">no photoreceptors</text>
   </g>
   <g id="text_6">
    <text style="font-size: 12px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #5f6670" x="616.334771" y="342.15" transform="rotate(-0 616.334771 342.15)">optic nerve</text>
   </g>
   <g id="text_7">
    <text style="font-weight: 700; font-size: 13px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #c97832" x="42.074128" y="138.87" transform="rotate(-0 42.074128 138.87)">light</text>
   </g>
   <g id="text_8">
    <text style="font-size: 13px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(51.875949 330.373609)">Rods: dim light, motion, periphery</text>
    <text style="font-size: 13px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(63.782121 344.930766)">Cones: color, fine detail, fovea</text>
   </g>
   <g id="text_9">
    <text style="font-size: 13.5px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #222831" x="316.417269" y="353.7" transform="rotate(-0 316.417269 353.7)">Point: the retinal signal is biologically organized before conscious vision.</text>
   </g>
  </g>
 </g>
