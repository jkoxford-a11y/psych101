   <g id="text_1">
    <text style="font-weight: 700; font-size: 24px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #222831" x="35.099303" y="46.22625" transform="rotate(-0 35.099303 46.22625)">Fig. 4.1  Sensation vs. Perception</text>
   </g>
   <g id="text_2">
    <text style="font-size: 13.5px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #5f6670" x="35.099303" y="58.113891" transform="rotate(-0 35.099303 58.113891)">From physical energy to meaningful experience</text>
   </g>
   <g id="text_3">
    <text style="font-size: 13px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(66.782068 170.286453)">Physical</text>
    <text style="font-size: 13px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(65.72074 184.843609)">stimulus</text>
    <text style="font-size: 13px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(50.355349 199.400766)">(light, sound,</text>
    <text style="font-size: 13px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(62.618006 213.957922)">pressure)</text>
   </g>
   <g id="text_4">
    <text style="font-weight: 700; font-size: 14px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(204.383228 184.559656)">Sense</text>
    <text style="font-weight: 700; font-size: 14px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(194.354634 200.236594)">receptor</text>
   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 13.5px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(313.726537 177.037641)">Transduction</text>
    <text style="font-weight: 700; font-size: 13.5px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(301.651419 192.154688)">energy → neural</text>
    <text style="font-weight: 700; font-size: 13.5px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(340.078958 207.377203)">signal</text>
   </g>
   <g id="text_6">
    <text style="font-size: 14px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(474.670392 184.559656)">Neural</text>
    <text style="font-size: 14px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(467.691173 200.236594)">pathway</text>
   </g>
   <g id="text_7">
    <text style="font-weight: 700; font-size: 13.5px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(605.310187 177.037641)">Perception</text>
    <text style="font-weight: 700; font-size: 13.5px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(606.184523 192.154688)">organized,</text>
    <text style="font-weight: 700; font-size: 13.5px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(567.658898 207.377203)">interpreted meaning</text>
   </g>
   <g id="text_8">
    <text style="font-size: 13px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(494.400697 345.388609)">Top-down influences</text>
    <text style="font-size: 13px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(413.530541 359.945766)">expectations • context • memory • attention</text>
   </g>
   <g id="text_9">
    <text style="font-size: 14.5px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #222831" x="42.074128" y="272.85" transform="rotate(-0 42.074128 272.85)">Sensation begins with receptor response and transduction.</text>
   </g>
   <g id="text_10">
    <text style="font-size: 14.5px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #222831" x="42.074128" y="295.95" transform="rotate(-0 42.074128 295.95)">Perception emerges as the nervous system organizes and interprets the signal.</text>
   </g>
   <g id="text_11">
    <text style="font-size: 11.5px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #5f6670" x="42.074128" y="397.59" transform="rotate(-0 42.074128 397.59)">Teaching note: the boundary is useful, but not absolute—early sensory systems already preprocess input.</text>
   </g>
  </g>
