   <g id="text_1">
    <text style="font-weight: 700; font-size: 24px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #222831" x="35.099303" y="46.22625" transform="rotate(-0 35.099303 46.22625)">Fig. 4.2  Signal Detection Theory</text>
   </g>
   <g id="text_2">
    <text style="font-size: 13.5px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #5f6670" x="35.099303" y="58.113891" transform="rotate(-0 35.099303 58.113891)">Separate the world state from the observer's response</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 16px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #222831" x="404.765061" y="76.295" transform="rotate(-0 404.765061 76.295)">Stimulus in the world</text>
   </g>
   <g id="text_4">
    <text style="font-weight: 700; font-size: 16px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(58.951425 231.34675)">Observer</text>
    <text style="font-weight: 700; font-size: 16px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(58.960175 249.26325)">response</text>
   </g>
   <g id="text_5">
    <text style="font-weight: 700; font-size: 16px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #ffffff" x="335.016804" y="113.255" transform="rotate(-0 335.016804 113.255)">Present</text>
   </g>
   <g id="text_6">
    <text style="font-weight: 700; font-size: 16px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #ffffff" x="539.611689" y="113.255" transform="rotate(-0 539.611689 113.255)">Absent</text>
   </g>
   <g id="text_7">
    <text style="font-size: 12px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(173.80325 167.802563)">“Yes”</text>
    <text style="font-size: 12px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(160.908875 181.239938)">I detect it</text>
   </g>
   <g id="text_8">
    <text style="font-size: 12px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(175.547937 241.722562)">“No”</text>
    <text style="font-size: 12px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(166.817937 255.159937)">I do not</text>
   </g>
   <g id="text_9">
    <text style="font-weight: 700; font-size: 15px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(320.833601 166.950703)">HIT</text>
    <text style="font-weight: 700; font-size: 15px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(262.071101 183.747422)">correct detection</text>
   </g>
   <g id="text_10">
    <text style="font-weight: 700; font-size: 14px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(485.846221 159.3415)">FALSE ALARM</text>
    <text style="font-weight: 700; font-size: 14px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(460.859502 175.018438)">reported something</text>
    <text style="font-weight: 700; font-size: 14px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(493.583408 190.80475)">not present</text>
   </g>
   <g id="text_11">
    <text style="font-weight: 700; font-size: 15px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(314.298054 240.870703)">MISS</text>
    <text style="font-weight: 700; font-size: 15px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(268.263289 257.667422)">failed detection</text>
   </g>
   <g id="text_12">
    <text style="font-weight: 700; font-size: 15px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(500.43708 240.870703)">CORRECT</text>
    <text style="font-weight: 700; font-size: 15px; font-family: 'DejaVu Sans'; fill: #222831" transform="translate(494.735908 257.667422)">REJECTION</text>
   </g>
   <g id="text_13">
    <text style="font-size: 12.5px; font-family: 'DejaVu Sans'; fill: #5f6670" transform="translate(72.298372 365.508047)">Conservative criterion:</text>
    <text style="font-size: 12.5px; font-family: 'DejaVu Sans'; fill: #5f6670" transform="translate(72.298372 379.505313)">fewer false alarms,</text>
    <text style="font-size: 12.5px; font-family: 'DejaVu Sans'; fill: #5f6670" transform="translate(72.298372 393.502578)">more misses</text>
   </g>
   <g id="text_14">
    <text style="font-size: 12.5px; font-family: 'DejaVu Sans'; fill: #5f6670" transform="translate(574.005916 365.508047)">Liberal criterion:</text>
    <text style="font-size: 12.5px; font-family: 'DejaVu Sans'; fill: #5f6670" transform="translate(613.65826 379.505313)">more hits,</text>
    <text style="font-size: 12.5px; font-family: 'DejaVu Sans'; fill: #5f6670" transform="translate(564.328182 393.502578)">more false alarms</text>
   </g>
   <g id="text_15">
    <text style="font-weight: 700; font-size: 12.5px; font-family: 'DejaVu Sans'; text-anchor: middle; fill: #c97832" x="374.540816" y="319.05" transform="rotate(-0 374.540816 319.05)">decision criterion shifts with costs</text>
   </g>
  </g>
