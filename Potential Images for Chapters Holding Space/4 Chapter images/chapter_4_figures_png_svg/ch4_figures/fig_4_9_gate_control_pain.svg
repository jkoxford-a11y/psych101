   <g id="text_2">
    <text style="font-size: 13.5px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #5f6670" x="35.099303" y="58.113891" transform="rotate(-0 35.099303 58.113891)">Pain is modulated before it reaches conscious awareness</text>
