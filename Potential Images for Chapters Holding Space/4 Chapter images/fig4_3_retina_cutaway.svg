<path d="M606,448 C655.0,448 655.0,454 704,454" fill="none" stroke="#52606d" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><text x="718" y="462" font-family="Aptos, Arial, sans-serif" font-size="22" font-weight="600" fill="#243b53" text-anchor="start" >fovea</text>
<path d="M721,529 C729.5,529 729.5,637 738,637" fill="none" stroke="#52606d" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><text x="750" y="671" font-family="Aptos, Arial, sans-serif" font-size="22" font-weight="600" fill="#243b53" text-anchor="start" >optic nerve</text>
<path d="M641,483 C672.5,483 672.5,540 704,540" fill="none" stroke="#52606d" stroke-width="2.2" stroke-linecap="round" marker-end="url(#arrow)"/><text x="716" y="548" font-family="Aptos, Arial, sans-serif" font-size="22" font-weight="600" fill="#243b53" text-anchor="start" >blind spot</text>

