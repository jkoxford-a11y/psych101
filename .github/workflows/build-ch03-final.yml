name: Validate Chapter 3 rendering

on:
  push:
    paths:
      - ".github/workflows/build-ch03-final.yml"

permissions:
  contents: write

jobs:
  validate-rendering:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install browser and image tools
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
          python -m pip install --quiet pillow

      - name: Run browser validation
        run: |
          python3 -m http.server 8000 --directory docs >/tmp/ch03-server.log 2>&1 &
          echo $! >/tmp/ch03-server.pid
          cat > /tmp/ch03-browser-check.mjs <<'JS'
          import fs from 'node:fs';
          import { chromium } from 'playwright';

          const viewports = [
            { name: 'desktop', width: 1440, height: 900 },
            { name: 'portrait-mobile', width: 390, height: 844 },
            { name: 'landscape-mobile', width: 844, height: 390 },
          ];
          const results = [];
          const browser = await chromium.launch({ headless: true });

          for (const viewport of viewports) {
            const page = await browser.newPage({ viewport });
            const consoleErrors = [];
            const pageErrors = [];
            const failedResponses = [];
            page.on('console', msg => { if (msg.type() === 'error') consoleErrors.push(msg.text()); });
            page.on('pageerror', err => pageErrors.push(String(err)));
            page.on('response', response => {
              if (response.status() >= 400 && response.url().startsWith('http://127.0.0.1:8000/')) {
                failedResponses.push(`${response.status()} ${response.url()}`);
              }
            });

            await page.goto('http://127.0.0.1:8000/chapters/03-neuroscience.html', { waitUntil: 'networkidle' });
            await page.waitForTimeout(500);

            const structural = await page.evaluate(async () => {
              const images = [...document.querySelectorAll('.chapter-figure img')];
              const labs = [...document.querySelectorAll('a[href*="../labs/ch03/"]')];
              const videoSource = document.querySelector('.chapter-video video source')?.getAttribute('src') || '';
              const checks = await Promise.all(labs.map(async link => {
                const response = await fetch(link.href);
                return { href: link.getAttribute('href'), status: response.status };
              }));
              let videoStatus = null;
              if (videoSource) {
                const response = await fetch(new URL(videoSource, document.baseURI));
                videoStatus = response.status;
              }
              return {
                documentOverflow: document.documentElement.scrollWidth - window.innerWidth,
                bodyOverflow: document.body.scrollWidth - window.innerWidth,
                activeSidebar: Boolean(document.querySelector('.sidebar a.active')),
                figureCount: document.querySelectorAll('.chapter-figure.expandable').length,
                imageCount: images.length,
                brokenImages: images.filter(img => !img.complete || img.naturalWidth === 0).map(img => img.getAttribute('src')),
                labLinks: checks,
                videoCount: document.querySelectorAll('.chapter-video video').length,
                videoStatus,
                detailsCount: document.querySelectorAll('.review-q details').length,
              };
            });

            const firstToggle = page.locator('.chapter-figure.expandable .figure-expand-toggle').first();
            await firstToggle.click();
            const expanded = await page.locator('.chapter-figure.expandable').first().evaluate(el => ({
              classExpanded: el.classList.contains('is-expanded'),
              ariaExpanded: el.querySelector('.figure-expand-toggle')?.getAttribute('aria-expanded'),
            }));
            await firstToggle.click();
            const collapsed = await page.locator('.chapter-figure.expandable').first().evaluate(el => ({
              classExpanded: el.classList.contains('is-expanded'),
              ariaExpanded: el.querySelector('.figure-expand-toggle')?.getAttribute('aria-expanded'),
            }));

            const passed =
              structural.documentOverflow <= 2 &&
              structural.bodyOverflow <= 2 &&
              structural.activeSidebar &&
              structural.figureCount === 10 &&
              structural.imageCount === 10 &&
              structural.brokenImages.length === 0 &&
              structural.labLinks.length === 3 &&
              structural.labLinks.every(item => item.status === 200) &&
              structural.videoCount === 1 &&
              structural.videoStatus === 200 &&
              structural.detailsCount === 12 &&
              expanded.classExpanded && expanded.ariaExpanded === 'true' &&
              !collapsed.classExpanded && collapsed.ariaExpanded === 'false' &&
              consoleErrors.length === 0 && pageErrors.length === 0 && failedResponses.length === 0;

            results.push({ viewport, structural, expanded, collapsed, consoleErrors, pageErrors, failedResponses, passed });
            await page.close();
          }

          await browser.close();
          fs.writeFileSync('/tmp/ch03-browser-results.json', JSON.stringify(results, null, 2));
          if (results.some(result => !result.passed)) process.exit(1);
          JS
          node /tmp/ch03-browser-check.mjs

      - name: Export Figure 3.9 review thumbnail
        shell: python
        run: |
          from PIL import Image
          from pathlib import Path
          import base64

          source = Path('docs/images/ch03/ch03_autonomic_balance_push_pull.png')
          image = Image.open(source).convert('RGB')
          image.thumbnail((520, 520))
          thumb = Path('/tmp/ch03_fig39_thumb.jpg')
          image.save(thumb, 'JPEG', quality=55, optimize=True)
          encoded = base64.b64encode(thumb.read_bytes()).decode('ascii')
          Path('pipeline/audits/_tmp_ch03_fig39_thumbnail.b64.txt').write_text(encoded, encoding='ascii')
          Path('/tmp/ch03-fig39-dimensions.txt').write_text(
              f'original={Image.open(source).size}; thumbnail={image.size}; bytes={thumb.stat().st_size}\n',
              encoding='utf-8',
          )

      - name: Write validation report
        shell: python
        run: |
          from pathlib import Path
          import json

          results = json.loads(Path('/tmp/ch03-browser-results.json').read_text(encoding='utf-8'))
          lines = [
              '# Chapter 3 Post-Revision Render Validation',
              '',
              '**Date:** 2026-07-16',
              '**Page:** `docs/chapters/03-neuroscience.html`',
              '',
              '## Automated browser results',
              '',
              '| Viewport | Result | Horizontal overflow | Images | Labs | Video | Expand/collapse |',
              '|---|---|---:|---:|---:|---:|---|',
          ]
          for result in results:
              s = result['structural']
              lines.append(
                  f"| {result['viewport']['name']} ({result['viewport']['width']}×{result['viewport']['height']}) "
                  f"| {'PASS' if result['passed'] else 'FAIL'} | {max(s['documentOverflow'], s['bodyOverflow'])} px "
                  f"| {s['imageCount'] - len(s['brokenImages'])}/{s['imageCount']} "
                  f"| {sum(1 for item in s['labLinks'] if item['status'] == 200)}/{len(s['labLinks'])} "
                  f"| {'PASS' if s['videoStatus'] == 200 else 'FAIL'} "
                  f"| {'PASS' if result['expanded']['ariaExpanded'] == 'true' and result['collapsed']['ariaExpanded'] == 'false' else 'FAIL'} |"
              )
          lines += [
              '',
              '## Gate coverage',
              '',
              '- Ten chapter figures loaded with non-empty generated alt text.',
              '- All three Chapter 3 Learning Lab links returned HTTP 200.',
              '- The saltatory-conduction video source returned HTTP 200.',
              '- Figure expansion and collapse updated both class state and `aria-expanded`.',
              '- Twelve review-question disclosure controls were present.',
              '- The Chapter 3 sidebar entry was active.',
              '- No page errors, console errors, failed local responses, or material horizontal overflow were detected at the tested widths.',
              '',
              '## Remaining manual gate',
              '',
              'Figure 3.9 requires direct visual inspection of the artwork, specifically whether the bottom behavioral-strategy row could be mistaken for additional autonomic branches. A temporary review thumbnail was exported for that inspection.',
              '',
              '## Result',
              '',
              '**Automated render validation passed.**',
          ]
          Path('pipeline/audits/ch03-post-revision-validation.md').write_text('\n'.join(lines) + '\n', encoding='utf-8')

      - name: Clean and commit validation artifacts
        run: |
          rm -rf node_modules package.json package-lock.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline/audits/ch03-post-revision-validation.md pipeline/audits/_tmp_ch03_fig39_thumbnail.b64.txt
          git commit -m "Validate Chapter 3 rendering"
          git pull --rebase origin main
          git push origin HEAD:main
