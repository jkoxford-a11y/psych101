name: Diagnose Chapter 3 browser validation

on:
  push:
    paths:
      - ".github/workflows/build-ch03-final.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.52.0 > /tmp/install.log 2>&1
          npx playwright install --with-deps chromium >> /tmp/install.log 2>&1
          python -m pip install --quiet pillow >> /tmp/install.log 2>&1

      - name: Browser smoke test
        id: browser
        continue-on-error: true
        shell: bash
        run: |
          python3 -m http.server 8000 --directory docs > /tmp/server.log 2>&1 &
          cat > /tmp/check.mjs <<'JS'
          import { chromium } from 'playwright';
          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage({ viewport: { width: 390, height: 844 } });
          const errors = [];
          page.on('console', msg => { if (msg.type() === 'error') errors.push(msg.text()); });
          page.on('pageerror', err => errors.push(String(err)));
          await page.goto('http://127.0.0.1:8000/chapters/03-neuroscience.html', { waitUntil: 'networkidle' });
          await page.waitForTimeout(500);
          console.log(JSON.stringify(await page.evaluate(() => ({
            title: document.title,
            overflow: document.documentElement.scrollWidth - window.innerWidth,
            activeSidebar: Boolean(document.querySelector('.sidebar a.active')),
            figures: document.querySelectorAll('.chapter-figure.expandable').length,
            images: [...document.querySelectorAll('.chapter-figure img')].map(img => ({src: img.getAttribute('src'), complete: img.complete, width: img.naturalWidth})),
            labs: [...document.querySelectorAll('a[href*="../labs/ch03/"]')].map(a => a.getAttribute('href')),
            video: document.querySelector('.chapter-video video source')?.getAttribute('src') || null,
          })), null, 2));
          console.log('errors', JSON.stringify(errors));
          await browser.close();
          JS
          node /tmp/check.mjs > /tmp/browser.log 2>&1

      - name: Thumbnail smoke test
        id: thumbnail
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY' > /tmp/thumbnail.log 2>&1
          from PIL import Image
          from pathlib import Path
          import base64
          source = Path('docs/images/ch03/ch03_autonomic_balance_push_pull.png')
          image = Image.open(source).convert('RGB')
          image.thumbnail((520, 520))
          thumb = Path('/tmp/ch03_fig39_thumb.jpg')
          image.save(thumb, 'JPEG', quality=55, optimize=True)
          encoded = base64.b64encode(thumb.read_bytes()).decode('ascii')
          print('source', Image.open(source).size, 'thumb', image.size, 'bytes', thumb.stat().st_size, 'base64', len(encoded))
          PY

      - name: Commit diagnostic report
        if: always()
        run: |
          git reset --hard HEAD
          {
            echo '# Temporary Chapter 3 Browser Diagnostic'
            echo
            echo '- install: ${{ steps.install.outcome }}'
            echo '- browser: ${{ steps.browser.outcome }}'
            echo '- thumbnail: ${{ steps.thumbnail.outcome }}'
            for f in install server browser thumbnail; do
              echo
              echo "## ${f}"
              echo '```'
              cat "/tmp/${f}.log" 2>/dev/null || true
              echo '```'
            done
          } > pipeline/audits/_tmp_ch03_browser_diagnostic.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline/audits/_tmp_ch03_browser_diagnostic.md
          git commit -m "Record Chapter 3 browser diagnostic"
          git pull --rebase origin main
          git push origin HEAD:main
