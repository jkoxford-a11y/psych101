name: Locate Chapter 3 overflow sources

on:
  push:
    paths:
      - ".github/workflows/build-ch03-final.yml"

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install browser
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1
      - name: Inspect overflow
        run: |
          python3 -m http.server 8000 --directory docs >/tmp/ch03-server.log 2>&1 &
          cat > ch03-overflow-inspect.mjs <<'JS'
          import fs from 'node:fs';
          import { chromium } from 'playwright';

          function selector(el) {
            if (el.id) return `#${el.id}`;
            const parts = [];
            let node = el;
            while (node && node.nodeType === 1 && parts.length < 5) {
              let part = node.tagName.toLowerCase();
              if (node.classList.length) part += '.' + [...node.classList].slice(0, 3).join('.');
              if (node.parentElement) {
                const siblings = [...node.parentElement.children].filter(x => x.tagName === node.tagName);
                if (siblings.length > 1) part += `:nth-of-type(${siblings.indexOf(node) + 1})`;
              }
              parts.unshift(part);
              node = node.parentElement;
            }
            return parts.join(' > ');
          }

          const browser = await chromium.launch({ headless: true });
          const outputs = [];
          for (const viewport of [
            {name:'desktop',width:1440,height:900},
            {name:'portrait-mobile',width:390,height:844},
            {name:'landscape-mobile',width:844,height:390},
          ]) {
            const page = await browser.newPage({viewport});
            await page.goto('http://127.0.0.1:8000/chapters/03-neuroscience.html', {waitUntil:'networkidle'});
            await page.waitForTimeout(300);
            const data = await page.evaluate((viewport) => {
              function selector(el) {
                if (el.id) return `#${el.id}`;
                const parts=[]; let node=el;
                while(node && node.nodeType===1 && parts.length<5){
                  let part=node.tagName.toLowerCase();
                  if(node.classList.length) part+='.'+[...node.classList].slice(0,3).join('.');
                  if(node.parentElement){const sib=[...node.parentElement.children].filter(x=>x.tagName===node.tagName); if(sib.length>1) part+=`:nth-of-type(${sib.indexOf(node)+1})`;}
                  parts.unshift(part); node=node.parentElement;
                }
                return parts.join(' > ');
              }
              const offenders=[];
              for(const el of document.querySelectorAll('body *')){
                const rect=el.getBoundingClientRect();
                const cs=getComputedStyle(el);
                const rightOverflow=Math.max(0, rect.right-window.innerWidth);
                const ownOverflow=Math.max(0, el.scrollWidth-el.clientWidth);
                if(rightOverflow>2 || ownOverflow>2){
                  offenders.push({
                    selector:selector(el), tag:el.tagName, classes:el.className,
                    text:(el.textContent||'').trim().slice(0,140),
                    rect:{left:Math.round(rect.left),right:Math.round(rect.right),width:Math.round(rect.width)},
                    clientWidth:el.clientWidth, scrollWidth:el.scrollWidth,
                    rightOverflow:Math.round(rightOverflow), ownOverflow,
                    display:cs.display, position:cs.position, width:cs.width, minWidth:cs.minWidth,
                    maxWidth:cs.maxWidth, whiteSpace:cs.whiteSpace, overflowX:cs.overflowX,
                  });
                }
              }
              offenders.sort((a,b)=>Math.max(b.rightOverflow,b.ownOverflow)-Math.max(a.rightOverflow,a.ownOverflow));
              return {
                viewport,
                document:{scrollWidth:document.documentElement.scrollWidth,clientWidth:document.documentElement.clientWidth},
                body:{scrollWidth:document.body.scrollWidth,clientWidth:document.body.clientWidth},
                layout:document.querySelector('.layout')?.getBoundingClientRect().toJSON(),
                main:document.querySelector('.main')?.getBoundingClientRect().toJSON(),
                sidebar:document.querySelector('.sidebar')?.getBoundingClientRect().toJSON(),
                offenders:offenders.slice(0,30),
              };
            }, viewport);
            outputs.push(data);
            await page.close();
          }
          await browser.close();
          fs.writeFileSync('pipeline/audits/_tmp_ch03_overflow_sources.json', JSON.stringify(outputs,null,2));
          JS
          node ch03-overflow-inspect.mjs
      - name: Commit overflow diagnostic
        run: |
          rm -rf node_modules package.json package-lock.json ch03-overflow-inspect.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline/audits/_tmp_ch03_overflow_sources.json
          git commit -m "Locate Chapter 3 overflow sources"
          git pull --rebase origin main
          git push origin HEAD:main
