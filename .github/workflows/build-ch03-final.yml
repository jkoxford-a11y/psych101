name: Capture Chapter 3 browser results

on:
  push:
    paths:
      - ".github/workflows/build-ch03-final.yml"

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install browser
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1

      - name: Capture all viewport checks
        continue-on-error: true
        run: |
          python3 -m http.server 8000 --directory docs >/tmp/ch03-server.log 2>&1 &
          cat > ch03-browser-capture.mjs <<'JS'
          import fs from 'node:fs';
          import { chromium } from 'playwright';
          const viewports = [
            { name: 'desktop', width: 1440, height: 900 },
            { name: 'portrait-mobile', width: 390, height: 844 },
            { name: 'landscape-mobile', width: 844, height: 390 },
          ];
          const results = [];
          const browser = await chromium.launch({ headless: true });
          for (const viewport of viewports) {
            const page = await browser.newPage({ viewport });
            const consoleErrors = [];
            const pageErrors = [];
            const failedResponses = [];
            page.on('console', msg => { if (msg.type() === 'error') consoleErrors.push(msg.text()); });
            page.on('pageerror', err => pageErrors.push(String(err)));
            page.on('response', response => {
              if (response.status() >= 400 && response.url().startsWith('http://127.0.0.1:8000/')) failedResponses.push(`${response.status()} ${response.url()}`);
            });
            await page.goto('http://127.0.0.1:8000/chapters/03-neuroscience.html', { waitUntil: 'networkidle' });
            await page.waitForTimeout(500);
            const structural = await page.evaluate(async () => {
              const images = [...document.querySelectorAll('.chapter-figure img')];
              const labs = [...document.querySelectorAll('a[href*="../labs/ch03/"]')];
              const labLinks = await Promise.all(labs.map(async link => {
                const response = await fetch(link.href);
                return { href: link.getAttribute('href'), status: response.status };
              }));
              const videoSource = document.querySelector('.chapter-video video source')?.getAttribute('src') || '';
              let videoStatus = null;
              if (videoSource) videoStatus = (await fetch(new URL(videoSource, document.baseURI))).status;
              return {
                documentOverflow: document.documentElement.scrollWidth - window.innerWidth,
                bodyOverflow: document.body.scrollWidth - window.innerWidth,
                activeSidebar: Boolean(document.querySelector('.sidebar a.active')),
                activeSidebarText: document.querySelector('.sidebar a.active')?.textContent?.trim() || null,
                figureCount: document.querySelectorAll('.chapter-figure.expandable').length,
                imageCount: images.length,
                brokenImages: images.filter(img => !img.complete || img.naturalWidth === 0).map(img => img.getAttribute('src')),
                labLinks,
                videoCount: document.querySelectorAll('.chapter-video video').length,
                videoStatus,
                detailsCount: document.querySelectorAll('.review-q details').length,
              };
            });
            let expanded = null;
            let collapsed = null;
            try {
              const toggle = page.locator('.chapter-figure.expandable .figure-expand-toggle').first();
              await toggle.click();
              expanded = await page.locator('.chapter-figure.expandable').first().evaluate(el => ({classExpanded: el.classList.contains('is-expanded'), ariaExpanded: el.querySelector('.figure-expand-toggle')?.getAttribute('aria-expanded')}));
              await toggle.click();
              collapsed = await page.locator('.chapter-figure.expandable').first().evaluate(el => ({classExpanded: el.classList.contains('is-expanded'), ariaExpanded: el.querySelector('.figure-expand-toggle')?.getAttribute('aria-expanded')}));
            } catch (error) {
              pageErrors.push(`toggle check: ${String(error)}`);
            }
            const assertions = {
              documentOverflow: structural.documentOverflow <= 2,
              bodyOverflow: structural.bodyOverflow <= 2,
              activeSidebar: structural.activeSidebar,
              figures: structural.figureCount === 10,
              images: structural.imageCount === 10 && structural.brokenImages.length === 0,
              labs: structural.labLinks.length === 3 && structural.labLinks.every(item => item.status === 200),
              video: structural.videoCount === 1 && structural.videoStatus === 200,
              details: structural.detailsCount === 12,
              expand: expanded?.classExpanded === true && expanded?.ariaExpanded === 'true',
              collapse: collapsed?.classExpanded === false && collapsed?.ariaExpanded === 'false',
              console: consoleErrors.length === 0,
              pageErrors: pageErrors.length === 0,
              responses: failedResponses.length === 0,
            };
            results.push({viewport, structural, expanded, collapsed, assertions, consoleErrors, pageErrors, failedResponses, passed: Object.values(assertions).every(Boolean)});
            await page.close();
          }
          await browser.close();
          fs.writeFileSync('pipeline/audits/_tmp_ch03_browser_results.json', JSON.stringify(results, null, 2));
          JS
          node ch03-browser-capture.mjs

      - name: Commit result object
        if: always()
        run: |
          rm -rf node_modules package.json package-lock.json ch03-browser-capture.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline/audits/_tmp_ch03_browser_results.json
          git commit -m "Capture Chapter 3 browser results"
          git pull --rebase origin main
          git push origin HEAD:main
