name: Inspect Chapter 3 callout IDs

on:
  push:
    paths:
      - ".github/workflows/build-ch03-final.yml"

permissions:
  contents: write

jobs:
  inspect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Patch, build, and inspect
        shell: bash
        run: |
          python - <<'PY' > /tmp/inspect.log 2>&1
          from pathlib import Path
          import re

          converter = Path("pipeline/build_chapter_html.mjs")
          text = converter.read_text(encoding="utf-8")
          start = text.index("function convertStructuredCallouts(html) {")
          head, tail = text[:start], text[start:]
          old = 'return `<div class="callout callout--${variant}"><div class="callout-title">${title}</div>${body.trim()}</div>`;'
          new = 'return `<div class="callout callout--${variant}" id="${slugify(title)}"><div class="callout-title">${title}</div>${body.trim()}</div>`;'
          tail = tail.replace(old, new, 1)
          old_b = '(?=<h4>|<div class="callout callout--stop-retrieve">|<h[23]|$)'
          new_b = '(?=<h4>|<div class="callout callout--stop-retrieve">|<div class="callout callout--do-not-confuse">|<h[23]|$)'
          tail = tail.replace(old_b, new_b, 1)
          patched = head + tail
          converter.write_text(patched, encoding="utf-8")
          print("POST-PATCH WRAP LINES")
          for line in patched.splitlines():
              if 'body.trim()' in line or 'Classic Study:' in line and 'h4' in line:
                  print(repr(line))

          source = Path("source/chapters/ch03-neuroscience-biological-bases.md")
          chapter = source.read_text(encoding="utf-8")
          chapter = chapter.replace("#section-4-the-bodys-stress-response--fast-and-slow-coordination", "#section-4-the-bodys-stress-response-fast-and-slow-coordination")
          chapter = chapter.replace("#section-1-how-neurons-talk--structure-and-the-action-potential", "#section-1-how-neurons-talk-structure-and-the-action-potential")
          source.write_text(chapter, encoding="utf-8")
          PY

          npm init -y >/dev/null 2>&1
          npm install --no-save marked@12.0.2 >/dev/null 2>&1
          node pipeline/build_chapter_html.mjs 3 >> /tmp/inspect.log 2>&1

          python - <<'PY' >> /tmp/inspect.log 2>&1
          from pathlib import Path
          import re
          text = Path("docs/chapters/03-neuroscience.html").read_text(encoding="utf-8")
          print("GENERATED CALLOUT OPENINGS")
          for tag in re.findall(r'<div class="callout callout--(?:classic-study|do-not-confuse)"[^>]*>', text):
              print(repr(tag))
          print("CONNECTION ANCHORS")
          for target in re.findall(r'href="#([^"]+)"', text):
              if "classic-study" in target or "do-not-confuse" in target:
                  print(repr(target))
          PY

      - name: Commit inspection report only
        if: always()
        run: |
          git reset --hard HEAD
          {
            echo "# Temporary Chapter 3 Callout-ID Inspection"
            echo '```'
            cat /tmp/inspect.log 2>/dev/null || true
            echo '```'
          } > pipeline/audits/_tmp_ch03_callout_id_inspection.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline/audits/_tmp_ch03_callout_id_inspection.md
          git commit -m "Record Chapter 3 callout ID inspection"
          git pull --rebase origin main
          git push origin HEAD:main
