name: Finalize Chapter 13 Revision

on:
  push:
    branches:
      - work/ch13-canonical-revision
    paths:
      - pipeline/finalize_ch13_revision.py
      - .github/workflows/finalize-ch13.yml

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/ch13-canonical-revision
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install build dependencies
        run: python -m pip install --disable-pip-version-check markdown-it-py beautifulsoup4
      - name: Build, reconcile, and validate Chapter 13
        run: python pipeline/finalize_ch13_revision.py
      - name: Check JavaScript syntax
        run: |
          node --check docs/js/labs-diagnosis-under-uncertainty.js
          node --check docs/js/sidebar.js
      - name: Run repository chapter linter
        run: python pipeline/lint_chapters.py docs/chapters/13-disorders-therapy.html
      - name: Check generated diff
        run: git diff --check
      - name: Commit finalized revision state
        run: |
          rm pipeline/finalize_ch13_revision.py .github/workflows/finalize-ch13.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add -A
          git commit -m 'Finalize Chapter 13 canonical revision'
          git push origin HEAD:work/ch13-canonical-revision
