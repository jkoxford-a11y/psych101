name: Wrap Chapter 3 Figure 3.9 thumbnail

on:
  push:
    paths:
      - ".github/workflows/export-ch03-fig39.yml"

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Wrap encoded thumbnail
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('pipeline/audits/_tmp_ch03_fig39_thumbnail.b64.txt')
          data = ''.join(path.read_text(encoding='ascii').split())
          path.write_text('\n'.join(data[i:i+900] for i in range(0, len(data), 900)) + '\n', encoding='ascii')
          PY
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline/audits/_tmp_ch03_fig39_thumbnail.b64.txt
          git commit -m "Wrap temporary Chapter 3 Figure 3.9 thumbnail data"
          git pull --rebase origin main
          git push origin HEAD:main
