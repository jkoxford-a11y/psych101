name: Log Chapter 3 follow-up

on:
  push:
    paths:
      - ".github/workflows/log-ch03-tomorrow-once.yml"

permissions:
  contents: write

jobs:
  log:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Append Chapter 3 log entry
        shell: python
        run: |
          from pathlib import Path

          path = Path("GPT_project_log.md")
          text = path.read_text(encoding="utf-8")
          heading = "### 2026-07-16 - Chapter 3 Regeneration, Figure Approval, and Deferred Live Check"
          if heading not in text:
              entry = """

### 2026-07-16 - Chapter 3 Regeneration, Figure Approval, and Deferred Live Check

- **Scope:** Added Chapter 3 to `pipeline/build_chapter_html.mjs`, regenerated `docs/chapters/03-neuroscience.html` from the canonical Markdown, repaired converter handling for structured callouts and generated anchors, and validated the generated chapter structure.
- **Figure decision:** Directly inspected and approved Figure 3.9. Sympathetic and parasympathetic systems remain the two primary branches; fight, flight, freeze, and tend-and-befriend appear in a separate behavioral-response band rather than as autonomic branches. Updated `docs/images/ch03/README_captions_alt_text_attribution.md` accordingly.
- **Validation:** Confirmed ten figures, three Do Not Confuse panels, two Classic Study panels, twelve review questions, valid internal anchors, correct chapter-ending order, reachable Chapter 3 labs and video asset, working figure expand/collapse state, and no stale high-risk claims or mojibake. Durable details are in `pipeline/audits/ch03-post-revision-validation.md`.
- **Remaining issue:** Browser diagnostics isolated page-level horizontal overflow to the saltatory-conduction video retaining its 1536-pixel intrinsic width. Commit `7d27cc9` adds a runtime width constraint through `docs/js/figure-expand.js`, but the post-fix three-viewport Playwright rerun could not be completed because GitHub Actions did not execute reliably and the local container could not reach GitHub.
- **Deferred next action:** Tomorrow, rerun the live Chapter 3 page at 1440×900, 390×844, and 844×390; confirm zero horizontal overflow; then move the responsive-video rule into shared CSS and remove the JavaScript fallback if the CSS path is verified.
"""
              path.write_text(text.rstrip() + entry + "\n", encoding="utf-8")

      - name: Commit log entry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add GPT_project_log.md
          git commit -m "Log Chapter 3 follow-up for tomorrow"
          git pull --rebase origin main
          git push origin HEAD:main
