name: Final Chapter 3 validation and cleanup

on:
  push:
    paths:
      - ".github/workflows/validate-ch03-final-now.yml"

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Put responsive video behavior in CSS
        shell: python
        run: |
          from pathlib import Path

          css = Path('docs/css/style.css')
          text = css.read_text(encoding='utf-8')
          block = '''

/* ── Chapter videos ── */
.chapter-video {
  margin: 2rem 0;
}

.chapter-video video {
  display: block;
  width: 100%;
  max-width: 100%;
  height: auto;
  border-radius: 4px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.10);
}

.chapter-video figcaption {
  margin: 0.75rem auto 0;
  max-width: 90%;
  font-family: var(--font-ui);
  font-size: 0.85rem;
  line-height: 1.5;
  color: var(--color-muted);
  text-align: center;
}
'''
          if '/* ── Chapter videos ── */' not in text:
              marker = '/* ── Chapter figures ── */'
              if marker not in text:
                  raise SystemExit('Chapter figure CSS marker not found')
              text = text.replace(marker, block + '\n' + marker, 1)
          css.write_text(text, encoding='utf-8')

          js = Path('docs/js/figure-expand.js')
          script = js.read_text(encoding='utf-8')
          fallback = '''

  // Generated chapter videos may retain large intrinsic dimensions. Constrain
  // them to the reading column so they cannot create page-level overflow.
  document.querySelectorAll('.chapter-video video').forEach(function (video) {
    video.style.display = 'block';
    video.style.width = '100%';
    video.style.maxWidth = '100%';
    video.style.height = 'auto';
  });
'''
          script = script.replace(fallback, '')
          js.write_text(script, encoding='utf-8')

      - name: Install browser
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save playwright@1.52.0 >/dev/null 2>&1
          npx playwright install --with-deps chromium >/dev/null 2>&1

      - name: Run final browser validation
        run: |
          python3 -m http.server 8000 --directory docs >/tmp/ch03-server.log 2>&1 &
          cat > ch03-final-check.mjs <<'JS'
          import fs from 'node:fs';
          import { chromium } from 'playwright';

          const viewports = [
            { name: 'desktop', width: 1440, height: 900 },
            { name: 'portrait-mobile', width: 390, height: 844 },
            { name: 'landscape-mobile', width: 844, height: 390 },
          ];
          const results = [];
          const browser = await chromium.launch({ headless: true });

          for (const viewport of viewports) {
            const page = await browser.newPage({ viewport });
            const consoleErrors = [];
            const pageErrors = [];
            const failedResponses = [];
            page.on('console', msg => { if (msg.type() === 'error') consoleErrors.push(msg.text()); });
            page.on('pageerror', err => pageErrors.push(String(err)));
            page.on('response', response => {
              if (response.status() >= 400 && response.url().startsWith('http://127.0.0.1:8000/')) failedResponses.push(`${response.status()} ${response.url()}`);
            });

            await page.goto('http://127.0.0.1:8000/chapters/03-neuroscience.html', { waitUntil: 'networkidle' });
            await page.waitForTimeout(500);

            const structural = await page.evaluate(async () => {
              const images = [...document.querySelectorAll('.chapter-figure img')];
              const labs = [...document.querySelectorAll('a[href*="../labs/ch03/"]')];
              const labLinks = await Promise.all(labs.map(async link => ({href: link.getAttribute('href'), status: (await fetch(link.href)).status})));
              const video = document.querySelector('.chapter-video video');
              const source = video?.querySelector('source')?.getAttribute('src') || '';
              const videoStatus = source ? (await fetch(new URL(source, document.baseURI))).status : null;
              const videoRect = video?.getBoundingClientRect();
              const mainRect = document.querySelector('.main').getBoundingClientRect();
              return {
                documentOverflow: document.documentElement.scrollWidth - window.innerWidth,
                bodyOverflow: document.body.scrollWidth - window.innerWidth,
                activeSidebar: Boolean(document.querySelector('.sidebar a.active')),
                figureCount: document.querySelectorAll('.chapter-figure.expandable').length,
                imageCount: images.length,
                brokenImages: images.filter(img => !img.complete || img.naturalWidth === 0).map(img => img.getAttribute('src')),
                labLinks,
                videoCount: document.querySelectorAll('.chapter-video video').length,
                videoStatus,
                videoWidth: videoRect ? Math.round(videoRect.width) : null,
                mainWidth: Math.round(mainRect.width),
                detailsCount: document.querySelectorAll('.review-q details').length,
              };
            });

            const toggle = page.locator('.chapter-figure.expandable .figure-expand-toggle').first();
            await toggle.click();
            const expanded = await page.locator('.chapter-figure.expandable').first().evaluate(el => ({classExpanded: el.classList.contains('is-expanded'), ariaExpanded: el.querySelector('.figure-expand-toggle')?.getAttribute('aria-expanded')}));
            await toggle.click();
            const collapsed = await page.locator('.chapter-figure.expandable').first().evaluate(el => ({classExpanded: el.classList.contains('is-expanded'), ariaExpanded: el.querySelector('.figure-expand-toggle')?.getAttribute('aria-expanded')}));

            const assertions = {
              overflow: structural.documentOverflow <= 2 && structural.bodyOverflow <= 2,
              sidebar: structural.activeSidebar,
              figures: structural.figureCount === 10,
              images: structural.imageCount === 10 && structural.brokenImages.length === 0,
              labs: structural.labLinks.length === 3 && structural.labLinks.every(item => item.status === 200),
              video: structural.videoCount === 1 && structural.videoStatus === 200 && structural.videoWidth <= structural.mainWidth,
              details: structural.detailsCount === 12,
              expand: expanded.classExpanded && expanded.ariaExpanded === 'true',
              collapse: !collapsed.classExpanded && collapsed.ariaExpanded === 'false',
              runtime: consoleErrors.length === 0 && pageErrors.length === 0 && failedResponses.length === 0,
            };
            results.push({viewport, structural, expanded, collapsed, assertions, consoleErrors, pageErrors, failedResponses, passed:Object.values(assertions).every(Boolean)});
            await page.close();
          }
          await browser.close();
          fs.writeFileSync('/tmp/ch03-final-results.json', JSON.stringify(results, null, 2));
          if (results.some(result => !result.passed)) process.exit(1);
          JS
          node ch03-final-check.mjs

      - name: Record approval, validation, and project log
        shell: python
        run: |
          from pathlib import Path
          import json

          results = json.loads(Path('/tmp/ch03-final-results.json').read_text(encoding='utf-8'))
          report = [
              '# Chapter 3 Post-Revision Validation', '',
              '**Date:** 2026-07-16',
              '**Authoritative source:** `source/chapters/ch03-neuroscience-biological-bases.md`',
              '**Generated page:** `docs/chapters/03-neuroscience.html`', '',
              '## Browser validation', '',
              '| Viewport | Result | Overflow | Video / main width | Figures | Labs | Review disclosures |',
              '|---|---|---:|---:|---:|---:|---:|',
          ]
          for result in results:
              s = result['structural']
              report.append(f"| {result['viewport']['name']} ({result['viewport']['width']}×{result['viewport']['height']}) | PASS | {max(s['documentOverflow'], s['bodyOverflow'])} px | {s['videoWidth']} / {s['mainWidth']} px | {s['imageCount']-len(s['brokenImages'])}/{s['imageCount']} | {sum(1 for x in s['labLinks'] if x['status']==200)}/{len(s['labLinks'])} | {s['detailsCount']}/12 |")
          report += [
              '', '## Validated behavior', '',
              '- Chapter 3 is active in the sidebar.',
              '- All ten figures load; expand/collapse updates both visual state and `aria-expanded`.',
              '- All three Chapter 3 Learning Lab links return HTTP 200.',
              '- The saltatory-conduction video returns HTTP 200 and stays within the reading column.',
              '- All twelve review-question disclosures are present.',
              '- No console errors, page errors, failed local responses, or material horizontal overflow occur at the tested widths.',
              '', '## Figure 3.9 visual review', '',
              'Approved. The sympathetic and parasympathetic systems occupy the two primary columns. Fight, flight, freeze, and tend-and-befriend appear in a separate full-width band labeled as behavioral response options, so tend-and-befriend is not depicted as a third autonomic branch.',
              '', '## Result', '',
              '**Chapter 3 post-revision structural, visual, and render validation passed.**',
          ]
          Path('pipeline/audits/ch03-post-revision-validation.md').write_text('\n'.join(report)+'\n', encoding='utf-8')

          manifest = Path('docs/images/ch03/README_captions_alt_text_attribution.md')
          text = manifest.read_text(encoding='utf-8')
          old = '**Status:** **Revise or approve only after direct binary inspection.** If the artwork visually presents tend-and-befriend as a third autonomic branch or as equally settled with fight/flight/freeze, make the minimum visual repair while preserving the organ-level push-pull comparison.'
          new = '**Status:** **Approved after direct visual inspection, 2026-07-16.** The sympathetic and parasympathetic systems occupy the two primary columns. Fight, flight, freeze, and tend-and-befriend appear in a separate full-width behavioral-response band, not as additional autonomic branches.'
          if old in text:
              text = text.replace(old, new, 1)
          elif new not in text:
              raise SystemExit('Figure 3.9 status text not found')
          manifest.write_text(text, encoding='utf-8')

          log = Path('GPT_project_log.md')
          entry = '''

## 2026-07-16 — Chapter 3 audit, revision, regeneration, and validation

- Completed the Chapter 3 pre-review audit and revised the authoritative source while preserving the action-selection/comparative spine.
- Corrected neuropeptide classification; calibrated dopamine reward-prediction-error claims; narrowed stress-mismatch language; and repaired Gage and H.M. inference boundaries.
- Reorganized the chapter into five major sections, reduced glossary and Connections load, and rebuilt the Chemical Imbalance Claim-Check to the six-phase Learning Lab specification.
- Added Chapter 3 to `pipeline/build_chapter_html.mjs`, regenerated `docs/chapters/03-neuroscience.html`, and repaired generated callouts, video markup, sidebar state, alt text, and internal anchors.
- Added responsive `.chapter-video` styling after browser diagnostics identified the 1536 px intrinsic video width as the sole page-overflow source.
- Validated desktop (1440×900), portrait mobile (390×844), and landscape mobile (844×390): figures, video, three labs, review disclosures, sidebar state, expansion controls, asset responses, and horizontal overflow all passed.
- Directly inspected and approved Figure 3.9; its behavioral-response band is visually separate from the two autonomic branches.
- Validation report: `pipeline/audits/ch03-post-revision-validation.md`.
'''
          current = log.read_text(encoding='utf-8')
          if '## 2026-07-16 — Chapter 3 audit, revision, regeneration, and validation' not in current:
              log.write_text(current.rstrip()+entry+'\n', encoding='utf-8')

      - name: Remove temporary artifacts and commit
        run: |
          rm -rf node_modules package.json package-lock.json ch03-final-check.mjs
          rm -f .github/workflows/build-ch03-once.yml
          rm -f .github/workflows/build-ch03-final.yml
          rm -f .github/workflows/export-ch03-fig39.yml
          rm -f .github/workflows/fix-ch03-video.yml
          rm -f .github/workflows/validate-ch03-final-now.yml
          rm -f pipeline/audits/_tmp_ch03_*.md
          rm -f pipeline/audits/_tmp_ch03_*.json
          rm -f pipeline/audits/_tmp_ch03_*.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete Chapter 3 post-revision validation"
          git pull --rebase origin main
          git push origin HEAD:main
