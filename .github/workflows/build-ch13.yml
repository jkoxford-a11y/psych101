name: Build Chapter 13 HTML

on:
  push:
    branches:
      - work/ch13-canonical-revision
    paths:
      - source/chapters/ch13-psychological-disorders-therapy.md
      - pipeline/build_ch13_html.py
      - .github/workflows/build-ch13.yml

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: work/ch13-canonical-revision
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install converter dependencies
        run: python -m pip install --disable-pip-version-check markdown-it-py beautifulsoup4
      - name: Build Chapter 13
        run: python pipeline/build_ch13_html.py
      - name: Validate generated page
        run: |
          python - <<'PY'
          from pathlib import Path
          from bs4 import BeautifulSoup

          path = Path('docs/chapters/13-disorders-therapy.html')
          soup = BeautifulSoup(path.read_text(encoding='utf-8'), 'html.parser')
          assert len(soup.select('figure.chapter-figure')) == 8
          assert len(soup.select('.review-q')) == 10
          assert len(soup.find_all('details')) == 10
          assert len(soup.select('.callout--stop-retrieve')) >= 4
          assert len(soup.select('.callout--think-about-it')) >= 4
          assert not any(not img.get('alt', '').strip() for img in soup.find_all('img'))
          assert ' ? ' not in path.read_text(encoding='utf-8')
          assert soup.find('h2', id='further-reading').find_next_sibling(class_='further-reading')
          assert soup.find('h2', id='references').find_next_sibling(class_='references')
          print('Chapter 13 structural validation passed.')
          PY
      - name: Commit generated HTML
        run: |
          if git diff --quiet -- docs/chapters/13-disorders-therapy.html; then
            echo 'Generated HTML already current.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add docs/chapters/13-disorders-therapy.html
          git commit -m 'Regenerate Chapter 13 HTML'
          git push origin HEAD:work/ch13-canonical-revision
