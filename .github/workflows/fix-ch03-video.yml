name: Diagnose Chapter 3 responsive video patch

on:
  push:
    paths:
      - ".github/workflows/fix-ch03-video.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Patch CSS
        id: patch
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY' > /tmp/patch.log 2>&1
          from pathlib import Path
          path = Path('docs/css/style.css')
          text = path.read_text(encoding='utf-8')
          marker = '/* ── Chapter figures ── */'
          print('marker count', text.count(marker))
          print('existing block', '/* ── Chapter videos ── */' in text)
          block = '''

/* ── Chapter videos ── */
.chapter-video {
  margin: 2rem 0;
}
.chapter-video video {
  display: block;
  width: 100%;
  max-width: 100%;
  height: auto;
  border-radius: 4px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.10);
}
.chapter-video figcaption {
  margin: 0.75rem auto 0;
  max-width: 90%;
  font-family: var(--font-ui);
  font-size: 0.85rem;
  line-height: 1.5;
  color: var(--color-muted);
  text-align: center;
}
'''
          if '/* ── Chapter videos ── */' not in text:
              if marker not in text:
                  raise RuntimeError('marker absent')
              text = text.replace(marker, block + '\n' + marker, 1)
          path.write_text(text, encoding='utf-8')
          print('changed', '/* ── Chapter videos ── */' in path.read_text(encoding='utf-8'))
          PY
          git diff -- docs/css/style.css >> /tmp/patch.log 2>&1
      - name: Commit CSS if patch succeeded
        id: commitcss
        if: steps.patch.outcome == 'success'
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/css/style.css
          git commit -m "Make chapter videos responsive" > /tmp/commit.log 2>&1
          git pull --rebase origin main >> /tmp/commit.log 2>&1
          git push origin HEAD:main >> /tmp/commit.log 2>&1
      - name: Record failure diagnostic
        if: always() && steps.commitcss.outcome != 'success'
        run: |
          git reset --hard HEAD
          {
            echo '# Temporary Chapter Video Patch Diagnostic'
            echo
            echo '- patch: ${{ steps.patch.outcome }}'
            echo '- commit/push: ${{ steps.commitcss.outcome }}'
            echo
            echo '## Patch log'
            echo '```'
            cat /tmp/patch.log 2>/dev/null || true
            echo '```'
            echo
            echo '## Commit log'
            echo '```'
            cat /tmp/commit.log 2>/dev/null || true
            echo '```'
          } > pipeline/audits/_tmp_ch03_video_patch_diagnostic.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline/audits/_tmp_ch03_video_patch_diagnostic.md
          git commit -m "Record Chapter 3 video patch diagnostic"
          git pull --rebase origin main
          git push origin HEAD:main
