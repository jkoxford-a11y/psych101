name: Build Chapter 3 once

on:
  push:
    paths:
      - ".github/workflows/build-ch03-once.yml"

permissions:
  contents: write

jobs:
  build-chapter-3:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Improve shared converter for Chapter 3 structures
        shell: python
        run: |
          from pathlib import Path

          path = Path("pipeline/build_chapter_html.mjs")
          text = path.read_text(encoding="utf-8")

          old_entry = '''  "3": {
          source: "source/chapters/ch03-neuroscience-biological-bases.md",
          output: "docs/chapters/03-neuroscience.html",
          title: "Neuroscience & Biological Bases of Behavior",
          pillar: "Biological",
          },
          '''
          new_entry = '''  "3": {
            source: "source/chapters/ch03-neuroscience-biological-bases.md",
            output: "docs/chapters/03-neuroscience.html",
            title: "Neuroscience & Biological Bases of Behavior",
            pillar: "Biological",
          },
          '''
          text = text.replace(old_entry, new_entry)

          heading_anchor = r'''function addHeadingIds(html) {
            return html.replace(/<h([23])>([\s\S]*?)<\/h\1>/g, (_all, level, label) => {
              return `<h${level} id="${slugify(label)}">${label}</h${level}>`;
            });
          }
          '''
          if "function cleanFigureAlt" not in text:
              addition = r'''
          function cleanFigureAlt(value) {
            return value.replace(/^Figure \d+\.\d+\s*[—-]\s*/, "").trim();
          }
          '''
              if heading_anchor not in text:
                  raise SystemExit("Could not find heading helper anchor")
              text = text.replace(heading_anchor, heading_anchor + addition, 1)

          if "const cleanAlt = cleanFigureAlt(alt);" not in text:
              cap_line = '      const cap = caption.replace(/^(Figure \\d+\\.\\d+)\\.\\s*/, "<strong>$1.</strong> ");'
              replacement = '      const cleanAlt = cleanFigureAlt(alt);\n' + cap_line
              if text.count(cap_line) != 2:
                  raise SystemExit("Expected two figure-caption conversion sites")
              text = text.replace(cap_line, replacement)
              text = text.replace('alt="${alt}"', 'alt="${cleanAlt}"')

          if "function convertVideoBlocks" not in text:
              marker = "\nfunction convertCallouts(html) {"
              addition = r'''
          function convertVideoBlocks(html) {
            return html.replace(
              /(<video[\s\S]*?<\/video>)\s*\*Video (\d+\.\d+)\. ([\s\S]*?)\*(?=\s*<)/g,
              (_all, video, number, caption) => {
                return `<figure class="chapter-video">\n${video}\n<figcaption><strong>Video ${number}.</strong> ${caption.trim()}</figcaption>\n</figure>`;
              },
            );
          }
          '''
              if marker not in text:
                  raise SystemExit("Could not find callout conversion marker")
              text = text.replace(marker, addition + marker, 1)

          if '["A note on a popular myth", "misconception"]' not in text:
              class_marker = "  const classes = [\n"
              text = text.replace(
                  class_marker,
                  class_marker + '    ["A note on a popular myth", "misconception"],\n',
                  1,
              )

          if "function convertStructuredCallouts" not in text:
              marker = "\nfunction wrapSpecialSections(html) {"
              addition = r'''
          function convertStructuredCallouts(html) {
            const wrap = (variant, title, body) => {
              return `<div class="callout callout--${variant}"><div class="callout-title">${title}</div>${body.trim()}</div>`;
            };

            html = html.replace(
              /<h4>(Do Not Confuse: Neurotransmitter vs\. Hormone)<\/h4>([\s\S]*?)(?=<figure class="chapter-figure expandable">)/,
              (_all, title, body) => wrap("do-not-confuse", title, body),
            );
            html = html.replace(
              /<h4>(Do Not Confuse: Chemical Influence vs\. Chemical Cause)<\/h4>([\s\S]*?)(?=<blockquote>)/,
              (_all, title, body) => wrap("do-not-confuse", title, body),
            );
            html = html.replace(
              /<h4>(Do Not Confuse: Hemispheric Specialization[\s\S]*?Personality[^<]*?)<\/h4>([\s\S]*?)(?=<p>Calling the amygdala)/,
              (_all, title, body) => wrap("do-not-confuse", title, body),
            );
            html = html.replace(
              /<h4>(Classic Study:[\s\S]*?)<\/h4>([\s\S]*?)(?=<h4>|<div class="callout callout--stop-retrieve">|<h[23]|$)/g,
              (_all, title, body) => wrap("classic-study", title, body),
            );
            html = html.replace(
              '<div class="callout callout--misconception">',
              '<div class="callout callout--misconception" id="misconception-opener">',
            );
            return html;
          }
          '''
              if marker not in text:
                  raise SystemExit("Could not find special-section marker")
              text = text.replace(marker, addition + marker, 1)

          old_objectives = r'''    (_all, heading, content) => `${heading}<div class="callout callout--objectives"><div class="callout-title">By the end of this chapter, you should be able to:</div>${content}</div>`,
          '''
          new_objectives = r'''    (_all, heading, content) => {
              const cleaned = content.replace(/^\s*<p>By the end of this chapter, you should be able to:<\/p>\s*/, "");
              return `${heading}<div class="callout callout--objectives"><div class="callout-title">By the end of this chapter, you should be able to:</div>${cleaned}</div>`;
            },
          '''
          if old_objectives in text:
              text = text.replace(old_objectives, new_objectives, 1)

          if "body = convertVideoBlocks(body);" not in text:
              text = text.replace(
                  "  body = convertFigures(body);\n",
                  "  body = convertFigures(body);\n  body = convertVideoBlocks(body);\n",
                  1,
              )
          if "body = convertStructuredCallouts(body);" not in text:
              text = text.replace(
                  "  body = convertCallouts(body);\n",
                  "  body = convertCallouts(body);\n  body = convertStructuredCallouts(body);\n",
                  1,
              )

          if 'const activeId = number.padStart(2, "0");' not in text:
              text = text.replace(
                  '  const pillarEscaped = config.pillar.replace(/&/g, "&amp;");\n',
                  '  const pillarEscaped = config.pillar.replace(/&/g, "&amp;");\n  const activeId = number.padStart(2, "0");\n',
                  1,
              )
          text = text.replace('data-active="${number}"', 'data-active="${activeId}"')

          path.write_text(text, encoding="utf-8")

      - name: Install isolated converter dependency
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save marked@12.0.2 >/dev/null 2>&1

      - name: Build Chapter 3 HTML
        run: node pipeline/build_chapter_html.mjs 3

      - name: Validate generated Chapter 3
        shell: python
        run: |
          from pathlib import Path
          import re

          html_path = Path("docs/chapters/03-neuroscience.html")
          text = html_path.read_text(encoding="utf-8")

          required = [
              "Why Do We Have a Brain?",
              "Section 2: From Synapses to Circuits",
              "Section 3: Hormones and Whole-Body Signaling",
              "Section 4: The Body’s Stress Response — Fast and Slow Coordination",
              "Section 5: The Brain — Specialization Without Lego-Brain Thinking",
              "In selected reward-learning tasks",
              "medial-temporal systems",
              "Chemical Imbalance Claim-Check",
              "figure-expand.js",
              '<dl class="key-terms">',
              '<figure class="chapter-video">',
              '<div class="callout callout--misconception" id="misconception-opener">',
              'data-active="03"',
          ]
          for item in required:
              if item not in text:
                  raise SystemExit(f"Missing required generated content: {item}")

          forbidden = [
              "Drafting history & provenance",
              "dopamine's predictive-error signal is the chemical mechanism underlying reinforcement learning",
              "the hippocampus's specific role in forming (not storing) new memories",
              "continuous, balanced influence",
              "�",
              "â€”",
              "â€™",
              "Â",
              '*Video 3.1.',
              'alt="Figure 3.',
              '<h4>Do Not Confuse:',
              '<h4>Classic Study:',
              '<p>By the end of this chapter, you should be able to:</p>',
          ]
          lowered = text.lower()
          for item in forbidden:
              if item.lower() in lowered:
                  raise SystemExit(f"Forbidden or stale generated content remains: {item}")

          figures = re.findall(r'<figure class="chapter-figure expandable">', text)
          if len(figures) != 10:
              raise SystemExit(f"Expected 10 expandable figures, found {len(figures)}")

          images = re.findall(r'<img\s+[^>]*alt="([^"]*)"[^>]*>', text)
          if len(images) != 10 or any(not alt.strip() for alt in images):
              raise SystemExit(f"Expected 10 figures with non-empty alt text; found {len(images)}")

          if text.count('callout--do-not-confuse') != 3:
              raise SystemExit("Expected three Do Not Confuse callouts")
          if text.count('callout--classic-study') != 2:
              raise SystemExit("Expected two Classic Study callouts")

          questions = re.findall(r'<div class="review-q">', text)
          if len(questions) != 12:
              raise SystemExit(f"Expected 12 review questions, found {len(questions)}")

          terms = re.findall(r'<dt>', text)
          if not (20 <= len(terms) <= 24):
              raise SystemExit(f"Expected 20–24 key terms, found {len(terms)}")

          for lab in [
              "../labs/ch03/action-potential-threshold.html",
              "../labs/ch03/chemical-imbalance-claim-check.html",
              "../labs/ch03/dopamine-prediction-error.html",
          ]:
              if lab not in text:
                  raise SystemExit(f"Lab link was not normalized: {lab}")

          order = [
              text.index('id="chapter-summary"'),
              text.index('id="connections"'),
              text.index('id="review-questions"'),
              text.index('id="key-terms"'),
              text.index('id="further-reading"'),
              text.index('id="references"'),
          ]
          if order != sorted(order):
              raise SystemExit("Chapter-ending section order is incorrect")

          print("Chapter 3 generated HTML validation passed")

      - name: Remove temporary npm files
        run: rm -rf node_modules package.json package-lock.json

      - name: Commit converter and generated HTML
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline/build_chapter_html.mjs docs/chapters/03-neuroscience.html
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi
          git commit -m "Repair Chapter 3 generated structure"
          git pull --rebase origin main
          git push origin HEAD:main
