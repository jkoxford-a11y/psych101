name: Build and validate Chapter 3

on:
  push:
    paths:
      - ".github/workflows/build-ch03-once.yml"

permissions:
  contents: write

jobs:
  build-chapter-3:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Repair converter and canonical anchors
        shell: python
        run: |
          from pathlib import Path

          converter = Path("pipeline/build_chapter_html.mjs")
          text = converter.read_text(encoding="utf-8")

          callout_needle = '<div class="callout callout--${variant}">'
          callout_replacement = '<div class="callout callout--${variant}" id="${slugify(title)}">'
          if callout_needle not in text and callout_replacement not in text:
              raise SystemExit("Could not locate structured-callout wrapper")
          text = text.replace(callout_needle, callout_replacement, 1)

          old_boundary = '(?=<h4>|<div class="callout callout--stop-retrieve">|<h[23]|$)'
          new_boundary = '(?=<h4>|<div class="callout callout--stop-retrieve">|<div class="callout callout--do-not-confuse">|<h[23]|$)'
          if old_boundary not in text and new_boundary not in text:
              raise SystemExit("Could not locate Classic Study boundary")
          text = text.replace(old_boundary, new_boundary, 1)

          if 'id="${slugify(title)}"' not in text:
              raise SystemExit("Structured callout IDs were not inserted")
          if new_boundary not in text:
              raise SystemExit("Do Not Confuse boundary was not inserted")
          converter.write_text(text, encoding="utf-8")

          source = Path("source/chapters/ch03-neuroscience-biological-bases.md")
          chapter = source.read_text(encoding="utf-8")
          replacements = {
              "#section-4-the-bodys-stress-response--fast-and-slow-coordination": "#section-4-the-bodys-stress-response-fast-and-slow-coordination",
              "#section-1-how-neurons-talk--structure-and-the-action-potential": "#section-1-how-neurons-talk-structure-and-the-action-potential",
          }
          for old, new in replacements.items():
              if old in chapter:
                  chapter = chapter.replace(old, new)
              elif new not in chapter:
                  raise SystemExit(f"Neither stale nor repaired anchor found: {old}")
          source.write_text(chapter, encoding="utf-8")

      - name: Install isolated converter dependency
        run: |
          npm init -y >/dev/null 2>&1
          npm install --no-save marked@12.0.2 >/dev/null 2>&1

      - name: Build Chapter 3 HTML
        run: node pipeline/build_chapter_html.mjs 3

      - name: Validate generated Chapter 3
        shell: python
        run: |
          from pathlib import Path
          import re

          text = Path("docs/chapters/03-neuroscience.html").read_text(encoding="utf-8")

          required = [
              "Why Do We Have a Brain?",
              "Section 2: From Synapses to Circuits",
              "Section 3: Hormones and Whole-Body Signaling",
              "Section 4: The Body’s Stress Response — Fast and Slow Coordination",
              "Section 5: The Brain — Specialization Without Lego-Brain Thinking",
              "In selected reward-learning tasks",
              "medial-temporal systems",
              "Chemical Imbalance Claim-Check",
              "figure-expand.js",
              '<dl class="key-terms">',
              '<figure class="chapter-video">',
              '<div class="callout callout--misconception" id="misconception-opener">',
              'data-active="03"',
              'id="classic-study-henry-molaison-hm-and-medial-temporal-memory-systems"',
              'id="do-not-confuse-hemispheric-specialization-vs-the-left-brainright-brain-personality-myth"',
          ]
          for item in required:
              if item not in text:
                  raise SystemExit(f"Missing required generated content: {item}")

          forbidden = [
              "Drafting history & provenance",
              "dopamine's predictive-error signal is the chemical mechanism underlying reinforcement learning",
              "the hippocampus's specific role in forming (not storing) new memories",
              "continuous, balanced influence",
              "�",
              "â€”",
              "â€™",
              "Â",
              '*Video 3.1.',
              'alt="Figure 3.',
              '<h4>Do Not Confuse:',
              '<h4>Classic Study:',
              '<p>By the end of this chapter, you should be able to:</p>',
          ]
          lowered = text.lower()
          for item in forbidden:
              if item.lower() in lowered:
                  raise SystemExit(f"Forbidden or stale generated content remains: {item}")

          figures = re.findall(r'<figure class="chapter-figure expandable">', text)
          if len(figures) != 10:
              raise SystemExit(f"Expected 10 expandable figures, found {len(figures)}")
          images = re.findall(r'<img\s+[^>]*alt="([^"]*)"[^>]*>', text)
          if len(images) != 10 or any(not alt.strip() for alt in images):
              raise SystemExit("Every chapter figure must have non-empty alt text")
          if text.count('callout--do-not-confuse') != 3:
              raise SystemExit("Expected three Do Not Confuse callouts")
          if text.count('callout--classic-study') != 2:
              raise SystemExit("Expected two Classic Study callouts")
          if text.count('<div class="review-q">') != 12:
              raise SystemExit("Expected 12 review questions")
          term_count = text.count('<dt>')
          if not 20 <= term_count <= 24:
              raise SystemExit(f"Expected 20–24 key terms, found {term_count}")

          hm_start = text.index('id="classic-study-henry-molaison-hm-and-medial-temporal-memory-systems"')
          split_start = text.index('id="do-not-confuse-hemispheric-specialization-vs-the-left-brainright-brain-personality-myth"')
          hm_close = text.index('</div>', hm_start)
          if hm_close > split_start:
              raise SystemExit("H.M. Classic Study improperly contains the split-brain panel")

          ids = set(re.findall(r'\bid="([^"]+)"', text))
          internal_links = re.findall(r'href="#([^"]+)"', text)
          missing = sorted({target for target in internal_links if target not in ids})
          if missing:
              raise SystemExit(f"Broken internal anchors: {missing}")

          for lab in [
              "../labs/ch03/action-potential-threshold.html",
              "../labs/ch03/chemical-imbalance-claim-check.html",
              "../labs/ch03/dopamine-prediction-error.html",
          ]:
              if lab not in text:
                  raise SystemExit(f"Lab link was not normalized: {lab}")

          order = [
              text.index('id="chapter-summary"'),
              text.index('id="connections"'),
              text.index('id="review-questions"'),
              text.index('id="key-terms"'),
              text.index('id="further-reading"'),
              text.index('id="references"'),
          ]
          if order != sorted(order):
              raise SystemExit("Chapter-ending section order is incorrect")

          print("Chapter 3 generated HTML validation passed")

      - name: Remove temporary files
        run: |
          rm -rf node_modules package.json package-lock.json
          rm -f pipeline/audits/_tmp_ch03_workflow_diagnostic.md

      - name: Commit validated Chapter 3 build
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A pipeline/build_chapter_html.mjs source/chapters/ch03-neuroscience-biological-bases.md docs/chapters/03-neuroscience.html pipeline/audits/_tmp_ch03_workflow_diagnostic.md
          if git diff --cached --quiet; then
            echo "No validated changes to commit"
            exit 0
          fi
          git commit -m "Finalize Chapter 3 generated structure"
          git pull --rebase origin main
          git push origin HEAD:main
