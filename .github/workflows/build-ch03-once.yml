name: Diagnose Chapter 3 build

on:
  push:
    paths:
      - ".github/workflows/build-ch03-once.yml"

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Patch converter
        id: converter
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY' > /tmp/converter.log 2>&1
          from pathlib import Path
          path = Path("pipeline/build_chapter_html.mjs")
          text = path.read_text(encoding="utf-8")
          text = text.replace(
              '    return `<div class="callout callout--${variant}"><div class="callout-title">${title}</div>${body.trim()}</div>`;',
              '    return `<div class="callout callout--${variant}" id="${slugify(title)}"><div class="callout-title">${title}</div>${body.trim()}</div>`;',
          )
          text = text.replace(
              '(?=<h4>|<div class="callout callout--stop-retrieve">|<h[23]|$)',
              '(?=<h4>|<div class="callout callout--stop-retrieve">|<div class="callout callout--do-not-confuse">|<h[23]|$)',
          )
          path.write_text(text, encoding="utf-8")
          print("converter patch complete")
          PY

      - name: Patch source anchors
        id: source
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY' > /tmp/source.log 2>&1
          from pathlib import Path
          path = Path("source/chapters/ch03-neuroscience-biological-bases.md")
          text = path.read_text(encoding="utf-8")
          replacements = {
              "#section-4-the-bodys-stress-response--fast-and-slow-coordination": "#section-4-the-bodys-stress-response-fast-and-slow-coordination",
              "#section-1-how-neurons-talk--structure-and-the-action-potential": "#section-1-how-neurons-talk-structure-and-the-action-potential",
          }
          for old, new in replacements.items():
              if old not in text:
                  raise RuntimeError(f"Expected stale anchor not found: {old}")
              text = text.replace(old, new)
          path.write_text(text, encoding="utf-8")
          print("source anchor patch complete")
          PY

      - name: Install converter dependency
        id: install
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          (npm init -y >/dev/null 2>&1 && npm install --no-save marked@12.0.2) > /tmp/install.log 2>&1

      - name: Build Chapter 3
        id: build
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          node pipeline/build_chapter_html.mjs 3 > /tmp/build.log 2>&1

      - name: Validate core structure
        id: validate
        continue-on-error: true
        shell: bash
        run: |
          python - <<'PY' > /tmp/validate.log 2>&1
          from pathlib import Path
          import re
          text = Path("docs/chapters/03-neuroscience.html").read_text(encoding="utf-8")
          required = [
              'id="classic-study-henry-molaison-hm-and-medial-temporal-memory-systems"',
              'id="do-not-confuse-hemispheric-specialization-vs-the-left-brainright-brain-personality-myth"',
              'data-active="03"',
          ]
          for item in required:
              if item not in text:
                  raise RuntimeError(f"missing: {item}")
          hm_start = text.index(required[0])
          split_start = text.index(required[1])
          hm_close = text.index('</div>', hm_start)
          if hm_close > split_start:
              raise RuntimeError("H.M. wrapper contains split-brain panel")
          ids = set(re.findall(r'\bid="([^"]+)"', text))
          links = re.findall(r'href="#([^"]+)"', text)
          missing = sorted({target for target in links if target not in ids})
          if missing:
              raise RuntimeError(f"broken anchors: {missing}")
          print("validation passed")
          PY

      - name: Commit diagnostic report only
        if: always()
        shell: bash
        run: |
          git reset --hard HEAD
          mkdir -p pipeline/audits
          {
            echo "# Temporary Chapter 3 Workflow Diagnostic"
            echo
            echo "- converter: ${{ steps.converter.outcome }}"
            echo "- source anchors: ${{ steps.source.outcome }}"
            echo "- dependency install: ${{ steps.install.outcome }}"
            echo "- build: ${{ steps.build.outcome }}"
            echo "- validation: ${{ steps.validate.outcome }}"
            for file in converter source install build validate; do
              echo
              echo "## $file log"
              echo '```'
              cat "/tmp/${file}.log" 2>/dev/null || true
              echo '```'
            done
          } > pipeline/audits/_tmp_ch03_workflow_diagnostic.md
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline/audits/_tmp_ch03_workflow_diagnostic.md
          git commit -m "Record Chapter 3 build diagnostic"
          git pull --rebase origin main
          git push origin HEAD:main
