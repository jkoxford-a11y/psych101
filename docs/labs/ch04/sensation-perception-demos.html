<style>
:root {
  --bg: #0b0d12;
  --surface: #13161f;
  --surface2: #1a1e2a;
  --accent: #e8a838;
  --accent-dim: #9a7028;
  --teal: #38c8b0;
  --coral: #e85858;
  --sky: #58a0e8;
  --violet: #9878d8;
  --mint: #58d8a0;
  --text: #dce0e8;
  --dim: #7a8098;

}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;min-height:100vh}
.wrap{max-width:680px;margin:0 auto;padding:32px 20px}

.hdr-tag{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent-dim);letter-spacing:.2em;text-transform:uppercase;margin-bottom:8px}

.card{background:var(--surface);border-radius:16px;border:1px solid var(--border);padding:28px;margin-bottom:16px}

.btn-s:hover{background:#222c40}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;font-family:'IBM Plex Mono',monospace;letter-spacing:.06em;text-transform:uppercase}
.stat{text-align:center;padding:16px 18px;border-radius:12px;min-width:90px}
.stat .v{font-size:30px;font-weight:700;font-family:'IBM Plex Mono',monospace}
.stat .l{font-size:10px;color:var(--dim);margin-top:4px;font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:.1em}
.stats{display:flex;gap:14px;margin-bottom:24px;flex-wrap:wrap}
.dbtn{display:flex;align-items:center;gap:16px;padding:20px 24px;background:var(--surface);border:1px solid var(--border);border-radius:14px;cursor:pointer;transition:all .2s;text-align:left;width:100%;margin-bottom:12px;color:var(--text);font-family:'Outfit',sans-serif;font-size:16px}
.dbtn:hover{background:var(--surface2)}

.dtit{font-weight:600}
.dsub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);margin-top:2px}

.dhdr{display:flex;align-items:center;gap:12px;margin-bottom:24px}
.dhdr h2{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:700}
.exp{font-size:14px;line-height:1.7}
.inst{color:var(--dim);font-size:15px;line-height:1.6;margin-bottom:20px;text-align:center}
.meta{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim)}
.ctr{text-align:center}
.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}.mb16{margin-bottom:16px}.mb20{margin-bottom:20px}.mb24{margin-bottom:24px}.mt8{margin-top:8px}.mt16{margin-top:16px}.mt20{margin-top:20px}.mr12{margin-right:12px}
kbd{padding:3px 8px;border-radius:4px;background:var(--surface2);border:1px solid var(--border);font-family:'IBM Plex Mono',monospace;color:var(--accent);font-size:13px}
.bar-r{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-l{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);width:80px;text-align:right}
.bar-t{flex:1;height:22px;border-radius:6px;overflow:hidden}
.bar-f{height:100%;border-radius:6px;transition:width .6s}
.bar-v{font-family:'IBM Plex Mono',monospace;font-size:12px;width:55px;text-align:right}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:500px){.grid2{grid-template-columns:1fr}.stats{gap:8px}.stat{min-width:70px;padding:12px 10px}.stat .v{font-size:24px}}
</style>

<body>
<div class="wrap">
  <div class="hdr">
    <div class="hdr-tag">Chapter 4 · Interactive Demos</div>
    <h1>Sensation &amp; Perception</h1>
  </div>
  <div id="menu"></div>
  <div id="area" style="display:none"></div>
</div>
<script>
const DEMOS=[
  {id:'sdt',label:'Signal Detection',sub:'Hits, Misses & False Alarms',icon:'◎',color:'#e8a838'},
  {id:'weber',label:"Weber's Law",sub:'Difference Thresholds',icon:'⊿',color:'#38c8b0'},
  {id:'after',label:'Opponent Process Afterimage',sub:'Color Vision Theories',icon:'◐',color:'#e85858'},
  {id:'gestalt',label:'Gestalt Grouping',sub:'Perceptual Organization',icon:'◈',color:'#9878d8'},
  {id:'fade',label:'Threshold & Adaptation',sub:'Fading Dot / Troxler Effect',icon:'◌',color:'#58d8a0'},
  {id:'stroop',label:'Stroop Effect',sub:'Top-Down vs Bottom-Up Conflict',icon:'◉',color:'#58a0e8'},
  {id:'heider',label:'Heider & Simmel',sub:'Social Motion Perception',icon:'△',color:'#e878b0'},
];
const $=id=>document.getElementById(id);
const el=(t,a,...ch)=>{const e=document.createElement(t);if(a)Object.entries(a).forEach(([k,v])=>{if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k.startsWith('on'))e.addEventListener(k.slice(2).toLowerCase(),v);else e.setAttribute(k,v)});ch.flat().forEach(c=>{if(c!=null)e.appendChild(typeof c==='string'?document.createTextNode(c):c)});return e};
const svg=(t,a)=>{const e=document.createElementNS("http://www.w3.org/2000/svg",t);if(a)Object.entries(a).forEach(([k,v])=>e.setAttribute(k,v));return e};
const clr=n=>{n.innerHTML=''};
function stat(l,v,u,c){const d=el('div','stat',{});d.className='stat';d.style.background=c+'0a';d.style.border=`1px solid ${c}22`;d.appendChild(el('div',{class:'v',style:{color:c}},String(v)));d.appendChild(el('div',{class:'l'},u||l));return d}

// ─── Menu ───
function menu(){
  const m=$('menu'),a=$('area');clr(m);m.style.display='';a.style.display='none';
  DEMOS.forEach(d=>{
    const b=el('button',{class:'dbtn',onClick:()=>launch(d.id)},
      el('div',{class:'dico',style:{background:d.color+'15',color:d.color}},d.icon),
      el('div',{},el('div',{class:'dtit'},d.label),el('div',{class:'dsub'},d.sub)),
      el('div',{class:'darr'},'→')
    );
    b.addEventListener('mouseenter',()=>{b.style.borderColor=d.color+'60'});
    b.addEventListener('mouseleave',()=>{b.style.borderColor=''});
    m.appendChild(b);
  });
}

function launch(id){
  $('menu').style.display='none';
  const a=$('area');a.style.display='';clr(a);
  const info=DEMOS.find(d=>d.id===id);
  a.appendChild(el('button',{class:'back',onClick:menu},'← All Demos'));
  a.appendChild(el('div',{class:'dhdr'},
    el('div',{class:'dico',style:{width:'40px',height:'40px',borderRadius:'10px',fontSize:'18px',background:info.color+'15',color:info.color}},info.icon),
    el('div',{},el('h2',{},info.label),el('div',{class:'dsub'},info.sub))
  ));
  const c=el('div',{class:'card'});a.appendChild(c);
  ({sdt:runSDT,weber:runWeber,after:runAfter,gestalt:runGestalt,fade:runFade,stroop:runStroop,heider:runHeider})[id](c);
}

// ═══════════════════════════════════════
// 1. SIGNAL DETECTION THEORY
// ═══════════════════════════════════════
function runSDT(C){
  const st={trials:[],n:0,total:30,signalPresent:false,phase:'intro',payoff:'neutral'};
  let timer;

  function intro(){
    clr(C);
    C.appendChild(el('div',{class:'ctr'},
      el('p',{class:'inst'},'A faint dot may (or may not) appear briefly in visual noise. You decide: ',el('strong',{style:{color:'var(--text)'}},'Present'),' or ',el('strong',{style:{color:'var(--text)'}},'Absent'),'. Your hits, misses, false alarms, and correct rejections will be tracked.'),
      el('p',{class:'meta mb16'},'30 trials · Signal present on ~50% of trials'),
      el('p',{class:'meta mb20'},'Payoff condition: neutral (equal costs)'),
      el('button',{class:'btn btn-p',onClick:()=>{st.payoff='neutral';startSDT()}},'Start — Neutral Payoff'),
    ));
  }

  function startSDT(){st.trials=[];st.n=0;runTrial()}

  function runTrial(){
    st.signalPresent=Math.random()<0.5;
    st.phase='fixation';
    renderSDT();
    timer=setTimeout(()=>{
      st.phase='stimulus';
      renderSDT();
      timer=setTimeout(()=>{st.phase='respond';renderSDT()},300);
    },500+Math.random()*500);
  }

  function respond(said){
    if(st.phase!=='respond')return;
    const p=st.signalPresent;
    let type;
    if(p&&said==='yes')type='hit';
    else if(p&&said==='no')type='miss';
    else if(!p&&said==='yes')type='fa';
    else type='cr';
    st.trials.push({present:p,said,type});
    st.n++;
    if(st.n>=st.total){showSDTResults();return}
    setTimeout(runTrial,400);
  }

  function renderSDT(){
    clr(C);
    const cvs=document.createElement('canvas');cvs.width=360;cvs.height=200;cvs.style.cssText='display:block;margin:0 auto 12px;border-radius:12px';
    const ctx=cvs.getContext('2d');
    // noise
    const img=ctx.createImageData(360,200);
    for(let i=0;i<img.data.length;i+=4){const v=Math.random()*40+10;img.data[i]=v;img.data[i+1]=v;img.data[i+2]=v+5;img.data[i+3]=255}
    ctx.putImageData(img,0,0);
    // signal dot
    if(st.phase==='stimulus'&&st.signalPresent){
      ctx.beginPath();ctx.arc(180,100,18,0,Math.PI*2);
      ctx.fillStyle='rgba(220,224,232,0.13)';ctx.fill();
      ctx.beginPath();ctx.arc(180,100,8,0,Math.PI*2);
      ctx.fillStyle='rgba(220,224,232,0.22)';ctx.fill();
    }
    // fixation cross
    if(st.phase==='fixation'){ctx.strokeStyle='#e8a838';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(175,100);ctx.lineTo(185,100);ctx.moveTo(180,95);ctx.lineTo(180,105);ctx.stroke()}
    C.appendChild(cvs);

    if(st.phase==='respond'){
      const row=el('div',{class:'ctr'},
        el('button',{class:'btn btn-p mr12',onClick:()=>respond('yes')},'Present'),
        el('button',{class:'btn btn-s',onClick:()=>respond('no')},'Absent')
      );
      C.appendChild(row);
    }
    C.appendChild(el('p',{class:'ctr meta mt8'},`Trial ${st.n+1}/${st.total}`));
  }

  function showSDTResults(){
    clr(C);
    const hits=st.trials.filter(t=>t.type==='hit').length;
    const misses=st.trials.filter(t=>t.type==='miss').length;
    const fa=st.trials.filter(t=>t.type==='fa').length;
    const cr=st.trials.filter(t=>t.type==='cr').length;
    const signalTrials=hits+misses||1;
    const noiseTrials=fa+cr||1;
    const hitRate=hits/signalTrials;
    const faRate=fa/noiseTrials;
    // d' approximation
    function zScore(p){p=Math.max(0.01,Math.min(0.99,p));return Math.sqrt(2)*erfinv(2*p-1)}
    function erfinv(x){const a=0.147;const ln=Math.log(1-x*x);const s=Math.sign(x);const t=2/(Math.PI*a)+ln/2;return s*Math.sqrt(Math.sqrt(t*t-ln/a)-t)}
    const dPrime=Math.max(0,(zScore(hitRate)-zScore(faRate))).toFixed(2);
    const criterion=(-0.5*(zScore(hitRate)+zScore(faRate))).toFixed(2);

    C.appendChild(el('h3',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:'22px',marginBottom:'20px'}},'Signal Detection Results'));

    const s=el('div',{class:'stats'});
    s.appendChild(stat('Hits',hits,'hits','#38c8b0'));
    s.appendChild(stat('Misses',misses,'misses','#e85858'));
    s.appendChild(stat('False Alarms',fa,'false alarms','#e8a838'));
    s.appendChild(stat('Correct Rej.',cr,'correct rej.','#58a0e8'));
    C.appendChild(s);

    const s2=el('div',{class:'stats'});
    s2.appendChild(stat("d'",dPrime,'sensitivity','#9878d8'));
    s2.appendChild(stat('Criterion',criterion,'bias','#e8a838'));
    C.appendChild(s2);

    // 2x2 grid
    const grid=el('div',{class:'grid2 mb20'});
    [{l:'HIT',v:hits,c:'#38c8b0',desc:'Signal present, said "yes"'},
     {l:'FALSE ALARM',v:fa,c:'#e8a838',desc:'Signal absent, said "yes"'},
     {l:'MISS',v:misses,c:'#e85858',desc:'Signal present, said "no"'},
     {l:'CORRECT REJECTION',v:cr,c:'#58a0e8',desc:'Signal absent, said "no"'}
    ].forEach(item=>{
      grid.appendChild(el('div',{style:{padding:'14px',borderRadius:'10px',background:item.c+'0c',border:`1px solid ${item.c}20`}},
        el('div',{style:{fontFamily:"'IBM Plex Mono',monospace",fontSize:'12px',color:item.c,fontWeight:'600',marginBottom:'4px'}},item.l),
        el('div',{style:{fontSize:'28px',fontWeight:'700',fontFamily:"'IBM Plex Mono',monospace",color:item.c}},String(item.v)),
        el('div',{style:{fontSize:'11px',color:'var(--dim)',marginTop:'4px'}},item.desc)
      ));
    });
    C.appendChild(grid);

    C.appendChild(el('div',{class:'card'},
      el('p',{class:'exp'},
        `Your sensitivity (d') was ${dPrime}. This measures your ability to discriminate signal from noise — higher means better detection. A d' of 0 means you're guessing; above 1.0 is good discrimination. Your criterion was ${criterion}: ${parseFloat(criterion)>0.2?'you were conservative (biased toward saying "absent"), which produces fewer false alarms but more misses':parseFloat(criterion)<-0.2?'you were liberal (biased toward saying "present"), catching more signals but also producing more false alarms':'you were roughly neutral, balancing hits against false alarms'}. In a real-world scenario — radiology, airport security, lifeguarding — the optimal criterion depends on the relative costs of misses vs. false alarms, not just on your perceptual ability.`
      )
    ));

    const row=el('div',{class:'mt20'});
    row.appendChild(el('button',{class:'btn btn-p mr12',onClick:()=>{st.payoff='neutral';startSDT()}},'Run Again'));
    row.appendChild(el('button',{class:'btn btn-s',onClick:menu},'Back'));
    C.appendChild(row);
  }

  intro();
}


// ═══════════════════════════════════════
// 2. WEBER'S LAW
// ═══════════════════════════════════════
function runWeber(C){
  const st={trials:[],n:0,total:24,baseLength:0,compLength:0,phase:'intro'};

  function intro(){
    clr(C);
    C.appendChild(el('div',{class:'ctr'},
      el('p',{class:'inst'},'Two lines will flash briefly. Your task: is the second line ',el('strong',{style:{color:'var(--text)'}},'longer'),' or the ',el('strong',{style:{color:'var(--text)'}},'same length'),'? The base line length varies across trials — Weber\'s Law predicts that your ability to detect a difference depends on the ',el('em',{},'ratio'),', not the absolute size of the difference.'),
      el('p',{class:'meta mb20'},'24 trials · ~2 minutes'),
      el('button',{class:'btn btn-p',onClick:start},'Start')
    ));
  }

  function start(){st.trials=[];st.n=0;buildTrials();runTrial()}

  function buildTrials(){
    // 3 base lengths × 4 ratios × 2 reps
    const bases=[60,150,300];
    const ratios=[1.0,1.02,1.05,1.10]; // same, 2%, 5%, 10% longer
    const queue=[];
    bases.forEach(b=>ratios.forEach(r=>{queue.push({base:b,ratio:r});queue.push({base:b,ratio:r})}));
    // shuffle
    for(let i=queue.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[queue[i],queue[j]]=[queue[j],queue[i]]}
    st.queue=queue;
    st.total=queue.length;
  }

  function runTrial(){
    const t=st.queue[st.n];
    st.baseLength=t.base;
    st.compLength=Math.round(t.base*t.ratio);
    st.phase='show1';
    render();
    setTimeout(()=>{st.phase='blank';render();
      setTimeout(()=>{st.phase='show2';render();
        setTimeout(()=>{st.phase='respond';render()},600);
      },400);
    },800);
  }

  function render(){
    clr(C);
    const s=svg('svg',{width:'400',height:'140',style:'background:#0b0d12;border-radius:12px;display:block;margin:0 auto 12px'});

    if(st.phase==='show1'){
      const x=(400-st.baseLength)/2;
      s.appendChild(svg('line',{x1:x,y1:'70',x2:x+st.baseLength,y2:'70',stroke:'#38c8b0','stroke-width':'4','stroke-linecap':'round'}));
      s.appendChild(svg('text',{x:'200',y:'110','text-anchor':'middle',fill:'#7a8098','font-size':'12','font-family':"'IBM Plex Mono',monospace"},'Reference line'));
    } else if(st.phase==='blank'){
      s.appendChild(svg('circle',{cx:'200',cy:'70',r:'3',fill:'#7a8098'}));
    } else if(st.phase==='show2'){
      const x=(400-st.compLength)/2;
      s.appendChild(svg('line',{x1:x,y1:'70',x2:x+st.compLength,y2:'70',stroke:'#e8a838','stroke-width':'4','stroke-linecap':'round'}));
      s.appendChild(svg('text',{x:'200',y:'110','text-anchor':'middle',fill:'#7a8098','font-size':'12','font-family':"'IBM Plex Mono',monospace"},'Comparison line'));
    } else if(st.phase==='respond'){
      s.appendChild(svg('text',{x:'200',y:'75','text-anchor':'middle',fill:'#7a8098','font-size':'14','font-family':"'Outfit',sans-serif"},'Was the second line longer?'));
    }
    C.appendChild(s);

    if(st.phase==='respond'){
      C.appendChild(el('div',{class:'ctr'},
        el('button',{class:'btn btn-p mr12',onClick:()=>answer('longer')},'Longer'),
        el('button',{class:'btn btn-s',onClick:()=>answer('same')},'Same')
      ));
    }
    C.appendChild(el('p',{class:'ctr meta mt8'},`Trial ${st.n+1}/${st.total}`));
  }

  function answer(resp){
    if(st.phase!=='respond')return;
    const t=st.queue[st.n];
    const wasLonger=t.ratio>1.0;
    const correct=(wasLonger&&resp==='longer')||(!wasLonger&&resp==='same');
    st.trials.push({base:t.base,ratio:t.ratio,wasLonger,resp,correct});
    st.n++;
    if(st.n>=st.total)showWeberResults();
    else setTimeout(runTrial,400);
  }

  function showWeberResults(){
    clr(C);
    C.appendChild(el('h3',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:'22px',marginBottom:'20px'}},"Your Weber Fractions"));

    const bases=[60,150,300];
    const baseLabels=['Short (60px)','Medium (150px)','Long (300px)'];
    const colors=['#38c8b0','#e8a838','#9878d8'];

    // for each base, compute % correct at each ratio
    const ratios=[1.02,1.05,1.10];
    const ratioLabels=['2%','5%','10%'];

    // overall accuracy by base
    const accByBase=bases.map(b=>{
      const t=st.trials.filter(x=>x.base===b&&x.wasLonger);
      return t.length?Math.round(t.filter(x=>x.correct).length/t.length*100):0;
    });

    const s1=el('div',{class:'stats'});
    bases.forEach((b,i)=>s1.appendChild(stat(baseLabels[i],accByBase[i]+'%',baseLabels[i],colors[i])));
    C.appendChild(s1);

    // bar chart: accuracy by base × ratio
    const chart=el('div',{class:'card mb20'});
    bases.forEach((b,bi)=>{
      chart.appendChild(el('div',{style:{fontFamily:"'IBM Plex Mono',monospace",fontSize:'12px',color:colors[bi],textTransform:'uppercase',marginBottom:'8px',marginTop:bi?'16px':'0',letterSpacing:'.08em'}},baseLabels[bi]));
      ratios.forEach((r,ri)=>{
        const t=st.trials.filter(x=>x.base===b&&Math.abs(x.ratio-r)<0.001);
        const pct=t.length?Math.round(t.filter(x=>x.correct).length/t.length*100):0;
        chart.appendChild(el('div',{class:'bar-r'},
          el('span',{class:'bar-l'},ratioLabels[ri]+' diff'),
          el('div',{class:'bar-t',style:{background:colors[bi]+'12'}},
            el('div',{class:'bar-f',style:{width:pct+'%',background:colors[bi]+'80'}})
          ),
          el('span',{class:'bar-v',style:{color:colors[bi]}},pct+'%')
        ));
      });
    });
    C.appendChild(chart);

    const shortAcc=accByBase[0],longAcc=accByBase[2];
    C.appendChild(el('div',{class:'card'},
      el('p',{class:'exp'},
        `Weber's Law predicts that the just noticeable difference (JND) is a constant proportion of the stimulus magnitude — not a constant amount. Your results ${shortAcc>longAcc+10?'confirm this nicely: you detected differences more easily with the short lines ('+shortAcc+'%) than the long lines ('+longAcc+'%). The same percentage change was harder to detect against a larger baseline, exactly as Weber predicted.':'show the general pattern. With more trials, the effect becomes clearer: the same 5% change is easy to spot on a short line but nearly invisible on a long one. This is why you can tell 1 lb from 1.05 lbs but can\'t tell 50 lbs from 52.5 lbs — the ratio matters, not the absolute difference.'}`
      )
    ));

    C.appendChild(el('button',{class:'btn btn-p mt20 mr12',onClick:()=>{start()}},'Run Again'));
    C.appendChild(el('button',{class:'btn btn-s mt20',onClick:menu},'Back'));
  }

  intro();
}


// ═══════════════════════════════════════
// 3. OPPONENT PROCESS AFTERIMAGE
// ═══════════════════════════════════════
function runAfter(C){
  let timer;let countdown=30;let intv;

  function intro(){
    clr(C);
    C.appendChild(el('div',{class:'ctr'},
      el('p',{class:'inst'},'Stare at the center dot on the colored image for 30 seconds without moving your eyes. When it switches to gray, you\'ll see an afterimage in the ',el('strong',{style:{color:'var(--text)'}},'complementary colors'),'. This is something trichromatic theory alone cannot explain — it requires opponent-process theory.'),
      el('button',{class:'btn btn-p',onClick:startAfter},'Start')
    ));
  }

  function startAfter(){
    countdown=30;
    showColored();
    intv=setInterval(()=>{
      countdown--;
      const ct=C.querySelector('#af-count');
      if(ct)ct.textContent=countdown+'s';
      if(countdown<=0){clearInterval(intv);showGray()}
    },1000);
  }

  function showColored(){
    clr(C);
    const cvs=document.createElement('canvas');cvs.width=400;cvs.height=300;cvs.style.cssText='display:block;margin:0 auto 12px;border-radius:12px;cursor:none';
    const ctx=cvs.getContext('2d');
    // four quadrants in opponent colors
    ctx.fillStyle='#00cc66';ctx.fillRect(0,0,200,150);     // green (top-left)
    ctx.fillStyle='#cc3333';ctx.fillRect(200,0,200,150);    // red (top-right)
    ctx.fillStyle='#cccc00';ctx.fillRect(0,150,200,150);    // yellow (bottom-left)
    ctx.fillStyle='#3333cc';ctx.fillRect(200,150,200,150);  // blue (bottom-right)
    // fixation dot
    ctx.beginPath();ctx.arc(200,150,6,0,Math.PI*2);ctx.fillStyle='#ffffff';ctx.fill();
    ctx.beginPath();ctx.arc(200,150,2,0,Math.PI*2);ctx.fillStyle='#000000';ctx.fill();

    C.appendChild(cvs);
    C.appendChild(el('p',{class:'ctr meta'},'Stare at the center dot — ',el('span',{id:'af-count'},countdown+'s')));
  }

  function showGray(){
    clr(C);
    const cvs=document.createElement('canvas');cvs.width=400;cvs.height=300;cvs.style.cssText='display:block;margin:0 auto 12px;border-radius:12px';
    const ctx=cvs.getContext('2d');
    ctx.fillStyle='#888888';ctx.fillRect(0,0,400,300);
    ctx.beginPath();ctx.arc(200,150,4,0,Math.PI*2);ctx.fillStyle='#444444';ctx.fill();
    C.appendChild(cvs);
    C.appendChild(el('p',{class:'ctr',style:{color:'var(--text)',fontSize:'15px',marginBottom:'16px'}},'Keep staring at the center — do you see the complementary colors?'));
    C.appendChild(el('div',{class:'card mb20'},
      el('p',{class:'exp'},
        'What you\'re seeing is an opponent-process afterimage. The green quadrant produces a red afterimage; the red produces green; yellow produces blue; and blue produces yellow. Trichromatic theory (Young-Helmholtz) can\'t explain this — if it were just about cone fatigue, you\'d expect a bleached-out version, not the precise complementary color. Opponent-process theory explains it: your red-green and blue-yellow opponent channels have been fatigued in one direction and rebound in the other when the stimulus is removed. Both theories are correct — they operate at different stages of visual processing (retinal vs. post-retinal).'
      )
    ));
    C.appendChild(el('button',{class:'btn btn-p mr12',onClick:startAfter},'Try Again'));
    C.appendChild(el('button',{class:'btn btn-s',onClick:menu},'Back'));
  }

  intro();
}


// ═══════════════════════════════════════
// 4. GESTALT GROUPING
// ═══════════════════════════════════════
function runGestalt(C){
  const principles=['proximity','similarity','good continuation','closure'];
  let current=0;

  function intro(){
    clr(C);
    C.appendChild(el('div',{class:'ctr'},
      el('p',{class:'inst'},'Watch how your perception of the same set of elements changes as we manipulate grouping principles. You can\'t stop yourself from seeing the groups — these are automatic, bottom-up organizational rules your visual system applies before conscious interpretation.'),
      el('button',{class:'btn btn-p',onClick:()=>{current=0;showPrinciple()}},'Start')
    ));
  }

  function showPrinciple(){
    clr(C);
    const p=principles[current];
    const cvs=document.createElement('canvas');cvs.width=400;cvs.height=260;cvs.style.cssText='display:block;margin:0 auto 16px;border-radius:12px';
    const ctx=cvs.getContext('2d');
    ctx.fillStyle='#0b0d12';ctx.fillRect(0,0,400,260);

    // slider
    const slider=el('input',{type:'range',min:'0',max:'100',value:'0',style:{width:'100%',marginBottom:'16px',accentColor:'#9878d8'}});

    function draw(val){
      ctx.clearRect(0,0,400,260);
      ctx.fillStyle='#0b0d12';ctx.fillRect(0,0,400,260);
      const v=val/100; // 0 to 1

      if(p==='proximity'){
        // dots that shift from uniform to grouped
        const gap=8+v*28; // gap between groups increases
        const inner=16-v*8; // inner spacing decreases
        for(let g=0;g<4;g++){
          for(let i=0;i<3;i++){
            const x=60+g*(inner*3+gap)+i*inner;
            for(let j=0;j<3;j++){
              ctx.beginPath();ctx.arc(x,60+j*30,5,0,Math.PI*2);ctx.fillStyle='#9878d8';ctx.fill();
            }
          }
        }
        ctx.font="13px 'IBM Plex Mono',monospace";ctx.fillStyle='#7a8098';ctx.textAlign='center';
        ctx.fillText(v<0.3?'Uniform spacing — no clear groups':v<0.7?'Grouping emerging...':'Four distinct groups by proximity',200,210);
      }
      else if(p==='similarity'){
        // dots alternate color; similarity slider blends vs contrasts
        for(let i=0;i<8;i++){
          for(let j=0;j<4;j++){
            ctx.beginPath();ctx.arc(70+i*38,60+j*38,7,0,Math.PI*2);
            const isAlt=i%2===0;
            if(v<0.3) ctx.fillStyle='#9878d8'; // all same
            else{
              const blend=Math.min(1,(v-0.3)/0.7);
              if(isAlt) ctx.fillStyle=`rgb(${Math.round(152-80*blend)},${Math.round(120+80*blend)},${Math.round(216-80*blend)})`;
              else ctx.fillStyle='#9878d8';
            }
            ctx.fill();
          }
        }
        ctx.font="13px 'IBM Plex Mono',monospace";ctx.fillStyle='#7a8098';ctx.textAlign='center';
        ctx.fillText(v<0.3?'All identical — no grouping by similarity':v<0.7?'Color difference emerging — columns appear':'Strong similarity grouping — you see columns',200,230);
      }
      else if(p==='good continuation'){
        // two crossing lines vs choppy segments
        ctx.lineWidth=3;ctx.lineCap='round';
        const smooth=v;
        // wave line
        ctx.beginPath();ctx.strokeStyle='#38c8b0';
        for(let x=40;x<=360;x+=2){
          const y=130+Math.sin(x/40)*40;
          const noise=(1-smooth)*(Math.random()-0.5)*30;
          if(x===40)ctx.moveTo(x,y+noise);else ctx.lineTo(x,y+noise);
        }
        ctx.stroke();
        // straight-ish line
        ctx.beginPath();ctx.strokeStyle='#e8a838';
        for(let x=40;x<=360;x+=2){
          const y=130;
          const noise=(1-smooth)*(Math.random()-0.5)*30;
          if(x===40)ctx.moveTo(x,y+noise);else ctx.lineTo(x,y+noise);
        }
        ctx.stroke();
        ctx.font="13px 'IBM Plex Mono',monospace";ctx.fillStyle='#7a8098';ctx.textAlign='center';
        ctx.fillText(v<0.3?'Random noise — no good continuation signal':v<0.7?'Lines emerging from noise...':'You perceive two smooth, continuous lines — even where they cross',200,240);
      }
      else if(p==='closure'){
        // partial circles → full triangle perception
        const cx=200,cy=110,r=60;
        const gapAngle=Math.PI*(1-v)*0.8;// gap shrinks as v increases
        const angles=[Math.PI*7/6,Math.PI*11/6,Math.PI/2];
        ctx.lineWidth=4;ctx.strokeStyle='#e85858';
        angles.forEach(a=>{
          ctx.beginPath();
          ctx.arc(cx+Math.cos(a)*r,cy-Math.sin(a)*r,22,a+Math.PI+gapAngle,a+Math.PI+Math.PI*2-gapAngle);
          ctx.stroke();
        });
        ctx.font="13px 'IBM Plex Mono',monospace";ctx.fillStyle='#7a8098';ctx.textAlign='center';
        ctx.fillText(v<0.3?'Three arcs — no triangle perceived':v<0.7?'A triangle is starting to appear...':'Strong closure — you see a triangle that isn\'t drawn',200,220);
      }
    }

    draw(0);
    slider.addEventListener('input',()=>draw(parseInt(slider.value)));
    C.appendChild(cvs);

    C.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'8px'}},
      el('span',{class:'badge',style:{background:'#9878d8'+'18',color:'#9878d8'}},p.toUpperCase()),
      el('span',{class:'meta'},`${current+1} of ${principles.length}`)
    ));
    C.appendChild(slider);
    C.appendChild(el('p',{class:'meta ctr mb16'},'Drag the slider to vary the grouping strength'));

    const nav=el('div',{class:'ctr'});
    if(current>0)nav.appendChild(el('button',{class:'btn btn-s mr12',onClick:()=>{current--;showPrinciple()}},'← Previous'));
    if(current<principles.length-1)nav.appendChild(el('button',{class:'btn btn-p',onClick:()=>{current++;showPrinciple()}},'Next →'));
    else nav.appendChild(el('button',{class:'btn btn-p',onClick:showGestaltWrap},'See Summary'));
    C.appendChild(nav);
  }

  function showGestaltWrap(){
    clr(C);
    C.appendChild(el('h3',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:'22px',marginBottom:'16px'}},'Gestalt Grouping Principles'));
    C.appendChild(el('div',{class:'card mb20'},
      el('p',{class:'exp'},
        'What you just experienced is the involuntary nature of Gestalt grouping. As each principle strengthened, your percept reorganized automatically — you couldn\'t stop seeing the columns (similarity), the groups (proximity), the smooth lines (good continuation), or the illusory triangle (closure). These aren\'t decisions you make; they\'re constraints your visual system imposes before the percept reaches awareness. Gestalt psychologists argued these principles are bottom-up organizational rules, not learned associations — and your inability to override them supports that claim.'
      )
    ));
    C.appendChild(el('button',{class:'btn btn-p mr12',onClick:()=>{current=0;showPrinciple()}},'Explore Again'));
    C.appendChild(el('button',{class:'btn btn-s',onClick:menu},'Back'));
  }

  intro();
}


// ═══════════════════════════════════════
// 5. THRESHOLD & ADAPTATION (FADING DOT)
// ═══════════════════════════════════════
function runFade(C){
  let animId;let opacity=0.15;

  function intro(){
    clr(C);
    C.appendChild(el('div',{class:'ctr'},
      el('p',{class:'inst'},'A faint dot will appear. First, try to detect it (absolute threshold). Then, stare directly at the center fixation point without moving your eyes. After 10–20 seconds, the peripheral dot will fade and disappear — this is ',el('strong',{style:{color:'var(--text)'}},'Troxler fading'),', a form of sensory adaptation. Your retinal neurons stop responding to a stable, unchanging stimulus.'),
      el('p',{class:'meta mb20'},'Use the slider to find your personal threshold, then hold fixation'),
      el('button',{class:'btn btn-p',onClick:startFade},'Start')
    ));
  }

  function startFade(){
    clr(C);opacity=0.15;
    const cvs=document.createElement('canvas');cvs.width=400;cvs.height=300;cvs.style.cssText='display:block;margin:0 auto 12px;border-radius:12px';
    const ctx=cvs.getContext('2d');

    const slider=el('input',{type:'range',min:'1',max:'40',value:'15',style:{width:'100%',marginBottom:'12px',accentColor:'#58d8a0'}});
    slider.addEventListener('input',()=>{opacity=parseInt(slider.value)/100});

    function draw(){
      ctx.fillStyle='#888888';ctx.fillRect(0,0,400,300);
      // fixation cross
      ctx.strokeStyle='#333';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(195,150);ctx.lineTo(205,150);ctx.moveTo(200,145);ctx.lineTo(200,155);ctx.stroke();
      // fading dot (peripheral)
      const gradient=ctx.createRadialGradient(300,100,0,300,100,25);
      gradient.addColorStop(0,`rgba(100,180,140,${opacity})`);
      gradient.addColorStop(1,`rgba(136,136,136,0)`);
      ctx.beginPath();ctx.arc(300,100,25,0,Math.PI*2);ctx.fillStyle=gradient;ctx.fill();
      // second dot other side for comparison
      const g2=ctx.createRadialGradient(100,200,0,100,200,25);
      g2.addColorStop(0,`rgba(180,100,100,${opacity})`);
      g2.addColorStop(1,`rgba(136,136,136,0)`);
      ctx.beginPath();ctx.arc(100,200,25,0,Math.PI*2);ctx.fillStyle=g2;ctx.fill();

      animId=requestAnimationFrame(draw);
    }
    draw();

    C.appendChild(cvs);
    C.appendChild(el('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:'4px'}},
      el('span',{class:'meta'},'Below threshold'),
      el('span',{class:'meta'},'Above threshold')
    ));
    C.appendChild(slider);
    C.appendChild(el('p',{class:'meta ctr mb16'},'Adjust contrast, then stare at the center cross for 15–20 seconds'));
    C.appendChild(el('p',{class:'ctr',style:{fontSize:'14px',color:'var(--dim)',lineHeight:'1.6',marginBottom:'16px'}},
      'The dots will fade and disappear as your retinal neurons adapt to the unchanging stimulus. Move your eyes and they\'ll reappear instantly — the adaptation is local to the stimulated photoreceptors.'
    ));
    C.appendChild(el('div',{class:'card mb20'},
      el('p',{class:'exp'},
        'This demonstrates two concepts simultaneously. The slider lets you find your absolute threshold — the minimum contrast at which you can detect the dot 50% of the time. Then Troxler fading demonstrates sensory adaptation: constant stimulation produces diminished sensitivity. Your photoreceptors literally stop responding to an unchanging input. This is why you stop feeling your clothes, stop smelling your own house, and stop hearing constant background noise. Adaptation frees up processing resources for changes — which are almost always more behaviorally relevant than constants.'
      )
    ));
    C.appendChild(el('button',{class:'btn btn-s',onClick:()=>{cancelAnimationFrame(animId);menu()}},'Back'));
  }

  intro();
}


// ═══════════════════════════════════════
// 6. STROOP EFFECT
// ═══════════════════════════════════════
function runStroop(C){
  const COLORS=[
    {name:'RED',hex:'#e85858'},{name:'GREEN',hex:'#38c8b0'},
    {name:'BLUE',hex:'#58a0e8'},{name:'YELLOW',hex:'#e8a838'}
  ];
  const st={trials:[],n:0,total:20,condition:'congruent',word:'',ink:'',phase:'intro',trialStart:0,currentSet:[]};

  function intro(){
    clr(C);
    C.appendChild(el('div',{class:'ctr'},
      el('p',{class:'inst'},'Name the ',el('strong',{style:{color:'var(--text)'}},'INK COLOR'),
        ' of each word as fast as you can — ignore what the word says. You\'ll do congruent trials (word matches ink) and incongruent trials (word conflicts with ink). The difference is your Stroop interference effect.'),
      el('p',{class:'meta mb20'},'20 trials · tap/click the correct color'),
      el('button',{class:'btn btn-p',onClick:start},'Start')
    ));
  }

  function start(){
    st.trials=[];st.n=0;
    // build trial set: half congruent, half incongruent, shuffled
    const set=[];
    for(let i=0;i<10;i++){
      const c=COLORS[Math.floor(Math.random()*4)];
      set.push({word:c.name,ink:c.hex,inkName:c.name,congruent:true});
    }
    for(let i=0;i<10;i++){
      const ink=COLORS[Math.floor(Math.random()*4)];
      let word;
      do{word=COLORS[Math.floor(Math.random()*4)]}while(word.name===ink.name);
      set.push({word:word.name,ink:ink.hex,inkName:ink.name,congruent:false});
    }
    for(let i=set.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[set[i],set[j]]=[set[j],set[i]]}
    st.currentSet=set;
    runTrial();
  }

  function runTrial(){
    const t=st.currentSet[st.n];
    st.word=t.word;st.ink=t.ink;st.condition=t.congruent?'congruent':'incongruent';
    st.phase='show';
    st.trialStart=performance.now();
    render();
  }

  function render(){
    clr(C);

    // Word display
    C.appendChild(el('div',{class:'ctr mb24'},
      el('div',{style:{fontSize:'56px',fontWeight:'700',fontFamily:"'Outfit',sans-serif",color:st.ink,letterSpacing:'0.08em',marginBottom:'8px',userSelect:'none'}},st.word),
      el('div',{class:'meta'},'What COLOR is this word printed in?')
    ));

    // Color buttons
    const row=el('div',{style:{display:'flex',gap:'10px',justifyContent:'center',flexWrap:'wrap',marginBottom:'16px'}});
    COLORS.forEach(c=>{
      const btn=el('button',{style:{
        width:'72px',height:'72px',borderRadius:'14px',border:`2px solid ${c.hex}40`,
        background:c.hex+'18',cursor:'pointer',transition:'all .15s',
        display:'flex',alignItems:'center',justifyContent:'center',
        fontFamily:"'IBM Plex Mono',monospace",fontSize:'11px',color:c.hex,fontWeight:'600',letterSpacing:'.06em'
      },onClick:()=>answer(c.name)},c.name);
      btn.addEventListener('mouseenter',()=>{btn.style.background=c.hex+'30';btn.style.borderColor=c.hex});
      btn.addEventListener('mouseleave',()=>{btn.style.background=c.hex+'18';btn.style.borderColor=c.hex+'40'});
      row.appendChild(btn);
    });
    C.appendChild(row);
    C.appendChild(el('p',{class:'ctr meta'},`Trial ${st.n+1}/${st.total} · ${st.condition==='congruent'?'▪':'▪'}`));
  }

  function answer(colorName){
    const rt=Math.round(performance.now()-st.trialStart);
    const t=st.currentSet[st.n];
    const correct=colorName===t.inkName;
    st.trials.push({word:t.word,inkName:t.inkName,chose:colorName,congruent:t.congruent,rt,correct});
    st.n++;
    if(st.n>=st.total)showStroopResults();
    else{setTimeout(runTrial,300)}
  }

  function showStroopResults(){
    clr(C);
    const cong=st.trials.filter(t=>t.congruent&&t.correct);
    const incong=st.trials.filter(t=>!t.congruent&&t.correct);
    const avgC=cong.length?Math.round(cong.reduce((s,t)=>s+t.rt,0)/cong.length):0;
    const avgI=incong.length?Math.round(incong.reduce((s,t)=>s+t.rt,0)/incong.length):0;
    const effect=avgI-avgC;
    const errors=st.trials.filter(t=>!t.correct).length;
    const maxRT=Math.max(avgC,avgI,1);

    C.appendChild(el('h3',{style:{fontFamily:"'Cormorant Garamond',serif",fontSize:'22px',marginBottom:'20px'}},'Your Stroop Effect'));

    const s=el('div',{class:'stats'});
    s.appendChild(stat('Congruent',avgC,'ms','#38c8b0'));
    s.appendChild(stat('Incongruent',avgI,'ms','#e85858'));
    s.appendChild(stat('Interference',(effect>0?'+':'')+effect,'ms','#e8a838'));
    s.appendChild(stat('Errors',errors,'errors','#9878d8'));
    C.appendChild(s);

    // bars
    const bcard=el('div',{class:'card mb20'});
    bcard.appendChild(el('div',{class:'bar-r'},
      el('span',{class:'bar-l',style:{color:'#38c8b0'}},'CONGRUENT'),
      el('div',{class:'bar-t',style:{background:'#38c8b008'}},
        el('div',{class:'bar-f',style:{width:`${(avgC/maxRT)*100}%`,background:'#38c8b0'}})
      ),
      el('span',{class:'bar-v',style:{color:'#38c8b0'}},avgC+'ms')
    ));
    bcard.appendChild(el('div',{class:'bar-r'},
      el('span',{class:'bar-l',style:{color:'#e85858'}},'INCONGRUENT'),
      el('div',{class:'bar-t',style:{background:'#e8585808'}},
        el('div',{class:'bar-f',style:{width:`${(avgI/maxRT)*100}%`,background:'#e85858'}})
      ),
      el('span',{class:'bar-v',style:{color:'#e85858'}},avgI+'ms')
    ));
    C.appendChild(bcard);

    C.appendChild(el('div',{class:'card'},
      el('p',{class:'exp'},
        effect>30
          ? `Your Stroop interference was ${effect}ms — it took you significantly longer to name the ink color when the word conflicted with it. This happens because reading is so highly automatized (a top-down process) that you can't suppress it, even when the task explicitly requires you to ignore it. The conflict between the automatic word-reading response and the controlled color-naming response creates interference. This is one of the most robust demonstrations of the tension between bottom-up sensory processing and top-down cognitive control in all of psychology.`
          : `Your Stroop effect was ${effect}ms, which is smaller than typical (~100–200ms in classic studies). This can happen with practice or if you adopted a strategy of defocusing from the word. The key insight remains: reading is so automatic that even when instructed to ignore it, the word meaning interferes with color naming. This demonstrates the conflict between bottom-up (ink color) and top-down (word reading) processing streams.`
      )
    ));

    C.appendChild(el('button',{class:'btn btn-p mt20 mr12',onClick:start},'Run Again'));
    C.appendChild(el('button',{class:'btn btn-s mt20',onClick:menu},'Back'));
  }

  intro();
}
