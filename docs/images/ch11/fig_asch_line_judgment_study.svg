<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Asch unanimity and the effect of one ally</title><desc id="desc">Two panels show the same line-judgment task. In both, comparison line B clearly matches the standard. In the first panel, four majority members unanimously select the visibly shorter line A while the participant must answer alone. In the second panel, one ally selects the correct line B, breaking unanimity.</desc><defs><style>text{font-family:Arial,Helvetica,sans-serif;fill:#18324a}.title{font-size:46px;font-weight:700}.sub{font-size:26px;fill:#56697a}.panel{font-size:31px;font-weight:700}.body{font-size:23px;fill:#465d70}.choice{font-size:24px;font-weight:700}.card{fill:#fff;stroke:#c7d5de;stroke-width:3}.person{stroke:#18324a;stroke-width:5;fill:#dbe5eb}.ally{fill:#dff1e5;stroke:#4d875d}.participant{fill:#e7f1fb;stroke:#3974a5}.bubble{fill:#fff;stroke:#8197a6;stroke-width:3}.wrong{fill:#fbe9e5;stroke:#c65f4b}.correct{fill:#e7f4e9;stroke:#4d875d}</style><filter id="s"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".12"/></filter></defs><rect width="1600" height="900" fill="#fbfcfa"/><text class="title" x="800" y="65" text-anchor="middle">Asch conformity: unanimity makes the social dilemma</text><text class="sub" x="800" y="105" text-anchor="middle">The correct match is obvious; the majority deliberately chooses a different line</text><g filter="url(#s)"><rect class="card" x="55" y="145" width="720" height="680" rx="28"/><rect class="card" x="825" y="145" width="720" height="680" rx="28"/></g>
<text class="panel" x="415" y="200" text-anchor="middle">Unanimous incorrect majority</text><text class="panel" x="1185" y="200" text-anchor="middle">One ally breaks unanimity</text>
<g transform="translate(100 225)"><rect x="0" y="0" width="630" height="225" rx="20" fill="#f5f8fa"/><text class="body" x="125" y="35" text-anchor="middle">Standard</text><line x1="125" y1="65" x2="125" y2="185" stroke="#15212b" stroke-width="10"/><text class="body" x="410" y="35" text-anchor="middle">Comparison lines</text><line x1="310" y1="105" x2="310" y2="185" stroke="#15212b" stroke-width="10"/><line x1="410" y1="65" x2="410" y2="185" stroke="#15212b" stroke-width="10"/><line x1="510" y1="35" x2="510" y2="185" stroke="#15212b" stroke-width="10"/><text class="choice" x="310" y="215" text-anchor="middle">A</text><text class="choice" x="410" y="215" text-anchor="middle">B ✓</text><text class="choice" x="510" y="215" text-anchor="middle">C</text></g>
<g transform="translate(870 225)"><rect x="0" y="0" width="630" height="225" rx="20" fill="#f5f8fa"/><text class="body" x="125" y="35" text-anchor="middle">Standard</text><line x1="125" y1="65" x2="125" y2="185" stroke="#15212b" stroke-width="10"/><text class="body" x="410" y="35" text-anchor="middle">Comparison lines</text><line x1="310" y1="105" x2="310" y2="185" stroke="#15212b" stroke-width="10"/><line x1="410" y1="65" x2="410" y2="185" stroke="#15212b" stroke-width="10"/><line x1="510" y1="35" x2="510" y2="185" stroke="#15212b" stroke-width="10"/><text class="choice" x="310" y="215" text-anchor="middle">A</text><text class="choice" x="410" y="215" text-anchor="middle">B ✓</text><text class="choice" x="510" y="215" text-anchor="middle">C</text></g>
<g transform="translate(95 505)"><g transform="translate(0)"><rect class="bubble wrong" x="0" y="0" width="115" height="52" rx="18"/><text class="choice" x="57" y="34" text-anchor="middle">A</text><circle class="person" cx="57" cy="115" r="30"/><path class="person" d="M20 205c5-48 69-48 75 0"/></g><g transform="translate(130)"><rect class="bubble wrong" x="0" y="0" width="115" height="52" rx="18"/><text class="choice" x="57" y="34" text-anchor="middle">A</text><circle class="person" cx="57" cy="115" r="30"/><path class="person" d="M20 205c5-48 69-48 75 0"/></g><g transform="translate(260)"><rect class="bubble wrong" x="0" y="0" width="115" height="52" rx="18"/><text class="choice" x="57" y="34" text-anchor="middle">A</text><circle class="person" cx="57" cy="115" r="30"/><path class="person" d="M20 205c5-48 69-48 75 0"/></g><g transform="translate(390)"><rect class="bubble wrong" x="0" y="0" width="115" height="52" rx="18"/><text class="choice" x="57" y="34" text-anchor="middle">A</text><circle class="person" cx="57" cy="115" r="30"/><path class="person" d="M20 205c5-48 69-48 75 0"/></g><g transform="translate(540)"><rect class="bubble participant" x="0" y="0" width="115" height="52" rx="18"/><text class="choice" x="57" y="34" text-anchor="middle">?</text><circle class="person participant" cx="57" cy="115" r="30"/><path class="person participant" d="M20 205c5-48 69-48 75 0"/></g></g>
<g transform="translate(865 505)"><g transform="translate(0)"><rect class="bubble wrong" x="0" y="0" width="115" height="52" rx="18"/><text class="choice" x="57" y="34" text-anchor="middle">A</text><circle class="person" cx="57" cy="115" r="30"/><path class="person" d="M20 205c5-48 69-48 75 0"/></g><g transform="translate(130)"><rect class="bubble wrong" x="0" y="0" width="115" height="52" rx="18"/><text class="choice" x="57" y="34" text-anchor="middle">A</text><circle class="person" cx="57" cy="115" r="30"/><path class="person" d="M20 205c5-48 69-48 75 0"/></g><g transform="translate(260)"><rect class="bubble correct" x="0" y="0" width="115" height="52" rx="18"/><text class="choice" x="57" y="34" text-anchor="middle">B ✓</text><circle class="person ally" cx="57" cy="115" r="30"/><path class="person ally" d="M20 205c5-48 69-48 75 0"/></g><g transform="translate(390)"><rect class="bubble wrong" x="0" y="0" width="115" height="52" rx="18"/><text class="choice" x="57" y="34" text-anchor="middle">A</text><circle class="person" cx="57" cy="115" r="30"/><path class="person" d="M20 205c5-48 69-48 75 0"/></g><g transform="translate(540)"><rect class="bubble participant" x="0" y="0" width="115" height="52" rx="18"/><text class="choice" x="57" y="34" text-anchor="middle">?</text><circle class="person participant" cx="57" cy="115" r="30"/><path class="person participant" d="M20 205c5-48 69-48 75 0"/></g></g>
<text class="body" x="415" y="785" text-anchor="middle">Agree with an obviously wrong consensus—or stand alone</text><text class="body" x="1185" y="785" text-anchor="middle">The participant is no longer completely alone</text></svg>
