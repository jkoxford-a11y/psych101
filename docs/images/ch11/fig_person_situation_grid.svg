<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Weak and strong situations change trait expression</title><desc id="desc">Two panels track the same five color-coded individuals. Under ambiguous norms and substantial latitude, their expressed behavior is widely spread. Under clear norms, constraints, or incentives, the same individuals cluster more tightly. A note says individual differences are compressed rather than erased.</desc><defs><style>text{font-family:Arial,Helvetica,sans-serif;fill:#18324a}.title{font-size:46px;font-weight:700}.sub{font-size:27px;fill:#56697a}.head{font-size:31px;font-weight:700}.body{font-size:23px;fill:#465d70}.small{font-size:20px;fill:#5c7081}.card{fill:#fff;stroke:#c7d5de;stroke-width:3}.track{stroke:#8197a6;stroke-width:6;stroke-linecap:round}.dash{stroke:#aab9c3;stroke-width:3;stroke-dasharray:10 10}.same{font-size:21px;font-weight:700}</style><filter id="s"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".12"/></filter><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#8197a6"/></marker></defs><rect width="1600" height="900" fill="#fbfcfa"/><text class="title" x="800" y="68" text-anchor="middle">Situation strength changes how widely traits are expressed</text><text class="sub" x="800" y="108" text-anchor="middle">The same individuals appear in both panels</text><g filter="url(#s)"><rect class="card" x="70" y="155" width="700" height="610" rx="28"/><rect class="card" x="830" y="155" width="700" height="610" rx="28"/></g><text class="head" x="420" y="215" text-anchor="middle">Weak situation</text><text class="body" x="420" y="252" text-anchor="middle">ambiguous norms · substantial latitude</text><text class="head" x="1180" y="215" text-anchor="middle">Strong situation</text><text class="body" x="1180" y="252" text-anchor="middle">clear norms · constraints · incentives</text>
<g transform="translate(120 310)"><line class="track" x1="40" y1="245" x2="560" y2="245" marker-end="url(#a)"/><text class="small" x="40" y="290">less expressed behavior</text><text class="small" x="560" y="290" text-anchor="end">more expressed behavior</text><line class="dash" x1="70" y1="80" x2="70" y2="245"/><line class="dash" x1="185" y1="80" x2="185" y2="245"/><line class="dash" x1="300" y1="80" x2="300" y2="245"/><line class="dash" x1="415" y1="80" x2="415" y2="245"/><line class="dash" x1="530" y1="80" x2="530" y2="245"/><circle cx="70" cy="245" r="25" fill="#8a5aa5"/><circle cx="185" cy="245" r="25" fill="#3974a5"/><circle cx="300" cy="245" r="25" fill="#c47a2e"/><circle cx="415" cy="245" r="25" fill="#4f8b5d"/><circle cx="530" cy="245" r="25" fill="#c65f4b"/><text class="same" x="70" y="65" text-anchor="middle">A</text><text class="same" x="185" y="65" text-anchor="middle">B</text><text class="same" x="300" y="65" text-anchor="middle">C</text><text class="same" x="415" y="65" text-anchor="middle">D</text><text class="same" x="530" y="65" text-anchor="middle">E</text><rect x="75" y="350" width="450" height="75" rx="24" fill="#eef6fa"/><text class="body" x="300" y="382" text-anchor="middle">Traits and goals have more room</text><text class="body" x="300" y="412" text-anchor="middle">to shape visible behavior</text></g>
<g transform="translate(880 310)"><rect x="205" y="175" width="190" height="140" rx="35" fill="#f4eee8" stroke="#d5bca8" stroke-width="3"/><line class="track" x1="40" y1="245" x2="560" y2="245" marker-end="url(#a)"/><text class="small" x="40" y="290">less expressed behavior</text><text class="small" x="560" y="290" text-anchor="end">more expressed behavior</text><line class="dash" x1="245" y1="80" x2="245" y2="245"/><line class="dash" x1="272" y1="80" x2="272" y2="245"/><line class="dash" x1="300" y1="80" x2="300" y2="245"/><line class="dash" x1="328" y1="80" x2="328" y2="245"/><line class="dash" x1="355" y1="80" x2="355" y2="245"/><circle cx="245" cy="245" r="25" fill="#8a5aa5"/><circle cx="272" cy="245" r="25" fill="#3974a5"/><circle cx="300" cy="245" r="25" fill="#c47a2e"/><circle cx="328" cy="245" r="25" fill="#4f8b5d"/><circle cx="355" cy="245" r="25" fill="#c65f4b"/><text class="same" x="245" y="65" text-anchor="middle">A</text><text class="same" x="272" y="65" text-anchor="middle">B</text><text class="same" x="300" y="65" text-anchor="middle">C</text><text class="same" x="328" y="65" text-anchor="middle">D</text><text class="same" x="355" y="65" text-anchor="middle">E</text><rect x="75" y="350" width="450" height="75" rx="24" fill="#f7f0ea"/><text class="body" x="300" y="382" text-anchor="middle">The allowable range narrows, so</text><text class="body" x="300" y="412" text-anchor="middle">expressed differences are compressed</text></g>
<rect x="245" y="800" width="1110" height="60" rx="28" fill="#eef4f6"/><text class="body" x="800" y="839" text-anchor="middle">A strong situation reduces individual differences in expression; it does not erase them.</text></svg>
