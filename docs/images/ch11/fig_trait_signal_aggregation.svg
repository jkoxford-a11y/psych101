<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Aggregation reveals a stable trait pattern</title><desc id="desc">The left panel shows one observation for each of five people scattered widely because the immediate situation and chance strongly affect any single act. The right panel shows repeated observations for those same five people and a large average marker for each; averaging reduces incidental variation and makes their stable ordering easier to detect. No empirical values are displayed.</desc><defs><style>text{font-family:Arial,Helvetica,sans-serif;fill:#18324a}.title{font-size:46px;font-weight:700}.sub{font-size:27px;fill:#56697a}.head{font-size:31px;font-weight:700}.body{font-size:23px;fill:#465d70}.small{font-size:20px;fill:#5c7081}.card{fill:#fff;stroke:#c7d5de;stroke-width:3}.axis{stroke:#526b7b;stroke-width:3}.guide{stroke:#9db0bc;stroke-width:5;stroke-dasharray:12 12;opacity:.55}.avg{stroke:#18324a;stroke-width:4}.faint{opacity:.25}</style><filter id="s"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".12"/></filter></defs><rect width="1600" height="900" fill="#fbfcfa"/><text class="title" x="800" y="68" text-anchor="middle">Aggregation makes a stable pattern easier to detect</text><text class="sub" x="800" y="108" text-anchor="middle">The same people, observed once versus across many situations</text><g filter="url(#s)"><rect class="card" x="70" y="155" width="700" height="610" rx="28"/><rect class="card" x="830" y="155" width="700" height="610" rx="28"/></g><text class="head" x="420" y="215" text-anchor="middle">Single observation</text><text class="body" x="420" y="250" text-anchor="middle">one act mixes trait signal with immediate circumstances</text><text class="head" x="1180" y="215" text-anchor="middle">Aggregated observations</text><text class="body" x="1180" y="250" text-anchor="middle">averaging reduces incidental variation</text>
<g transform="translate(125 290)"><path class="axis" d="M45 390H590M45 390V20"/><path class="guide" d="M70 335L560 85"/><circle cx="110" cy="105" r="18" fill="#8a5aa5"/><circle cx="220" cy="305" r="18" fill="#3974a5"/><circle cx="330" cy="165" r="18" fill="#c47a2e"/><circle cx="440" cy="340" r="18" fill="#4f8b5d"/><circle cx="550" cy="115" r="18" fill="#c65f4b"/><text class="small" x="320" y="425" text-anchor="middle">people ordered along an underlying trait</text><text class="small" x="-205" y="0" transform="rotate(-90)" text-anchor="middle">behavior in this situation</text><rect x="100" y="440" width="440" height="50" rx="22" fill="#f7ece8"/><text class="body" x="320" y="473" text-anchor="middle">situation + chance can dominate one act</text></g>
<g transform="translate(885 290)"><path class="axis" d="M45 390H590M45 390V20"/><path class="guide" d="M70 335L560 85"/><g class="faint" fill="#8a5aa5"><circle cx="95" cy="340" r="12"/><circle cx="105" cy="290" r="12"/><circle cx="115" cy="315" r="12"/><circle cx="120" cy="355" r="12"/></g><g class="faint" fill="#3974a5"><circle cx="205" cy="270" r="12"/><circle cx="215" cy="300" r="12"/><circle cx="225" cy="245" r="12"/><circle cx="230" cy="285" r="12"/></g><g class="faint" fill="#c47a2e"><circle cx="315" cy="215" r="12"/><circle cx="325" cy="250" r="12"/><circle cx="335" cy="190" r="12"/><circle cx="340" cy="230" r="12"/></g><g class="faint" fill="#4f8b5d"><circle cx="425" cy="180" r="12"/><circle cx="435" cy="150" r="12"/><circle cx="445" cy="205" r="12"/><circle cx="450" cy="165" r="12"/></g><g class="faint" fill="#c65f4b"><circle cx="535" cy="85" r="12"/><circle cx="545" cy="130" r="12"/><circle cx="555" cy="110" r="12"/><circle cx="560" cy="70" r="12"/></g><circle class="avg" cx="110" cy="325" r="22" fill="#8a5aa5"/><circle class="avg" cx="220" cy="275" r="22" fill="#3974a5"/><circle class="avg" cx="330" cy="220" r="22" fill="#c47a2e"/><circle class="avg" cx="440" cy="175" r="22" fill="#4f8b5d"/><circle class="avg" cx="550" cy="100" r="22" fill="#c65f4b"/><text class="small" x="320" y="425" text-anchor="middle">same people; large dots are their averages</text><text class="small" x="-205" y="0" transform="rotate(-90)" text-anchor="middle">behavior across situations</text><rect x="100" y="440" width="440" height="50" rx="22" fill="#eaf4ee"/><text class="body" x="320" y="473" text-anchor="middle">the stable pattern becomes easier to see</text></g>
<rect x="250" y="800" width="1100" height="60" rx="28" fill="#eef4f6"/><text class="body" x="800" y="839" text-anchor="middle">Traits predict distributions of behavior better than isolated moments.</text></svg>
