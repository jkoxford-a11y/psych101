<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-labelledby="title desc">
  <title id="title">Baddeley's Working Memory Model</title>
  <desc id="desc">A hub-and-spoke diagram with a central executive coordinating the phonological loop and visuospatial sketchpad.</desc>
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#102a43" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#52606d"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <rect x="52" y="54" width="1496" height="792" rx="24" fill="#f8fbfd" stroke="#dde7ee" stroke-width="2"/>
  <text x="96" y="116" font-family="Aptos, Arial, sans-serif" font-size="42" font-weight="700" fill="#102a43">Baddeley's Working Memory Model</text>
  <text x="96" y="152" font-family="Aptos, Arial, sans-serif" font-size="22" fill="#52606d">Working memory is an active system, not one passive short-term storage box.</text>

  <g filter="url(#softShadow)" font-family="Aptos, Arial, sans-serif">
    <rect x="530" y="214" width="540" height="178" rx="18" fill="#f7d5c2" stroke="#c65f4b" stroke-width="4"/>
    <text x="800" y="280" text-anchor="middle" font-size="34" font-weight="700" fill="#8f3d2e">Central Executive</text>
    <text x="800" y="326" text-anchor="middle" font-size="25" font-weight="700" fill="#102a43">allocates attention, coordinates the system</text>

    <rect x="238" y="548" width="476" height="190" rx="18" fill="#eaf4f8" stroke="#2f5d7c" stroke-width="4"/>
    <text x="476" y="616" text-anchor="middle" font-size="32" font-weight="700" fill="#102a43">Phonological Loop</text>
    <text x="476" y="663" text-anchor="middle" font-size="25" font-weight="700" fill="#466b80">verbal / acoustic information</text>
    <text x="476" y="705" text-anchor="middle" font-size="23" fill="#102a43">"inner voice" for rehearsal</text>

    <rect x="886" y="548" width="476" height="190" rx="18" fill="#eaf4f8" stroke="#2f5d7c" stroke-width="4"/>
    <text x="1124" y="616" text-anchor="middle" font-size="32" font-weight="700" fill="#102a43">Visuospatial Sketchpad</text>
    <text x="1124" y="663" text-anchor="middle" font-size="25" font-weight="700" fill="#466b80">visual / spatial information</text>
    <text x="1124" y="705" text-anchor="middle" font-size="23" fill="#102a43">"inner eye" for routes and images</text>
  </g>

  <g fill="none" stroke="#52606d" stroke-width="4.5" stroke-linecap="round">
    <path d="M680 402 C610 455, 546 486, 498 532" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
    <path d="M920 402 C990 455, 1054 486, 1102 532" marker-end="url(#arrow)" marker-start="url(#arrow)"/>
  </g>

  <rect x="120" y="782" width="1360" height="48" rx="24" fill="#eaf4f8" stroke="#c9d6df" stroke-width="2"/>
  <text x="800" y="814" text-anchor="middle" font-family="Aptos, Arial, sans-serif" font-size="20" font-weight="700" fill="#102a43">The executive coordinates both subsystems while they hold different kinds of information.</text>
</svg>
