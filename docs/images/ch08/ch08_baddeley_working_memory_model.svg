<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-labelledby="title desc">
  <title id="title">Baddeley's Working Memory Model</title>
  <desc id="desc">A cognitive-architecture diagram shows a central executive coordinating the phonological loop, episodic buffer, and visuospatial sketchpad. The episodic buffer links the specialized systems with relevant information from long-term memory to form a coherent temporary representation.</desc>
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#102a43" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#52606d"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>
  <rect x="52" y="54" width="1496" height="792" rx="24" fill="#f8fbfd" stroke="#dde7ee" stroke-width="2"/>
  <text x="96" y="116" font-family="Aptos, Arial, sans-serif" font-size="42" font-weight="700" fill="#102a43">Baddeley's Working Memory Model</text>
  <text x="96" y="152" font-family="Aptos, Arial, sans-serif" font-size="22" fill="#52606d">Specialized systems hold different information; the episodic buffer binds it into a coherent temporary representation.</text>

  <g filter="url(#softShadow)" font-family="Aptos, Arial, sans-serif">
    <rect x="470" y="188" width="660" height="152" rx="18" fill="#f7d5c2" stroke="#c65f4b" stroke-width="4"/>
    <text x="800" y="245" text-anchor="middle" font-size="34" font-weight="700" fill="#8f3d2e">Central Executive</text>
    <text x="800" y="286" text-anchor="middle" font-size="24" font-weight="700" fill="#102a43">allocates attention</text>
    <text x="800" y="317" text-anchor="middle" font-size="24" font-weight="700" fill="#102a43">coordinates the system</text>

    <rect x="118" y="438" width="410" height="164" rx="18" fill="#eaf4f8" stroke="#2f5d7c" stroke-width="4"/>
    <text x="323" y="493" text-anchor="middle" font-size="30" font-weight="700" fill="#102a43">Phonological Loop</text>
    <text x="323" y="535" text-anchor="middle" font-size="24" font-weight="700" fill="#466b80">verbal / acoustic information</text>
    <text x="323" y="572" text-anchor="middle" font-size="22" fill="#102a43">rehearsing words or sounds</text>

    <rect x="595" y="418" width="410" height="204" rx="18" fill="#ffffff" stroke="#c65f4b" stroke-width="4"/>
    <text x="800" y="477" text-anchor="middle" font-size="30" font-weight="700" fill="#8f3d2e">Episodic Buffer</text>
    <text x="800" y="520" text-anchor="middle" font-size="24" font-weight="700" fill="#102a43">temporary binding workspace</text>
    <text x="800" y="558" text-anchor="middle" font-size="22" fill="#52606d">combines words, images, and</text>
    <text x="800" y="589" text-anchor="middle" font-size="22" fill="#52606d">relevant long-term knowledge</text>

    <rect x="1072" y="438" width="410" height="164" rx="18" fill="#eaf4f8" stroke="#2f5d7c" stroke-width="4"/>
    <text x="1277" y="493" text-anchor="middle" font-size="29" font-weight="700" fill="#102a43">Visuospatial Sketchpad</text>
    <text x="1277" y="535" text-anchor="middle" font-size="24" font-weight="700" fill="#466b80">visual / spatial information</text>
    <text x="1277" y="572" text-anchor="middle" font-size="22" fill="#102a43">picturing objects or routes</text>

    <rect x="535" y="694" width="530" height="100" rx="18" fill="#ffffff" stroke="#c9d6df" stroke-width="4"/>
    <text x="800" y="738" text-anchor="middle" font-size="30" font-weight="700" fill="#102a43">Long-Term Memory</text>
    <text x="800" y="772" text-anchor="middle" font-size="22" fill="#52606d">relevant stored knowledge</text>
  </g>

  <g fill="none" stroke="#52606d" stroke-width="4" stroke-linecap="round">
    <path d="M640 350 C570 374, 455 392, 360 426" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <path d="M800 350 L800 404" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <path d="M960 350 C1030 374, 1145 392, 1240 426" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <path d="M540 520 L581 520" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <path d="M1019 520 L1060 520" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
    <path d="M800 636 L800 680" marker-start="url(#arrow)" marker-end="url(#arrow)"/>
  </g>

  <rect x="120" y="806" width="1360" height="40" rx="20" fill="#eaf4f8" stroke="#c9d6df" stroke-width="2"/>
  <text x="800" y="833" text-anchor="middle" font-family="Aptos, Arial, sans-serif" font-size="20" font-weight="700" fill="#102a43">The episodic buffer binds information temporarily; it is not the same as episodic long-term memory.</text>
</svg>
