<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-labelledby="title desc">
  <title id="title">Levels of Processing: Shallow to Deep</title>
  <desc id="desc">A rising ramp shows shallow processing producing weaker traces and deep processing producing more durable traces.</desc>
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#102a43" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#52606d"/>
    </marker>
    <linearGradient id="strength" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#f7d5c2"/>
      <stop offset="1" stop-color="#eaf4f8"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <rect x="52" y="54" width="1496" height="792" rx="24" fill="#f8fbfd" stroke="#dde7ee" stroke-width="2"/>
  <text x="96" y="116" font-family="Aptos, Arial, sans-serif" font-size="42" font-weight="700" fill="#102a43">Levels of Processing: Shallow to Deep</text>
  <text x="96" y="152" font-family="Aptos, Arial, sans-serif" font-size="22" fill="#52606d">How information is processed shapes how durable the memory trace becomes.</text>

  <g filter="url(#softShadow)" font-family="Aptos, Arial, sans-serif">
    <rect x="168" y="212" width="1264" height="500" rx="18" fill="#ffffff" stroke="#c9d6df" stroke-width="2.5"/>
    <rect x="242" y="274" width="38" height="342" rx="19" fill="url(#strength)" stroke="#c9d6df" stroke-width="2"/>

    <rect x="310" y="484" width="468" height="168" rx="18" fill="#f7d5c2" stroke="#c65f4b" stroke-width="4"/>
    <text x="544" y="544" text-anchor="middle" font-size="32" font-weight="700" fill="#8f3d2e">Shallow Processing</text>
    <text x="544" y="588" text-anchor="middle" font-size="24" font-weight="700" fill="#102a43">Surface features</text>
    <text x="544" y="624" text-anchor="middle" font-size="22" fill="#102a43">sound, appearance; re-reading</text>

    <rect x="824" y="252" width="520" height="168" rx="18" fill="#eaf4f8" stroke="#2f5d7c" stroke-width="4"/>
    <text x="1084" y="312" text-anchor="middle" font-size="32" font-weight="700" fill="#102a43">Deep Processing</text>
    <text x="1084" y="356" text-anchor="middle" font-size="24" font-weight="700" fill="#466b80">Meaning, associations, implications</text>
    <text x="1084" y="392" text-anchor="middle" font-size="22" fill="#102a43">explaining it in your own words</text>

    <line x1="682" y1="480" x2="848" y2="424" stroke="#52606d" stroke-width="7" stroke-linecap="round" marker-end="url(#arrow)"/>
  </g>

  <g font-family="Aptos, Arial, sans-serif" fill="#52606d" font-size="23" font-weight="700">
    <text x="218" y="275" text-anchor="end">Durable</text>
    <text x="218" y="304" text-anchor="end">trace</text>
    <text x="218" y="592" text-anchor="end">Weak,</text>
    <text x="218" y="621" text-anchor="end">easily lost</text>
  </g>

  <rect x="371" y="764" width="858" height="52" rx="26" fill="#eaf4f8" stroke="#c9d6df" stroke-width="2"/>
  <text x="800" y="800" text-anchor="middle" font-family="Aptos, Arial, sans-serif" font-size="24" font-weight="700" fill="#102a43">Deeper meaning-based processing usually leaves a more durable trace.</text>
</svg>
