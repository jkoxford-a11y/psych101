<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-labelledby="title desc">
  <title id="title">Same Word, Different Mental Work</title>
  <desc id="desc">The word ORANGE appears in two encoding tasks. A shallow task asks whether it is printed in uppercase, while a deep task asks whether it completes a meaningful sentence. At a later unexpected memory test, meaning-based processing produces stronger recognition.</desc>
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="135%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#102a43" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#52606d"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>
  <rect x="52" y="54" width="1496" height="792" rx="24" fill="#f8fbfd" stroke="#dde7ee" stroke-width="2"/>
  <g font-family="Aptos, Arial, sans-serif">
    <text x="96" y="116" font-size="42" font-weight="700" fill="#102a43">Same Word. Different Mental Work.</text>
    <text x="96" y="152" font-size="22" fill="#52606d">What you do with information during encoding changes what remains.</text>

    <g filter="url(#softShadow)">
      <rect x="132" y="202" width="628" height="374" rx="20" fill="#ffffff" stroke="#c65f4b" stroke-width="4"/>
      <rect x="840" y="202" width="628" height="374" rx="20" fill="#ffffff" stroke="#2f5d7c" stroke-width="4"/>
    </g>

    <rect x="170" y="234" width="214" height="44" rx="22" fill="#f7d5c2"/>
    <text x="277" y="264" text-anchor="middle" font-size="23" font-weight="700" fill="#8f3d2e">SHALLOW TASK</text>
    <text x="170" y="326" font-size="28" font-weight="700" fill="#102a43">Is the word printed in uppercase?</text>
    <rect x="254" y="362" width="384" height="106" rx="14" fill="#fff8f3" stroke="#e5b088" stroke-width="2"/>
    <text x="446" y="431" text-anchor="middle" font-size="48" font-weight="700" letter-spacing="5" fill="#8f3d2e">ORANGE</text>
    <circle cx="330" cy="517" r="15" fill="#ffffff" stroke="#c65f4b" stroke-width="3"/>
    <text x="358" y="525" font-size="24" fill="#102a43">Yes</text>
    <circle cx="492" cy="517" r="15" fill="#ffffff" stroke="#c65f4b" stroke-width="3"/>
    <text x="520" y="525" font-size="24" fill="#102a43">No</text>

    <rect x="878" y="234" width="188" height="44" rx="22" fill="#eaf4f8"/>
    <text x="972" y="264" text-anchor="middle" font-size="23" font-weight="700" fill="#2f5d7c">DEEP TASK</text>
    <text x="878" y="326" font-size="28" font-weight="700" fill="#102a43">Does the word complete the idea?</text>
    <rect x="916" y="362" width="476" height="106" rx="14" fill="#f3f8fb" stroke="#8eb4c7" stroke-width="2"/>
    <text x="1154" y="405" text-anchor="middle" font-size="28" fill="#102a43">“She peeled the</text>
    <text x="1154" y="446" text-anchor="middle" font-size="32" font-weight="700" fill="#2f5d7c">ORANGE.”</text>
    <circle cx="1038" cy="517" r="15" fill="#ffffff" stroke="#2f5d7c" stroke-width="3"/>
    <text x="1066" y="525" font-size="24" fill="#102a43">Yes</text>
    <circle cx="1200" cy="517" r="15" fill="#ffffff" stroke="#2f5d7c" stroke-width="3"/>
    <text x="1228" y="525" font-size="24" fill="#102a43">No</text>

    <line x1="446" y1="584" x2="446" y2="634" stroke="#52606d" stroke-width="5" marker-end="url(#arrow)"/>
    <line x1="1154" y1="584" x2="1154" y2="634" stroke="#52606d" stroke-width="5" marker-end="url(#arrow)"/>

    <text x="800" y="622" text-anchor="middle" font-size="22" font-weight="700" fill="#52606d">LATER: AN UNEXPECTED MEMORY TEST</text>
    <rect x="132" y="654" width="1336" height="108" rx="18" fill="#ffffff" stroke="#c9d6df" stroke-width="2.5"/>
    <text x="174" y="696" font-size="24" font-weight="700" fill="#8f3d2e">Surface features</text>
    <rect x="390" y="675" width="286" height="28" rx="14" fill="#f7d5c2"/>
    <text x="694" y="698" font-size="21" fill="#52606d">weaker recognition</text>
    <text x="174" y="742" font-size="24" font-weight="700" fill="#2f5d7c">Meaning</text>
    <rect x="390" y="721" width="650" height="28" rx="14" fill="#466b80"/>
    <text x="1058" y="744" font-size="21" font-weight="700" fill="#102a43">stronger recognition</text>

    <rect x="316" y="786" width="968" height="40" rx="20" fill="#eaf4f8" stroke="#c9d6df" stroke-width="2"/>
    <text x="800" y="814" text-anchor="middle" font-size="22" font-weight="700" fill="#102a43">The word stayed the same; the encoding operation changed.</text>
  </g>
</svg>
