<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" role="img" aria-labelledby="title desc">
  <title id="title">Reconstructive Memory Process</title>
  <desc id="desc">A left-to-right process diagram shows an original event, fragments encoded, post-event information, and a reconstructed memory that may not match the original event.</desc>
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#102a43" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 Z" fill="#52606d"/>
    </marker>
  </defs>
  <rect width="1600" height="900" fill="#ffffff"/>
  <rect x="52" y="54" width="1496" height="792" rx="24" fill="#f8fbfd" stroke="#dde7ee" stroke-width="2"/>
  <text x="96" y="116" font-family="Aptos, Arial, sans-serif" font-size="42" font-weight="700" fill="#102a43">Reconstructive Memory Process</text>
  <text x="96" y="152" font-family="Aptos, Arial, sans-serif" font-size="22" fill="#52606d">Remembering rebuilds a plausible account; it does not replay a perfect recording.</text>

  <g filter="url(#softShadow)" font-family="Aptos, Arial, sans-serif">
    <rect x="116" y="300" width="292" height="250" rx="18" fill="#eaf4f8" stroke="#2f5d7c" stroke-width="4"/>
    <text x="262" y="355" text-anchor="middle" font-size="29" font-weight="700" fill="#102a43">Original Event</text>
    <rect x="176" y="395" width="68" height="72" rx="8" fill="#ffffff" stroke="#466b80" stroke-width="3"/>
    <circle cx="300" cy="430" r="38" fill="#ffffff" stroke="#466b80" stroke-width="3"/>
    <line x1="178" y1="492" x2="345" y2="492" stroke="#466b80" stroke-width="5" stroke-linecap="round"/>

    <rect x="496" y="300" width="292" height="250" rx="18" fill="#ffffff" stroke="#c9d6df" stroke-width="4"/>
    <text x="642" y="355" text-anchor="middle" font-size="29" font-weight="700" fill="#102a43">Fragments Encoded</text>
    <circle cx="570" cy="430" r="13" fill="#466b80"/>
    <rect x="624" y="396" width="48" height="28" rx="7" fill="#eaf4f8" stroke="#466b80" stroke-width="3"/>
    <line x1="590" y1="486" x2="690" y2="486" stroke="#466b80" stroke-width="5" stroke-linecap="round"/>
    <circle cx="710" cy="455" r="10" fill="#466b80" opacity="0.65"/>

    <rect x="882" y="300" width="292" height="250" rx="18" fill="#ffffff" stroke="#c9d6df" stroke-width="4"/>
    <text x="1028" y="355" text-anchor="middle" font-size="29" font-weight="700" fill="#102a43">Reconstruction</text>
    <text x="1028" y="424" text-anchor="middle" font-size="24" fill="#52606d">fragments + knowledge</text>
    <text x="1028" y="462" text-anchor="middle" font-size="24" fill="#52606d">+ expectations</text>

    <rect x="1260" y="300" width="292" height="250" rx="18" fill="#eaf4f8" stroke="#2f5d7c" stroke-width="4"/>
    <text x="1406" y="355" text-anchor="middle" font-size="28" font-weight="700" fill="#102a43">Reconstructed Memory</text>
    <rect x="1326" y="395" width="68" height="72" rx="8" fill="#ffffff" stroke="#466b80" stroke-width="3"/>
    <circle cx="1445" cy="430" r="38" fill="#ffffff" stroke="#466b80" stroke-width="3"/>
    <line x1="1328" y1="492" x2="1495" y2="492" stroke="#466b80" stroke-width="5" stroke-linecap="round"/>
    <circle cx="1488" cy="388" r="13" fill="#c65f4b"/>
    <text x="1406" y="590" text-anchor="middle" font-size="22" font-weight="700" fill="#8f3d2e"><tspan x="1406" dy="0">May not match the</tspan><tspan x="1406" dy="26">original event</tspan></text>

    <rect x="836" y="198" width="384" height="78" rx="18" fill="#f7d5c2" stroke="#c65f4b" stroke-width="3"/>
    <text x="1028" y="228" text-anchor="middle" font-size="21" font-weight="700" fill="#8f3d2e">Post-event information</text>
    <text x="1028" y="256" text-anchor="middle" font-size="19" fill="#102a43">other accounts, expectations</text>
  </g>

  <g fill="none" stroke="#52606d" stroke-width="4.5" stroke-linecap="round">
    <line x1="430" y1="425" x2="472" y2="425" marker-end="url(#arrow)"/>
    <line x1="810" y1="425" x2="858" y2="425" marker-end="url(#arrow)"/>
    <line x1="1196" y1="425" x2="1236" y2="425" marker-end="url(#arrow)"/>
    <path d="M1028 278 C1028 300, 1028 310, 1028 326" stroke="#c65f4b" marker-end="url(#arrow)"/>
  </g>

  <rect x="290" y="742" width="1020" height="62" rx="31" fill="#eaf4f8" stroke="#c9d6df" stroke-width="2"/>
  <text x="800" y="781" text-anchor="middle" font-family="Aptos, Arial, sans-serif" font-size="25" font-weight="700" fill="#102a43">Memory usually works well, but reconstruction creates room for plausible drift.</text>
</svg>
