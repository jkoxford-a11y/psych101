<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Why a conjunction cannot be more probable</title>
<desc id="desc">A large set labeled All campus library workers contains a smaller subset labeled Library workers who also belong to the sustainability club. Every member of the smaller set is also in the larger set, so the probability of the conjunction cannot exceed the probability of the larger category.</desc>
<style>text{font-family:Arial,Helvetica,sans-serif;fill:#172033}.title{font-size:52px;font-weight:700}.sub{font-size:28px;fill:#526070}.label{font-size:35px;font-weight:700}.small{font-size:26px}.equation{font-size:30px;font-weight:700;fill:#B14A4A}</style>
<rect width="1600" height="900" fill="#FAFBFC"/>
<text x="80" y="105" class="title">Why the conjunction cannot be more probable</text>
<text x="82" y="155" class="sub">A more detailed description may feel more representative while describing a smaller set.</text>
<rect x="180" y="225" width="1180" height="550" rx="50" fill="#DCEAF8" stroke="#274C77" stroke-width="5"/>
<text x="250" y="285" class="label">All campus library workers</text>
<text x="250" y="330" class="small" fill="#274C77">Option A</text>
<rect x="640" y="390" width="570" height="300" rx="45" fill="#DDEBD5" stroke="#5F7F47" stroke-width="5"/>
<text x="925" y="455" text-anchor="middle" font-size="30" font-weight="700">Library workers who also belong</text>
<text x="925" y="500" text-anchor="middle" font-size="30" font-weight="700">to the sustainability club</text>
<text x="925" y="570" text-anchor="middle" class="label" fill="#4B6A36">Option B</text>
<g fill="#7096BC"><circle cx="350" cy="455" r="22"/><rect x="320" y="478" width="60" height="75" rx="14"/><circle cx="470" cy="610" r="22"/><rect x="440" y="633" width="60" height="75" rx="14"/><circle cx="530" cy="430" r="22"/><rect x="500" y="453" width="60" height="75" rx="14"/><circle cx="390" cy="675" r="22"/><rect x="360" y="698" width="60" height="60" rx="14"/></g>
<g fill="#7BA05B"><circle cx="785" cy="600" r="22"/><rect x="755" y="623" width="60" height="65" rx="14"/><circle cx="930" cy="610" r="22"/><rect x="900" y="633" width="60" height="55" rx="14"/><circle cx="1080" cy="590" r="22"/><rect x="1050" y="613" width="60" height="75" rx="14"/></g>
<line x1="1250" y1="510" x2="1435" y2="510" stroke="#F4A261" stroke-width="6"/><polygon points="1250,510 1275,495 1275,525" fill="#F4A261"/>
<rect x="1360" y="390" width="190" height="250" rx="24" fill="#FFF5E8" stroke="#F4A261" stroke-width="4"/>
<text x="1455" y="435" text-anchor="middle" class="small">Every B</text><text x="1455" y="470" text-anchor="middle" class="small">is also an A.</text>
<text x="1455" y="525" text-anchor="middle" class="small">Adding a</text><text x="1455" y="560" text-anchor="middle" class="small">condition can</text>
<text x="1455" y="595" text-anchor="middle" class="small">only shrink</text><text x="1455" y="630" text-anchor="middle" class="small">the set.</text>
<rect x="220" y="810" width="1160" height="60" rx="20" fill="#FFFFFF" stroke="#C7D0DA" stroke-width="2"/>
<text x="800" y="850" text-anchor="middle" class="equation">P(library worker AND sustainability-club member) ≤ P(library worker)</text>
</svg>