<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Biases as question substitution</title>
<desc id="desc">A matrix pairs five cognitive biases with hard questions and simpler shortcut questions that fast thinking tends to answer instead.</desc>
<defs>
  <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
    <feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#102a43" flood-opacity="0.12"/>
  </filter>
  <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
    <path d="M0,0 L10,5 L0,10 Z" fill="#52606d"/>
  </marker>
</defs>
<rect width="1600" height="900" fill="#ffffff"/>
<rect x="52" y="54" width="1496" height="792" rx="24" fill="#f8fbfd" stroke="#dde7ee" stroke-width="2"/>
<text x="96" y="116" font-family="Aptos, Arial, sans-serif" font-size="42" font-weight="700" fill="#102a43" text-anchor="start" >Biases as Question Substitution</text>
<text x="96" y="152" font-family="Aptos, Arial, sans-serif" font-size="22" font-weight="400" fill="#52606d" text-anchor="start" >Fast thinking often answers a simpler question than the one actually asked.</text>
<g filter="url(#softShadow)">
  <rect x="140" y="196" width="1320" height="538" rx="18" fill="#ffffff" stroke="#c9d6df" stroke-width="2.5"/>
</g>
<rect x="140" y="196" width="1320" height="58" rx="18" fill="#2f5d7c"/>
<rect x="140" y="225" width="1320" height="29" fill="#2f5d7c"/>
<text x="176" y="234" font-family="Aptos, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="start" >Bias</text>
<text x="520" y="234" font-family="Aptos, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="start" >Hard question</text>
<text x="980" y="234" font-family="Aptos, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff" text-anchor="start" >Shortcut question</text>
<line x1="480" y1="196" x2="480" y2="734" stroke="#c9d6df" stroke-width="2"/>
<line x1="940" y1="196" x2="940" y2="734" stroke="#c9d6df" stroke-width="2"/>
<rect x="140" y="254" width="1320" height="96" fill="#ffffff" stroke="#dde7ee" stroke-width="1.5"/><text x="176" y="313" font-family="Aptos, Arial, sans-serif" font-size="26" font-weight="700" fill="#102a43" text-anchor="start" >Availability</text><text x="520" y="313" font-family="Aptos, Arial, sans-serif" font-size="24" font-weight="500" fill="#243b53" text-anchor="start" >How common is it?</text><text x="980" y="313" font-family="Aptos, Arial, sans-serif" font-size="24" font-weight="500" fill="#243b53" text-anchor="start" >What examples come to mind quickly?</text><rect x="140" y="350" width="1320" height="96" fill="#f3f8fb" stroke="#dde7ee" stroke-width="1.5"/><text x="176" y="409" font-family="Aptos, Arial, sans-serif" font-size="26" font-weight="700" fill="#102a43" text-anchor="start" >Representativeness</text><text x="520" y="409" font-family="Aptos, Arial, sans-serif" font-size="24" font-weight="500" fill="#243b53" text-anchor="start" >How likely is this case?</text><text x="980" y="409" font-family="Aptos, Arial, sans-serif" font-size="24" font-weight="500" fill="#243b53" text-anchor="start" >What does it resemble?</text><rect x="140" y="446" width="1320" height="96" fill="#ffffff" stroke="#dde7ee" stroke-width="1.5"/><text x="176" y="505" font-family="Aptos, Arial, sans-serif" font-size="26" font-weight="700" fill="#102a43" text-anchor="start" >Confirmation bias</text><text x="520" y="505" font-family="Aptos, Arial, sans-serif" font-size="24" font-weight="500" fill="#243b53" text-anchor="start" >Is this belief true?</text><text x="980" y="505" font-family="Aptos, Arial, sans-serif" font-size="24" font-weight="500" fill="#243b53" text-anchor="start" >What supports my first belief?</text><rect x="140" y="542" width="1320" height="96" fill="#f3f8fb" stroke="#dde7ee" stroke-width="1.5"/><text x="176" y="601" font-family="Aptos, Arial, sans-serif" font-size="26" font-weight="700" fill="#102a43" text-anchor="start" >Framing</text><text x="520" y="601" font-family="Aptos, Arial, sans-serif" font-size="24" font-weight="500" fill="#243b53" text-anchor="start" >What are the actual outcomes?</text><text x="980" y="601" font-family="Aptos, Arial, sans-serif" font-size="24" font-weight="500" fill="#243b53" text-anchor="start" >Does this sound like a gain or a loss?</text><rect x="140" y="638" width="1320" height="96" fill="#ffffff" stroke="#dde7ee" stroke-width="1.5"/><text x="176" y="697" font-family="Aptos, Arial, sans-serif" font-size="26" font-weight="700" fill="#102a43" text-anchor="start" >Anchoring</text><text x="520" y="697" font-family="Aptos, Arial, sans-serif" font-size="24" font-weight="500" fill="#243b53" text-anchor="start" >What is a fair estimate?</text><text x="980" y="697" font-family="Aptos, Arial, sans-serif" font-size="24" font-weight="500" fill="#243b53" text-anchor="start" >What number did I hear first?</text>
<rect x="140" y="196" width="1320" height="538" rx="18" fill="none" stroke="#c9d6df" stroke-width="2.5"/>
</svg>