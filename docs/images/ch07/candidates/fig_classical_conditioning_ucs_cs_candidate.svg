<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350">
  <title>Classical conditioning as predictive learning</title>
  <desc>Three panels show food producing an unlearned response before learning, a tone reliably predicting food during acquisition, and the tone producing a learned conditioned response afterward.</desc>
  <defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#17324d"/></marker></defs>
  <rect width="2400" height="1350" fill="#fbfcfe"/>
  <text x="1200" y="105" text-anchor="middle" font-family="Arial,sans-serif" font-size="72" font-weight="700" fill="#10253d">Classical conditioning: learning what predicts what</text>
  <g font-family="Arial,sans-serif">
    <g transform="translate(70 175)"><rect width="700" height="950" rx="28" fill="#eef5ef" stroke="#4f7d58" stroke-width="5"/><text x="350" y="80" text-anchor="middle" font-size="48" font-weight="700" fill="#315d39">Before learning</text><text x="350" y="140" text-anchor="middle" font-size="30" fill="#23394d">Unlearned relation</text>
      <circle cx="210" cy="330" r="92" fill="#fff" stroke="#c59129" stroke-width="6"/><path d="M145 335Q210 395 275 335L260 385Q210 425 160 385Z" fill="#d6a34b"/><circle cx="185" cy="325" r="10" fill="#7b4b20"/><circle cx="220" cy="305" r="10" fill="#7b4b20"/><circle cx="245" cy="333" r="10" fill="#7b4b20"/><text x="210" y="465" text-anchor="middle" font-size="38" font-weight="700">Food (UCS)</text>
      <line x1="330" y1="330" x2="510" y2="330" stroke="#17324d" stroke-width="12" marker-end="url(#a)"/><g transform="translate(555 245)"><path d="M45 15Q95 55 45 95" fill="none" stroke="#2770a8" stroke-width="12"/><path d="M90 0Q155 55 90 110" fill="none" stroke="#2770a8" stroke-width="12"/><circle cx="20" cy="55" r="18" fill="#2770a8"/></g><text x="555" y="465" text-anchor="middle" font-size="32" font-weight="700">Salivation (UCR)</text>
      <g transform="translate(170 590)"><path d="M0 90Q90 -15 180 90" fill="none" stroke="#667785" stroke-width="15"/><rect x="70" y="85" width="40" height="70" rx="8" fill="#667785"/><path d="M-25 70Q-65 90 -25 110M205 70Q245 90 205 110" fill="none" stroke="#667785" stroke-width="10"/></g><text x="260" y="805" text-anchor="middle" font-size="38" font-weight="700">Tone</text><line x1="390" y1="690" x2="565" y2="690" stroke="#87939d" stroke-width="8" stroke-dasharray="20 16"/><text x="475" y="650" text-anchor="middle" font-size="30" fill="#4b5964">does not yet</text><text x="475" y="735" text-anchor="middle" font-size="30" fill="#4b5964">predict food</text>
    </g>
    <g transform="translate(850 175)"><rect width="700" height="950" rx="28" fill="#eef4fb" stroke="#3972ad" stroke-width="5"/><text x="350" y="80" text-anchor="middle" font-size="48" font-weight="700" fill="#20568d">Acquisition</text><text x="350" y="140" text-anchor="middle" font-size="30" fill="#23394d">Reliable predictive pairing</text>
      <g transform="translate(105 275)"><path d="M0 90Q90 -15 180 90" fill="none" stroke="#3972ad" stroke-width="15"/><rect x="70" y="85" width="40" height="70" rx="8" fill="#3972ad"/><path d="M-25 70Q-65 90 -25 110M205 70Q245 90 205 110" fill="none" stroke="#3972ad" stroke-width="10"/></g><text x="195" y="490" text-anchor="middle" font-size="38" font-weight="700">Tone</text><line x1="315" y1="365" x2="465" y2="365" stroke="#17324d" stroke-width="12" marker-end="url(#a)"/><circle cx="555" cy="365" r="92" fill="#fff" stroke="#c59129" stroke-width="6"/><path d="M490 370Q555 430 620 370L605 420Q555 460 505 420Z" fill="#d6a34b"/><text x="555" y="490" text-anchor="middle" font-size="38" font-weight="700">Food</text>
      <rect x="85" y="600" width="530" height="175" rx="24" fill="#fff" stroke="#8bb1d6" stroke-width="4"/><text x="350" y="675" text-anchor="middle" font-size="34" font-weight="700" fill="#20568d">Tone improves prediction of food</text><text x="350" y="730" text-anchor="middle" font-size="29" fill="#23394d">Contingency—not repetition alone—matters.</text>
      <text x="350" y="865" text-anchor="middle" font-size="31" fill="#23394d">The formerly neutral tone gains</text><text x="350" y="910" text-anchor="middle" font-size="31" fill="#23394d">predictive meaning.</text>
    </g>
    <g transform="translate(1630 175)"><rect width="700" height="950" rx="28" fill="#f4effa" stroke="#7652a5" stroke-width="5"/><text x="350" y="80" text-anchor="middle" font-size="48" font-weight="700" fill="#5a3987">After learning</text><text x="350" y="140" text-anchor="middle" font-size="30" fill="#23394d">Learned predictive cue</text>
      <g transform="translate(105 300)"><path d="M0 90Q90 -15 180 90" fill="none" stroke="#7652a5" stroke-width="15"/><rect x="70" y="85" width="40" height="70" rx="8" fill="#7652a5"/><path d="M-25 70Q-65 90 -25 110M205 70Q245 90 205 110" fill="none" stroke="#7652a5" stroke-width="10"/></g><text x="195" y="515" text-anchor="middle" font-size="38" font-weight="700">Tone (CS)</text><line x1="330" y1="390" x2="500" y2="390" stroke="#17324d" stroke-width="12" marker-end="url(#a)"/><g transform="translate(535 310)"><path d="M45 15Q95 55 45 95" fill="none" stroke="#7652a5" stroke-width="12"/><path d="M90 0Q155 55 90 110" fill="none" stroke="#7652a5" stroke-width="12"/><circle cx="20" cy="55" r="18" fill="#7652a5"/></g><text x="565" y="515" text-anchor="middle" font-size="38" font-weight="700">Learned CR</text>
      <rect x="70" y="610" width="560" height="205" rx="24" fill="#fff" stroke="#b8a0d4" stroke-width="4"/><text x="350" y="685" text-anchor="middle" font-size="34" font-weight="700" fill="#5a3987">The tone now predicts food</text><text x="350" y="745" text-anchor="middle" font-size="30" fill="#23394d">and evokes conditioned responding.</text>
    </g>
    <rect x="210" y="1175" width="1980" height="105" rx="24" fill="#fff7df" stroke="#c59129" stroke-width="4"/><text x="1200" y="1243" text-anchor="middle" font-size="31" font-weight="700" fill="#4a3a17">CR and UCR are named by learning history; their form need not be identical.</text>
  </g>
</svg>
