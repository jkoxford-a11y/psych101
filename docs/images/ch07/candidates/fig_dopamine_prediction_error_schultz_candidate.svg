<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350"><title>Schematic phasic reward prediction error sequence</title><desc>Four panels show a positive phasic response to an unexpected reward, a response shifting to a learned cue, little prediction error when expected reward arrives, and a dip when expected reward is omitted.</desc><rect width="2400" height="1350" fill="#fbfcfe"/><g font-family="Arial,sans-serif"><text x="1200" y="90" text-anchor="middle" font-size="67" font-weight="700" fill="#10253d">A classic phasic reward-prediction-error pattern</text><text x="1200" y="145" text-anchor="middle" font-size="28" fill="#4b5964">Schematic response in a well-studied subset of midbrain dopamine neurons in particular reward-learning tasks</text>
<g transform="translate(55 205)"><rect width="555" height="830" rx="25" fill="#f3f8ef" stroke="#7ca06c" stroke-width="5"/><circle cx="55" cy="58" r="32" fill="#416c35"/><text x="55" y="70" text-anchor="middle" font-size="30" font-weight="700" fill="#fff">1</text><text x="290" y="65" text-anchor="middle" font-size="34" font-weight="700" fill="#315d39">Unexpected reward</text><text x="278" y="125" text-anchor="middle" font-size="27">Positive response at reward</text><line x1="70" y1="420" x2="485" y2="420" stroke="#243b4c" stroke-width="5"/><line x1="130" y1="190" x2="130" y2="650" stroke="#b0bac2" stroke-width="3" stroke-dasharray="12 10"/><line x1="405" y1="190" x2="405" y2="650" stroke="#b0bac2" stroke-width="3" stroke-dasharray="12 10"/><text x="130" y="690" text-anchor="middle" font-size="25">cue</text><text x="405" y="690" text-anchor="middle" font-size="25">reward</text><path d="M70 420L350 420 C375 420 375 250 405 250 C435 250 435 420 485 420" fill="none" stroke="#315d39" stroke-width="14"/><text x="278" y="770" text-anchor="middle" font-size="28" font-weight="700" fill="#315d39">Better than predicted</text></g>
<g transform="translate(635 205)"><rect width="555" height="830" rx="25" fill="#eef4fb" stroke="#6f9aca" stroke-width="5"/><circle cx="55" cy="58" r="32" fill="#20568d"/><text x="55" y="70" text-anchor="middle" font-size="30" font-weight="700" fill="#fff">2</text><text x="300" y="65" text-anchor="middle" font-size="34" font-weight="700" fill="#20568d">Learned cue</text><text x="278" y="125" text-anchor="middle" font-size="27">Positive response shifts to cue</text><line x1="70" y1="420" x2="485" y2="420" stroke="#243b4c" stroke-width="5"/><line x1="130" y1="190" x2="130" y2="650" stroke="#b0bac2" stroke-width="3" stroke-dasharray="12 10"/><line x1="405" y1="190" x2="405" y2="650" stroke="#b0bac2" stroke-width="3" stroke-dasharray="12 10"/><text x="130" y="690" text-anchor="middle" font-size="25">cue</text><text x="405" y="690" text-anchor="middle" font-size="25">reward</text><path d="M70 420L90 420 C105 420 105 250 130 250 C160 250 160 420 205 420L485 420" fill="none" stroke="#20568d" stroke-width="14"/><text x="278" y="770" text-anchor="middle" font-size="28" font-weight="700" fill="#20568d">Cue carries the surprise</text></g>
<g transform="translate(1215 205)"><rect width="555" height="830" rx="25" fill="#f5f1fa" stroke="#a68ac2" stroke-width="5"/><circle cx="55" cy="58" r="32" fill="#633f8d"/><text x="55" y="70" text-anchor="middle" font-size="30" font-weight="700" fill="#fff">3</text><text x="305" y="65" text-anchor="middle" font-size="34" font-weight="700" fill="#633f8d">Expected reward arrives</text><text x="278" y="125" text-anchor="middle" font-size="27">Little error at reward time</text><line x1="70" y1="420" x2="485" y2="420" stroke="#243b4c" stroke-width="5"/><line x1="130" y1="190" x2="130" y2="650" stroke="#b0bac2" stroke-width="3" stroke-dasharray="12 10"/><line x1="405" y1="190" x2="405" y2="650" stroke="#b0bac2" stroke-width="3" stroke-dasharray="12 10"/><text x="130" y="690" text-anchor="middle" font-size="25">cue</text><text x="405" y="690" text-anchor="middle" font-size="25">reward</text><path d="M70 420L90 420 C105 420 105 250 130 250 C160 250 160 420 205 420L485 420" fill="none" stroke="#633f8d" stroke-width="14"/><text x="278" y="770" text-anchor="middle" font-size="28" font-weight="700" fill="#633f8d">Outcome matches prediction</text></g>
<g transform="translate(1795 205)"><rect width="555" height="830" rx="25" fill="#fff3ed" stroke="#d48b73" stroke-width="5"/><circle cx="55" cy="58" r="32" fill="#a74427"/><text x="55" y="70" text-anchor="middle" font-size="30" font-weight="700" fill="#fff">4</text><text x="305" y="65" text-anchor="middle" font-size="34" font-weight="700" fill="#a74427">Expected reward omitted</text><text x="278" y="125" text-anchor="middle" font-size="27">Dip at expected reward time</text><line x1="70" y1="420" x2="485" y2="420" stroke="#243b4c" stroke-width="5"/><line x1="130" y1="190" x2="130" y2="650" stroke="#b0bac2" stroke-width="3" stroke-dasharray="12 10"/><line x1="405" y1="190" x2="405" y2="650" stroke="#b0bac2" stroke-width="3" stroke-dasharray="12 10"/><text x="130" y="690" text-anchor="middle" font-size="25">cue</text><text x="405" y="690" text-anchor="middle" font-size="25">expected reward</text><path d="M70 420L90 420 C105 420 105 250 130 250 C160 250 160 420 205 420L350 420 C375 420 375 560 405 560 C435 560 435 420 485 420" fill="none" stroke="#a74427" stroke-width="14"/><text x="278" y="770" text-anchor="middle" font-size="28" font-weight="700" fill="#a74427">Worse than predicted</text></g>
<rect x="175" y="1090" width="2050" height="165" rx="28" fill="#fff7df" stroke="#c59129" stroke-width="5"/><text x="1200" y="1160" text-anchor="middle" font-size="38" font-weight="700" fill="#4a3a17">Phasic prediction-error signals can support learning.</text><text x="1200" y="1212" text-anchor="middle" font-size="29" fill="#4a3a17">This brief event-linked pattern is distinct from sustained uncertainty-related activity.</text></g></svg>
