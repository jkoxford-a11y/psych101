<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350"><title>Operant conditioning classification matrix</title><desc>A two by two matrix classifies consequences by whether behavior later increases or decreases and whether a consequence is added or removed.</desc><rect width="2400" height="1350" fill="#fbfcfe"/><g font-family="Arial,sans-serif"><text x="1200" y="90" text-anchor="middle" font-size="68" font-weight="700" fill="#10253d">Classify consequences with two measured changes</text>
<rect x="390" y="155" width="930" height="105" rx="18" fill="#e9f2fb"/><rect x="1320" y="155" width="930" height="105" rx="18" fill="#f4eefb"/><text x="855" y="223" text-anchor="middle" font-size="40" font-weight="700" fill="#20568d">Consequence added (+)</text><text x="1785" y="223" text-anchor="middle" font-size="40" font-weight="700" fill="#633f8d">Consequence removed (−)</text>
<rect x="85" y="260" width="305" height="430" rx="18" fill="#eef6e9"/><rect x="85" y="690" width="305" height="430" rx="18" fill="#fff0eb"/><text x="238" y="440" text-anchor="middle" font-size="39" font-weight="700" fill="#416c35">Behavior</text><text x="238" y="490" text-anchor="middle" font-size="39" font-weight="700" fill="#416c35">increases ↑</text><text x="238" y="540" text-anchor="middle" font-size="28">measured later</text><text x="238" y="870" text-anchor="middle" font-size="39" font-weight="700" fill="#a74427">Behavior</text><text x="238" y="920" text-anchor="middle" font-size="39" font-weight="700" fill="#a74427">decreases ↓</text><text x="238" y="970" text-anchor="middle" font-size="28">measured later</text>
<g><rect x="390" y="260" width="930" height="430" fill="#f5faf3" stroke="#8fad83" stroke-width="4"/><text x="855" y="345" text-anchor="middle" font-size="44" font-weight="700" fill="#315d39">Positive reinforcement</text><text x="855" y="415" text-anchor="middle" font-size="31">A point is added after an on-time submission.</text><text x="855" y="470" text-anchor="middle" font-size="31" font-weight="700">On-time submissions increase.</text><text x="855" y="585" text-anchor="middle" font-size="54" fill="#315d39">＋  ↑</text></g>
<g><rect x="1320" y="260" width="930" height="430" fill="#f8f4fb" stroke="#a88bc5" stroke-width="4"/><text x="1785" y="345" text-anchor="middle" font-size="44" font-weight="700" fill="#5a3987">Negative reinforcement</text><text x="1785" y="415" text-anchor="middle" font-size="31">Buckling up removes the seatbelt chime.</text><text x="1785" y="470" text-anchor="middle" font-size="31" font-weight="700">Buckling up increases.</text><text x="1785" y="585" text-anchor="middle" font-size="54" fill="#5a3987">−  ↑</text></g>
<g><rect x="390" y="690" width="930" height="430" fill="#fff5f1" stroke="#d48b73" stroke-width="4"/><text x="855" y="775" text-anchor="middle" font-size="44" font-weight="700" fill="#a74427">Positive punishment</text><text x="855" y="845" text-anchor="middle" font-size="31">Extra practice is added after rushing.</text><text x="855" y="900" text-anchor="middle" font-size="31" font-weight="700">Rushed work decreases.</text><text x="855" y="1015" text-anchor="middle" font-size="54" fill="#a74427">＋  ↓</text></g>
<g><rect x="1320" y="690" width="930" height="430" fill="#fff8f4" stroke="#d5a28c" stroke-width="4"/><text x="1785" y="775" text-anchor="middle" font-size="44" font-weight="700" fill="#8b3b28">Negative punishment</text><text x="1785" y="845" text-anchor="middle" font-size="31">Game time is removed after missing curfew.</text><text x="1785" y="900" text-anchor="middle" font-size="31" font-weight="700">Missing curfew decreases.</text><text x="1785" y="1015" text-anchor="middle" font-size="54" fill="#8b3b28">−  ↓</text></g>
<rect x="150" y="1165" width="2100" height="120" rx="24" fill="#fff7df" stroke="#c59129" stroke-width="4"/><text x="1200" y="1215" text-anchor="middle" font-size="32" font-weight="700" fill="#4a3a17">Positive/negative = added/removed. Reinforcement/punishment = behavior increases/decreases.</text><text x="1200" y="1260" text-anchor="middle" font-size="26" fill="#4a3a17">Function depends on the measured behavior change—not on whether an event seems pleasant or unpleasant.</text></g></svg>
