<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350"><title>Extinction changes observed responding without proving erasure</title><desc>A schematic response curve rises during acquisition, declines when the cue occurs without the outcome, and partially returns after time or context change.</desc><rect width="2400" height="1350" fill="#fbfcfe"/><g font-family="Arial,sans-serif"><text x="1200" y="105" text-anchor="middle" font-size="72" font-weight="700" fill="#10253d">Extinction changes performance—not necessarily storage</text><text x="1200" y="165" text-anchor="middle" font-size="31" fill="#4b5964">Schematic observable responding</text>
<rect x="90" y="220" width="2220" height="760" rx="30" fill="#fff" stroke="#bdc9d4" stroke-width="5"/><line x1="230" y1="850" x2="2180" y2="850" stroke="#18344f" stroke-width="7"/><line x1="230" y1="850" x2="230" y2="330" stroke="#18344f" stroke-width="7"/><text x="1200" y="930" text-anchor="middle" font-size="34" font-weight="700">Experience over time</text><text transform="translate(145 600) rotate(-90)" text-anchor="middle" font-size="34" font-weight="700">Observed responding</text>
<rect x="230" y="250" width="610" height="85" fill="#e9f2fb"/><rect x="840" y="250" width="790" height="85" fill="#eef6e9"/><rect x="1630" y="250" width="550" height="85" fill="#f4eefb"/><text x="535" y="305" text-anchor="middle" font-size="38" font-weight="700" fill="#20568d">Acquisition</text><text x="1235" y="305" text-anchor="middle" font-size="38" font-weight="700" fill="#416c35">Extinction</text><text x="1905" y="305" text-anchor="middle" font-size="38" font-weight="700" fill="#633f8d">Return</text>
<path d="M240 810 C350 805 400 650 500 500 S690 400 830 390 C980 390 1080 420 1180 560 S1400 785 1615 800" fill="none" stroke="#20568d" stroke-width="18"/><path d="M1650 800 C1700 670 1810 600 1900 650 S2050 720 2160 700" fill="none" stroke="#633f8d" stroke-width="18" stroke-dasharray="28 18"/>
<line x1="840" y1="335" x2="840" y2="850" stroke="#70808f" stroke-width="4" stroke-dasharray="18 14"/><line x1="1630" y1="335" x2="1630" y2="850" stroke="#70808f" stroke-width="4" stroke-dasharray="18 14"/>
<text x="530" y="600" text-anchor="middle" font-size="33" font-weight="700" fill="#20568d">CS predicts UCS</text><text x="530" y="646" text-anchor="middle" font-size="29">responding develops</text><text x="1235" y="600" text-anchor="middle" font-size="33" font-weight="700" fill="#416c35">CS without UCS</text><text x="1235" y="646" text-anchor="middle" font-size="29">responding declines</text><text x="1910" y="515" text-anchor="middle" font-size="33" font-weight="700" fill="#633f8d">After time or context change</text><text x="1910" y="561" text-anchor="middle" font-size="29">responding may reappear</text>
<rect x="175" y="1030" width="2050" height="205" rx="28" fill="#fff7df" stroke="#c59129" stroke-width="5"/><text x="1200" y="1110" text-anchor="middle" font-size="39" font-weight="700" fill="#4a3a17">Extinction adds context-sensitive learning.</text><text x="1200" y="1170" text-anchor="middle" font-size="35" fill="#4a3a17">Reduced responding does not prove erasure.</text></g></svg>
