<svg xmlns="http://www.w3.org/2000/svg" width="2400" height="1350" viewBox="0 0 2400 1350"><title>Delayed reward and the learning performance distinction</title><desc>An explicitly schematic graph shows rewarded-from-day-one performance improving, never-rewarded performance staying relatively high, and delayed-reward performance resembling no reward until food begins after day ten and then improving rapidly.</desc><rect width="2400" height="1350" fill="#fbfcfe"/><g font-family="Arial,sans-serif"><text x="1200" y="100" text-anchor="middle" font-size="70" font-weight="700" fill="#10253d">Delayed reward reveals a learning–performance gap</text><text x="1200" y="160" text-anchor="middle" font-size="31" fill="#4b5964">Explicitly schematic trajectories—not plotted experimental values</text>
<rect x="150" y="220" width="2100" height="820" rx="28" fill="#fff" stroke="#bdc9d4" stroke-width="5"/><line x1="310" y1="900" x2="2110" y2="900" stroke="#18344f" stroke-width="7"/><line x1="310" y1="900" x2="310" y2="330" stroke="#18344f" stroke-width="7"/><text x="1210" y="980" text-anchor="middle" font-size="34" font-weight="700">Days running the maze</text><text transform="translate(215 615) rotate(-90)" text-anchor="middle" font-size="34" font-weight="700">Fewer maze errors →</text><text x="330" y="315" font-size="28" fill="#4b5964">more errors</text><text x="330" y="875" font-size="28" fill="#4b5964">fewer errors</text>
<line x1="1280" y1="300" x2="1280" y2="900" stroke="#172b3d" stroke-width="5" stroke-dasharray="22 16"/><text x="1280" y="275" text-anchor="middle" font-size="30" font-weight="700">Reward begins between Days 10 and 11</text>
<path d="M350 410 C560 500 720 585 900 660 S1120 745 1250 775 S1550 820 2050 835" fill="none" stroke="#d06a24" stroke-width="18"/><path d="M350 400 C650 420 950 430 1240 445 S1600 465 2050 475" fill="none" stroke="#2e7045" stroke-width="18" stroke-dasharray="30 18"/><path d="M350 405 C650 425 950 435 1240 450 C1340 480 1370 660 1510 760 S1780 825 2050 835" fill="none" stroke="#20568d" stroke-width="18"/>
<rect x="1590" y="285" width="450" height="85" rx="18" fill="#fff4eb"/><line x1="1620" y1="327" x2="1690" y2="327" stroke="#d06a24" stroke-width="15"/><text x="1710" y="338" font-size="30" font-weight="700">Rewarded from Day 1</text><rect x="1590" y="400" width="450" height="85" rx="18" fill="#eef6e9"/><line x1="1620" y1="442" x2="1690" y2="442" stroke="#2e7045" stroke-width="15" stroke-dasharray="22 12"/><text x="1710" y="453" font-size="30" font-weight="700">Never rewarded</text><rect x="1590" y="745" width="500" height="100" rx="18" fill="#e9f2fb"/><line x1="1620" y1="795" x2="1690" y2="795" stroke="#20568d" stroke-width="15"/><text x="1710" y="787" font-size="30" font-weight="700">Reward beginning</text><text x="1710" y="823" font-size="30" font-weight="700">after Day 10</text>
<text x="780" y="520" text-anchor="middle" font-size="30" font-weight="700" fill="#20568d">Before reward: similar performance</text><text x="1480" y="690" text-anchor="middle" font-size="30" font-weight="700" fill="#20568d">After reward: rapid improvement</text>
<rect x="170" y="1080" width="2060" height="180" rx="28" fill="#fff7df" stroke="#c59129" stroke-width="5"/><text x="1200" y="1150" text-anchor="middle" font-size="38" font-weight="700" fill="#4a3a17">The pattern suggests learning before performance revealed it.</text><text x="1200" y="1210" text-anchor="middle" font-size="31" fill="#4a3a17">It does not uniquely establish the format of what was learned.</text></g></svg>
