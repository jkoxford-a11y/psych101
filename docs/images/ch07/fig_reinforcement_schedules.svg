<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1120" viewBox="0 0 1600 1120" role="img" aria-labelledby="title desc">
  <title id="title">Reinforcement schedules: established response patterns and extinction persistence</title>
  <desc id="desc">Four color-coded columns show fixed-ratio, variable-ratio, fixed-interval, and variable-interval reinforcement rules with characteristic cumulative-response traces. A smaller graph compares normalized response rates during extinction after continuous and intermittent reinforcement histories. A bottom band distinguishes response pattern, extinction persistence, and acquisition speed, which is not depicted.</desc>
  <defs>
    <style>
      text{font-family:Arial,"Segoe UI",sans-serif;fill:#13233b} .title{font-size:48px;font-weight:800} .subtitle{font-size:22px;fill:#445066}
      .section{font-size:24px;font-weight:800;fill:#fff;letter-spacing:.3px} .label{font-size:24px;font-weight:800} .body{font-size:17px} .small{font-size:15px} .tiny{font-size:13px}
      .axis{stroke:#273448;stroke-width:2;fill:none} .grid{stroke:#d9dee7;stroke-width:1;stroke-dasharray:4 5} .trace{fill:none;stroke-width:4;stroke-linecap:round;stroke-linejoin:round}
      .card{stroke-width:1.5} .rule{font-size:17px;font-weight:700;font-style:italic} .take{font-size:17px;font-weight:700}
    </style>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#17304f" flood-opacity=".13"/></filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 Z" fill="#273448"/></marker>
  </defs>
  <rect width="1600" height="1120" fill="#fbfcfe"/>
  <text x="800" y="62" text-anchor="middle" class="title">Reinforcement Schedules Shape Established Responding</text>
  <text x="800" y="96" text-anchor="middle" class="subtitle">Characteristic teaching patterns—not universal rate rankings</text>

  <rect x="34" y="122" width="1532" height="48" rx="12" fill="#163d70"/>
  <text x="800" y="154" text-anchor="middle" class="section">A. WHILE REINFORCEMENT IS AVAILABLE</text>
  <text x="800" y="194" text-anchor="middle" class="body">Cumulative responses rise over time after each schedule is established.</text>

  <!-- Fixed ratio -->
  <g transform="translate(34 216)">
    <rect width="370" height="540" rx="18" fill="#f5faef" stroke="#6f9b50" class="card" filter="url(#shadow)"/>
    <rect width="370" height="62" rx="18" fill="#e7f1dd"/><rect y="44" width="370" height="18" fill="#e7f1dd"/>
    <circle cx="30" cy="31" r="17" fill="#4f7f31"/><text x="30" y="37" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">1</text>
    <text x="58" y="39" class="label" fill="#3f6f25">FIXED RATIO (FR)</text>
    <text x="185" y="91" text-anchor="middle" class="rule" fill="#3f6f25">After a set number of responses</text>
    <g transform="translate(45 116)">
      <text x="0" y="12" class="small">responses</text><line x1="80" y1="8" x2="280" y2="8" stroke="#4f7f31" stroke-width="2"/>
      <g fill="#6f9b50"><circle cx="92" cy="8" r="7"/><circle cx="122" cy="8" r="7"/><circle cx="152" cy="8" r="7"/><circle cx="182" cy="8" r="7"/><circle cx="212" cy="8" r="7"/></g>
      <circle cx="270" cy="8" r="15" fill="#4f7f31"/><text x="270" y="14" text-anchor="middle" font-size="18" fill="#fff">★</text>
      <path d="M92 29v8h120v-8" fill="none" stroke="#53606f"/><text x="152" y="57" text-anchor="middle" class="tiny">set response count</text>
    </g>
    <g transform="translate(42 194)">
      <line x1="18" y1="230" x2="300" y2="230" class="axis" marker-end="url(#arrow)"/><line x1="18" y1="230" x2="18" y2="12" class="axis" marker-end="url(#arrow)"/>
      <text x="160" y="256" text-anchor="middle" class="small">time</text><text transform="translate(-8 125) rotate(-90)" text-anchor="middle" class="small">cumulative responses</text>
      <path d="M18 220 L68 220 L112 155 L112 144 L158 144 L202 78 L202 67 L248 67 L292 20" class="trace" stroke="#4f7f31"/>
      <g stroke="#4f7f31" stroke-dasharray="3 4"><line x1="112" y1="144" x2="112" y2="230"/><line x1="202" y1="67" x2="202" y2="230"/></g>
      <g fill="#4f7f31"><circle cx="112" cy="230" r="9"/><circle cx="202" cy="230" r="9"/><circle cx="292" cy="230" r="9"/></g>
    </g>
    <rect x="18" y="468" width="334" height="54" rx="12" fill="#e7f1dd"/>
    <text x="185" y="492" text-anchor="middle" class="take" fill="#3f6f25">Pause, then rapid run</text><text x="185" y="513" text-anchor="middle" class="small">a “break-and-run” pattern</text>
  </g>

  <!-- Variable ratio -->
  <g transform="translate(421 216)">
    <rect width="370" height="540" rx="18" fill="#f2f7fd" stroke="#4c7eba" class="card" filter="url(#shadow)"/>
    <rect width="370" height="62" rx="18" fill="#e2edf9"/><rect y="44" width="370" height="18" fill="#e2edf9"/>
    <circle cx="30" cy="31" r="17" fill="#245a9f"/><text x="30" y="37" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">2</text>
    <text x="58" y="39" class="label" fill="#174c91">VARIABLE RATIO (VR)</text>
    <text x="185" y="91" text-anchor="middle" class="rule" fill="#174c91">After an unpredictable number of responses</text>
    <g transform="translate(45 116)">
      <text x="0" y="12" class="small">responses</text><line x1="80" y1="8" x2="280" y2="8" stroke="#245a9f" stroke-width="2"/>
      <g fill="#4c7eba"><circle cx="92" cy="8" r="7"/><circle cx="116" cy="8" r="7"/><circle cx="140" cy="8" r="7"/><circle cx="164" cy="8" r="7"/><circle cx="188" cy="8" r="7"/><circle cx="212" cy="8" r="7"/><circle cx="236" cy="8" r="7"/></g>
      <g fill="#245a9f"><circle cx="116" cy="46" r="13"/><circle cx="188" cy="46" r="13"/><circle cx="270" cy="46" r="13"/></g>
      <g font-size="15" fill="#fff" text-anchor="middle"><text x="116" y="52">★</text><text x="188" y="52">★</text><text x="270" y="52">★</text></g>
      <g stroke="#245a9f" marker-end="url(#arrow)"><line x1="116" y1="33" x2="116" y2="17"/><line x1="188" y1="33" x2="188" y2="17"/><line x1="270" y1="33" x2="270" y2="17"/></g>
    </g>
    <g transform="translate(42 194)">
      <line x1="18" y1="230" x2="300" y2="230" class="axis" marker-end="url(#arrow)"/><line x1="18" y1="230" x2="18" y2="12" class="axis" marker-end="url(#arrow)"/>
      <text x="160" y="256" text-anchor="middle" class="small">time</text><text transform="translate(-8 125) rotate(-90)" text-anchor="middle" class="small">cumulative responses</text>
      <path d="M18 220 L42 204 L61 190 L82 176 L101 158 L124 144 L145 127 L166 113 L187 96 L209 82 L230 63 L253 48 L274 29 L294 17" class="trace" stroke="#245a9f"/>
      <g stroke="#4c7eba" stroke-dasharray="3 4"><line x1="82" y1="176" x2="82" y2="230"/><line x1="166" y1="113" x2="166" y2="230"/><line x1="253" y1="48" x2="253" y2="230"/></g>
      <g fill="#245a9f"><circle cx="82" cy="230" r="9"/><circle cx="166" cy="230" r="9"/><circle cx="253" cy="230" r="9"/></g>
    </g>
    <rect x="18" y="468" width="334" height="54" rx="12" fill="#e2edf9"/>
    <text x="185" y="492" text-anchor="middle" class="take" fill="#174c91">High, relatively steady responding</text><text x="185" y="513" text-anchor="middle" class="small">with little or no pause</text>
  </g>

  <!-- Fixed interval -->
  <g transform="translate(808 216)">
    <rect width="370" height="540" rx="18" fill="#f8f3fb" stroke="#8c60a9" class="card" filter="url(#shadow)"/>
    <rect width="370" height="62" rx="18" fill="#eee3f4"/><rect y="44" width="370" height="18" fill="#eee3f4"/>
    <circle cx="30" cy="31" r="17" fill="#653287"/><text x="30" y="37" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">3</text>
    <text x="58" y="39" class="label" fill="#5a287d">FIXED INTERVAL (FI)</text>
    <text x="185" y="87" text-anchor="middle" class="rule" fill="#5a287d">First response after a set interval</text>
    <g transform="translate(45 120)">
      <text x="0" y="12" class="small">time</text><line x1="55" y1="8" x2="285" y2="8" stroke="#653287" stroke-width="2"/>
      <g stroke="#653287" stroke-width="2"><line x1="55" y1="-2" x2="55" y2="18"/><line x1="132" y1="-2" x2="132" y2="18"/><line x1="209" y1="-2" x2="209" y2="18"/><line x1="285" y1="-2" x2="285" y2="18"/></g>
      <g class="tiny" text-anchor="middle"><text x="93" y="37">same</text><text x="170" y="37">same</text><text x="247" y="37">same</text></g>
      <g fill="#653287"><circle cx="132" cy="56" r="13"/><circle cx="209" cy="56" r="13"/><circle cx="285" cy="56" r="13"/></g><g font-size="15" fill="#fff" text-anchor="middle"><text x="132" y="62">★</text><text x="209" y="62">★</text><text x="285" y="62">★</text></g>
    </g>
    <g transform="translate(42 194)">
      <line x1="18" y1="230" x2="300" y2="230" class="axis" marker-end="url(#arrow)"/><line x1="18" y1="230" x2="18" y2="12" class="axis" marker-end="url(#arrow)"/>
      <text x="160" y="256" text-anchor="middle" class="small">time</text><text transform="translate(-8 125) rotate(-90)" text-anchor="middle" class="small">cumulative responses</text>
      <path d="M18 218 C52 218 78 201 110 155 C145 155 171 138 203 92 C238 92 264 75 296 29" class="trace" stroke="#653287"/>
      <g stroke="#653287" stroke-dasharray="3 4"><line x1="110" y1="155" x2="110" y2="230"/><line x1="203" y1="92" x2="203" y2="230"/><line x1="296" y1="29" x2="296" y2="230"/></g>
      <g fill="#653287"><circle cx="110" cy="230" r="9"/><circle cx="203" cy="230" r="9"/><circle cx="296" cy="230" r="9"/></g>
    </g>
    <rect x="18" y="468" width="334" height="54" rx="12" fill="#eee3f4"/>
    <text x="185" y="492" text-anchor="middle" class="take" fill="#5a287d">Pause, then acceleration</text><text x="185" y="513" text-anchor="middle" class="small">the characteristic “scallop”</text>
  </g>

  <!-- Variable interval -->
  <g transform="translate(1195 216)">
    <rect width="370" height="540" rx="18" fill="#fff7ef" stroke="#d77835" class="card" filter="url(#shadow)"/>
    <rect width="370" height="62" rx="18" fill="#fae9d9"/><rect y="44" width="370" height="18" fill="#fae9d9"/>
    <circle cx="30" cy="31" r="17" fill="#c45a17"/><text x="30" y="37" text-anchor="middle" font-size="17" font-weight="800" fill="#fff">4</text>
    <text x="58" y="39" font-size="21" font-weight="800" fill="#b94e0e">VARIABLE INTERVAL (VI)</text>
    <text x="185" y="87" text-anchor="middle" class="rule" fill="#b94e0e">First response after changing intervals</text>
    <g transform="translate(45 120)">
      <text x="0" y="12" class="small">time</text><line x1="55" y1="8" x2="285" y2="8" stroke="#c45a17" stroke-width="2"/>
      <g stroke="#c45a17" stroke-width="2"><line x1="55" y1="-2" x2="55" y2="18"/><line x1="94" y1="-2" x2="94" y2="18"/><line x1="178" y1="-2" x2="178" y2="18"/><line x1="232" y1="-2" x2="232" y2="18"/><line x1="285" y1="-2" x2="285" y2="18"/></g>
      <g class="tiny" text-anchor="middle"><text x="74" y="37">short</text><text x="136" y="37">long</text><text x="205" y="37">medium</text></g>
      <g fill="#c45a17"><circle cx="94" cy="56" r="13"/><circle cx="178" cy="56" r="13"/><circle cx="232" cy="56" r="13"/><circle cx="285" cy="56" r="13"/></g><g font-size="15" fill="#fff" text-anchor="middle"><text x="94" y="62">★</text><text x="178" y="62">★</text><text x="232" y="62">★</text><text x="285" y="62">★</text></g>
    </g>
    <g transform="translate(42 194)">
      <line x1="18" y1="230" x2="300" y2="230" class="axis" marker-end="url(#arrow)"/><line x1="18" y1="230" x2="18" y2="12" class="axis" marker-end="url(#arrow)"/>
      <text x="160" y="256" text-anchor="middle" class="small">time</text><text transform="translate(-8 125) rotate(-90)" text-anchor="middle" class="small">cumulative responses</text>
      <path d="M18 220 L43 204 L67 190 L92 173 L116 157 L141 143 L166 126 L190 111 L215 94 L240 79 L264 63 L294 45" class="trace" stroke="#c45a17"/>
      <g stroke="#d77835" stroke-dasharray="3 4"><line x1="67" y1="190" x2="67" y2="230"/><line x1="166" y1="126" x2="166" y2="230"/><line x1="215" y1="94" x2="215" y2="230"/><line x1="294" y1="45" x2="294" y2="230"/></g>
      <g fill="#c45a17"><circle cx="67" cy="230" r="9"/><circle cx="166" cy="230" r="9"/><circle cx="215" cy="230" r="9"/><circle cx="294" cy="230" r="9"/></g>
    </g>
    <rect x="18" y="468" width="334" height="54" rx="12" fill="#fae9d9"/>
    <text x="185" y="492" text-anchor="middle" class="take" fill="#b94e0e">Steady, moderate responding</text><text x="185" y="513" text-anchor="middle" class="small">with no regular long pauses</text>
  </g>

  <!-- Extinction comparison -->
  <rect x="34" y="780" width="1532" height="220" rx="18" fill="#f4f0f8" stroke="#80549b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="34" y="780" width="1532" height="46" rx="18" fill="#6c328b"/><rect x="34" y="808" width="1532" height="18" fill="#6c328b"/>
  <text x="800" y="811" text-anchor="middle" class="section">B. AFTER REINFORCEMENT STOPS: AN ILLUSTRATIVE EXTINCTION COMPARISON</text>
  <g transform="translate(85 842)">
    <line x1="80" y1="122" x2="680" y2="122" class="axis" marker-end="url(#arrow)"/><line x1="80" y1="122" x2="80" y2="2" class="axis" marker-end="url(#arrow)"/>
    <g class="tiny" text-anchor="end"><text x="70" y="10">100%</text><text x="70" y="68">50%</text><text x="70" y="126">0%</text></g>
    <line x1="80" y1="8" x2="680" y2="8" class="grid"/><line x1="80" y1="64" x2="680" y2="64" class="grid"/>
    <text x="380" y="151" text-anchor="middle" class="small">extinction sessions</text><text transform="translate(25 66) rotate(-90)" text-anchor="middle" class="small">response rate (% of baseline)</text>
    <polyline points="95,8 185,33 275,58 365,78 455,94 545,106 635,113" class="trace" stroke="#245a9f"/>
    <polyline points="95,8 185,50 275,82 365,101 455,111 545,117 635,120" class="trace" stroke="#d77835" stroke-dasharray="9 7"/>
    <g fill="#245a9f"><circle cx="95" cy="8" r="5"/><circle cx="185" cy="33" r="5"/><circle cx="275" cy="58" r="5"/><circle cx="365" cy="78" r="5"/><circle cx="455" cy="94" r="5"/><circle cx="545" cy="106" r="5"/><circle cx="635" cy="113" r="5"/></g>
    <g fill="#d77835"><rect x="90" y="3" width="10" height="10"/><rect x="180" y="45" width="10" height="10"/><rect x="270" y="77" width="10" height="10"/><rect x="360" y="96" width="10" height="10"/><rect x="450" y="106" width="10" height="10"/><rect x="540" y="112" width="10" height="10"/><rect x="630" y="115" width="10" height="10"/></g>
  </g>
  <g transform="translate(840 850)">
    <line x1="0" y1="8" x2="52" y2="8" stroke="#245a9f" stroke-width="4"/><circle cx="26" cy="8" r="5" fill="#245a9f"/><text x="68" y="14" class="body" font-weight="700">Intermittent reinforcement history</text>
    <line x1="0" y1="46" x2="52" y2="46" stroke="#d77835" stroke-width="4" stroke-dasharray="9 7"/><rect x="21" y="41" width="10" height="10" fill="#d77835"/><text x="68" y="52" class="body" font-weight="700">Continuous reinforcement history</text>
    <text x="0" y="88" class="body">Both begin at 100% of their own pre-extinction baseline.</text>
    <text x="0" y="115" class="body">The intermittent-history series declines more gradually.</text>
    <text x="0" y="145" class="small" font-style="italic">Illustrative partial-reinforcement extinction effect—not data from one experiment.</text>
  </g>

  <!-- Bottom distinction band -->
  <rect x="34" y="1020" width="1532" height="78" rx="16" fill="#fff8df" stroke="#d8a91f" stroke-width="1.5"/>
  <text x="64" y="1053" font-size="22" font-weight="800" fill="#765700">DO NOT CONFUSE</text>
  <text x="320" y="1047" class="body"><tspan font-weight="800" fill="#3f6f25">Response pattern:</tspan><tspan> what established responding looks like.</tspan></text>
  <text x="320" y="1075" class="body"><tspan font-weight="800" fill="#6c328b">Extinction persistence:</tspan><tspan> what happens after reinforcement stops.</tspan></text>
  <line x1="880" y1="1034" x2="880" y2="1084" stroke="#d8a91f"/>
  <text x="910" y="1047" class="body"><tspan font-weight="800" fill="#b94e0e">Acquisition speed:</tspan><tspan> how quickly behavior is first established.</tspan></text>
  <text x="910" y="1077" font-size="19" font-weight="800" fill="#a43c18">Not depicted in this figure.</text>
  <text x="800" y="1112" text-anchor="middle" class="tiny" fill="#53606f">Exact response rates depend on schedule values, reinforcement density, task, organism, and history.</text>
</svg>
