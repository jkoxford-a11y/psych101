<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img">
  <rect width="1920" height="1080" fill="white"/>
  <text x="960" y="86" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" fill="#1F2937" text-anchor="middle">Anatomy of a True Experiment</text>
  <text x="960" y="142" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#64748B" text-anchor="middle">Manipulate an independent variable, measure a dependent variable, and use random assignment.</text>
  <rect x="120" y="445" width="315" height="150" rx="30" fill="#DBEAFE" stroke="#2563EB" stroke-width="5"/><text x="277" y="502" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">Sample of</text>
<text x="277" y="542" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">participants</text><rect x="560" y="445" width="350" height="150" rx="30" fill="#D1FAE5" stroke="#059669" stroke-width="5"/><text x="735" y="502" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#065F46" text-anchor="middle" dominant-baseline="middle">Random</text>
<text x="735" y="542" font-family="Arial, Helvetica, sans-serif" font-size="34" font-weight="700" fill="#065F46" text-anchor="middle" dominant-baseline="middle">assignment</text><line x1="435" y1="520" x2="538.0" y2="520.0" stroke="#334155" stroke-width="7" stroke-linecap="round"/><polygon points="560.0,520.0 529.4,535.3 529.4,504.7" fill="#334155"/><rect x="1040" y="275" width="430" height="140" rx="30" fill="#FFEDD5" stroke="#EA580C" stroke-width="5"/><text x="1255" y="323" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">Experimental group</text>
<text x="1255" y="363" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">IV: mortality reminder</text><rect x="1040" y="625" width="430" height="140" rx="30" fill="#FEE2E2" stroke="#DC2626" stroke-width="5"/><text x="1255" y="673" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">Control group</text>
<text x="1255" y="713" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">neutral prompt</text><line x1="910" y1="520" x2="1026.9" y2="362.7" stroke="#059669" stroke-width="7" stroke-linecap="round"/><polygon points="1040.0,345.0 1034.0,378.7 1009.5,360.4" fill="#059669"/><line x1="910" y1="520" x2="1026.9" y2="677.3" stroke="#059669" stroke-width="7" stroke-linecap="round"/><polygon points="1040.0,695.0 1009.5,679.6 1034.0,661.3" fill="#059669"/><rect x="1550" y="445" width="320" height="150" rx="30" fill="#F8FAFC" stroke="#64748B" stroke-width="5"/><text x="1710" y="493" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">DV:</text>
<text x="1710" y="527" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">hot sauce</text>
<text x="1710" y="561" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">allocated</text><line x1="1470" y1="345" x2="1540.6" y2="473.0" stroke="#334155" stroke-width="6" stroke-linecap="round"/><polygon points="1550.0,490.0 1525.1,472.9 1548.8,459.8" fill="#334155"/><line x1="1470" y1="695" x2="1540.6" y2="567.0" stroke="#334155" stroke-width="6" stroke-linecap="round"/><polygon points="1550.0,550.0 1548.8,580.2 1525.1,567.1" fill="#334155"/><text x="735" y="400" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" fill="#059669" text-anchor="middle" dominant-baseline="middle">chance, not choice</text><rect x="280" y="835" width="1360" height="100" rx="26" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="3"/><text x="960" y="884" font-family="Arial, Helvetica, sans-serif" font-size="29" font-weight="400" fill="#334155" text-anchor="middle" dominant-baseline="middle">Because groups were formed by chance, outcome differences can be attributed to the manipulation more confidently.</text>
</svg>
