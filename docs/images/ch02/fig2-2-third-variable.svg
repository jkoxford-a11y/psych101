<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4a6fa5"/>
    </marker>
  </defs>

  <text x="400" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1a1a2e">Figure 2.2 — The Third-Variable Problem</text>
  <text x="400" y="62" text-anchor="middle" font-size="15" fill="#6b7280">Why "shoe size correlates with reading ability" isn't a causal claim</text>

  <!-- Z box: Age -->
  <rect x="320" y="90" width="160" height="74" rx="10" fill="#e8eef7" stroke="#4a6fa5" stroke-width="2"/>
  <text x="400" y="122" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Age</text>
  <text x="400" y="144" text-anchor="middle" font-size="13" fill="#6b7280">the third variable (Z)</text>

  <!-- X box: Shoe size -->
  <rect x="70" y="320" width="190" height="80" rx="10" fill="#ffffff" stroke="#4a6fa5" stroke-width="2"/>
  <text x="165" y="354" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Shoe size</text>
  <text x="165" y="377" text-anchor="middle" font-size="13" fill="#6b7280">Variable X</text>

  <!-- Y box: Reading ability -->
  <rect x="540" y="320" width="190" height="80" rx="10" fill="#ffffff" stroke="#4a6fa5" stroke-width="2"/>
  <text x="635" y="354" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Reading ability</text>
  <text x="635" y="377" text-anchor="middle" font-size="13" fill="#6b7280">Variable Y</text>

  <!-- Solid causal arrows from Z to X and Z to Y -->
  <line x1="355" y1="164" x2="210" y2="318" stroke="#4a6fa5" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="445" y1="164" x2="600" y2="318" stroke="#4a6fa5" stroke-width="2.5" marker-end="url(#arrow)"/>

  <text x="245" y="240" font-size="13" fill="#1a1a2e" transform="rotate(-32 245 240)">causes</text>
  <text x="545" y="240" font-size="13" fill="#1a1a2e" transform="rotate(32 545 240)">causes</text>

  <!-- Dashed non-causal line between X and Y -->
  <line x1="260" y1="360" x2="540" y2="360" stroke="#6b7280" stroke-width="2" stroke-dasharray="8 6"/>
  <circle cx="400" cy="360" r="16" fill="#ffffff" stroke="#6b7280" stroke-width="2"/>
  <text x="400" y="366" text-anchor="middle" font-size="16" font-weight="bold" fill="#6b7280">?</text>
  <text x="400" y="412" text-anchor="middle" font-size="13" fill="#6b7280">correlated, but no direct causal link</text>

  <text x="400" y="455" text-anchor="middle" font-size="13" fill="#6b7280" font-style="italic">Older children have bigger feet AND read better — shoe size isn't doing the causal work.</text>
</svg>
