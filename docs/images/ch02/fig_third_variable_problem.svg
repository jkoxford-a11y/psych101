<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img">
  <rect width="1920" height="1080" fill="white"/>
  <text x="960" y="86" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="700" fill="#1F2937" text-anchor="middle">The Third-Variable Problem</text>
  <text x="960" y="142" font-family="Arial, Helvetica, sans-serif" font-size="30" fill="#64748B" text-anchor="middle">Correlation alone cannot determine which causal story is correct.</text>
  <rect x="710" y="250" width="500" height="150" rx="34" fill="#DBEAFE" stroke="#2563EB" stroke-width="5"/><text x="960" y="312" font-family="Arial, Helvetica, sans-serif" font-size="42" font-weight="700" fill="#1E3A8A" text-anchor="middle" dominant-baseline="middle">Age</text><text x="960" y="358" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="400" fill="#2563EB" text-anchor="middle" dominant-baseline="middle">third variable</text><rect x="245" y="610" width="500" height="155" rx="34" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="5"/><text x="495" y="668" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">Shoe size</text><text x="495" y="720" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="400" fill="#64748B" text-anchor="middle" dominant-baseline="middle">measured variable</text><rect x="1175" y="610" width="500" height="155" rx="34" fill="#F8FAFC" stroke="#CBD5E1" stroke-width="5"/><text x="1425" y="668" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="700" fill="#1F2937" text-anchor="middle" dominant-baseline="middle">Reading ability</text><text x="1425" y="720" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="400" fill="#64748B" text-anchor="middle" dominant-baseline="middle">measured variable</text><line x1="820" y1="400" x2="584.0" y2="594.3" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/><polygon points="565.0,610.0 580.5,575.1 602.3,601.5" fill="#2563EB"/><line x1="1100" y1="400" x2="1336.0" y2="594.3" stroke="#2563EB" stroke-width="8" stroke-linecap="round"/><polygon points="1355.0,610.0 1317.7,601.5 1339.5,575.1" fill="#2563EB"/><line x1="745" y1="688" x2="1175" y2="688" stroke="#DC2626" stroke-width="6" stroke-dasharray="16 14"/><text x="960" y="652" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="700" fill="#DC2626" text-anchor="middle" dominant-baseline="middle">correlated</text><text x="960" y="725" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="400" fill="#DC2626" text-anchor="middle" dominant-baseline="middle">not necessarily causal</text><rect x="455" y="855" width="1010" height="95" rx="24" fill="#F1F5F9" stroke="#E2E8F0" stroke-width="3"/><text x="960" y="903" font-family="Arial, Helvetica, sans-serif" font-size="30" font-weight="400" fill="#334155" text-anchor="middle" dominant-baseline="middle">A correlation between two variables can be produced by a third variable that affects both.</text>
</svg>
