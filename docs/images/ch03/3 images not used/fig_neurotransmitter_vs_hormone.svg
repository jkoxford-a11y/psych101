   <g id="text_1">
    <text style="font-weight: 700; font-size: 20px; font-family: 'DejaVu Sans'; text-anchor: start" x="24.914593" y="34.870625" transform="rotate(-0 24.914593 34.870625)">Neurotransmitter vs. hormone</text>
   </g>
   <g id="text_2">
    <text style="font-weight: 700; font-size: 18px; font-family: 'DejaVu Sans'" transform="translate(102.185663 70.448531)">Neurotransmitter:</text>
    <text style="font-weight: 700; font-size: 18px; font-family: 'DejaVu Sans'" transform="translate(76.922381 90.604594)">local synaptic message</text>
   </g>
   <g id="text_3">
    <text style="font-weight: 700; font-size: 18px; font-family: 'DejaVu Sans'" transform="translate(516.801206 70.448531)">Hormone:</text>
