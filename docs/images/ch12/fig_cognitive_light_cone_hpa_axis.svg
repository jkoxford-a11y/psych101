<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950" role="img" aria-labelledby="title desc">
  <title id="title">Cognitive light cone with fast SAM and slower HPA stress routes</title><desc id="desc">Five kinds of threat converge on present appraisal, then branch into a rapid SAM route and slower HPA route. Both contribute to interacting cardiovascular, metabolic, immune, and behavioral effects.</desc>
  <defs><marker id="ar" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#334155"/></marker></defs>
  <rect width="1600" height="950" fill="#fbfcfe"/>
  <text x="800" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="45" font-weight="700" fill="#17365d">THE COGNITIVE LIGHT CONE</text><text x="800" y="102" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#475569">Course metaphor: absent and present threats can matter to the body now</text>
  <g font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#17365d">
    <rect x="65" y="155" width="330" height="82" rx="18" fill="#eef4fb" stroke="#5b7ca3" stroke-width="3"/><text x="230" y="205" text-anchor="middle">REMEMBERED</text>
    <rect x="65" y="260" width="330" height="82" rx="18" fill="#eef4fb" stroke="#5b7ca3" stroke-width="3"/><text x="230" y="310" text-anchor="middle">ANTICIPATED</text>
    <rect x="65" y="365" width="330" height="82" rx="18" fill="#eef4fb" stroke="#5b7ca3" stroke-width="3"/><text x="230" y="415" text-anchor="middle">SYMBOLIC</text>
    <rect x="65" y="470" width="330" height="82" rx="18" fill="#eef4fb" stroke="#5b7ca3" stroke-width="3"/><text x="230" y="520" text-anchor="middle">SOCIAL-EVALUATIVE</text>
    <rect x="65" y="575" width="330" height="82" rx="18" fill="#eef4fb" stroke="#5b7ca3" stroke-width="3"/><text x="230" y="625" text-anchor="middle">IMMEDIATE</text>
  </g>
  <path d="M410 195 C520 195 520 365 635 390" fill="none" stroke="#334155" stroke-width="5" marker-end="url(#ar)"/><path d="M410 300 C520 300 530 375 635 400" fill="none" stroke="#334155" stroke-width="5" marker-end="url(#ar)"/><path d="M410 405 H635" stroke="#334155" stroke-width="5" marker-end="url(#ar)"/><path d="M410 510 C520 510 530 435 635 415" fill="none" stroke="#334155" stroke-width="5" marker-end="url(#ar)"/><path d="M410 615 C520 615 520 450 635 425" fill="none" stroke="#334155" stroke-width="5" marker-end="url(#ar)"/>
  <rect x="650" y="315" width="300" height="190" rx="30" fill="#fff7dc" stroke="#a87600" stroke-width="5"/><text x="800" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17365d">PRESENT</text><text x="800" y="418" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17365d">APPRAISAL</text><text x="800" y="460" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#475569">demand · control · resources</text>
  <path d="M950 375 H1040" stroke="#334155" stroke-width="6" marker-end="url(#ar)"/><path d="M950 445 H1040" stroke="#334155" stroke-width="6" marker-end="url(#ar)"/>
  <rect x="1060" y="165" width="470" height="250" rx="26" fill="#fff0ec" stroke="#a9472b" stroke-width="5"/><text x="1295" y="220" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#8c351f">FAST SAM ROUTE</text><text x="1295" y="270" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="#17365d">Sympathetic nerves</text><text x="1295" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="#17365d">Epinephrine + norepinephrine</text><text x="1295" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#8c351f">Immediate cardiovascular mobilization</text>
  <rect x="1060" y="455" width="470" height="275" rx="26" fill="#eef4fb" stroke="#315b8a" stroke-width="5"/><text x="1295" y="510" text-anchor="middle" font-family="Arial, sans-serif" font-size="34" font-weight="700" fill="#17365d">SLOWER HPA ROUTE</text><text x="1295" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#17365d">Hypothalamus → pituitary</text><text x="1295" y="600" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#17365d">→ adrenal cortex → cortisol</text><text x="1295" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#315b8a">Energy coordination</text><text x="1295" y="682" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#315b8a">+ wider tissue effects</text>
  <path d="M1295 415 V445" stroke="#64748b" stroke-width="4" stroke-dasharray="10 8" marker-end="url(#ar)"/>
  <path d="M1295 730 V785" stroke="#334155" stroke-width="6" marker-end="url(#ar)"/>
  <rect x="385" y="790" width="1150" height="120" rx="24" fill="#edf7ef" stroke="#2f6f49" stroke-width="4"/><text x="960" y="835" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#215b3b">INTERACTING CONSEQUENCES</text><text x="960" y="878" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" fill="#17365d">cardiovascular · metabolic · immune · behavioral · recovery</text>
  <text x="210" y="845" text-anchor="middle" font-family="Arial, sans-serif" font-size="23" font-weight="700" fill="#17365d">Overlapping systems</text><text x="210" y="878" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" fill="#475569">not identical pathways</text>
</svg>
