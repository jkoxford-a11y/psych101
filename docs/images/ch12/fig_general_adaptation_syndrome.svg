<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="950" viewBox="0 0 1600 950" role="img" aria-labelledby="title desc">
  <title id="title">Historical GAS labels contrasted with allostatic load</title><desc id="desc">Alarm, resistance, and exhaustion are shown as historical labels without a capacity curve. A recovery path is contrasted with repeated demands and inadequate recovery leading to multisystem allostatic load.</desc>
  <defs><marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0 L12 6 L0 12 Z" fill="#334155"/></marker></defs>
  <rect width="1600" height="950" fill="#fbfcfe"/>
  <text x="800" y="62" text-anchor="middle" font-family="Arial, sans-serif" font-size="44" font-weight="700" fill="#17365d">FROM HISTORICAL GAS TO ALLOSTATIC LOAD</text>
  <rect x="90" y="110" width="1420" height="230" rx="26" fill="#f5f2fb" stroke="#6751a3" stroke-width="4"/>
  <text x="800" y="155" text-anchor="middle" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#4f3c86">SELYE'S GENERAL ADAPTATION SYNDROME — HISTORICAL HEURISTIC</text>
  <g font-family="Arial, sans-serif"><rect x="155" y="195" width="360" height="105" rx="18" fill="#fff3ed" stroke="#a9472b" stroke-width="4"/><text x="335" y="238" text-anchor="middle" font-size="30" font-weight="700" fill="#8c351f">ALARM</text><text x="335" y="276" text-anchor="middle" font-size="23" fill="#17365d">initial mobilization</text><rect x="620" y="195" width="360" height="105" rx="18" fill="#eef4fb" stroke="#315b8a" stroke-width="4"/><text x="800" y="238" text-anchor="middle" font-size="30" font-weight="700" fill="#17365d">RESISTANCE</text><text x="800" y="276" text-anchor="middle" font-size="23" fill="#17365d">continued adjustment</text><rect x="1085" y="195" width="360" height="105" rx="18" fill="#f2eff9" stroke="#6751a3" stroke-width="4"/><text x="1265" y="238" text-anchor="middle" font-size="30" font-weight="700" fill="#4f3c86">EXHAUSTION</text><text x="1265" y="274" text-anchor="middle" font-size="20" fill="#17365d">breakdown under extreme demand</text></g>
  <path d="M520 248 H605" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/><path d="M985 248 H1070" stroke="#334155" stroke-width="5" marker-end="url(#arrow)"/>
  <text x="800" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#475569">Useful labels; not fixed stages, one reserve, or a universal depletion curve</text>
  <rect x="90" y="415" width="1420" height="430" rx="26" fill="#fff" stroke="#94a3b8" stroke-width="4"/>
  <text x="800" y="465" text-anchor="middle" font-family="Arial, sans-serif" font-size="32" font-weight="700" fill="#17365d">THE CONTEMPORARY QUESTION: IS THERE ENOUGH RECOVERY?</text>
  <rect x="145" y="510" width="590" height="260" rx="24" fill="#edf7ef" stroke="#2f6f49" stroke-width="4"/><text x="440" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#215b3b">SHORT-TERM MOBILIZATION</text><circle cx="250" cy="650" r="45" fill="#fff3ed" stroke="#a9472b" stroke-width="4"/><text x="250" y="659" text-anchor="middle" font-family="Arial" font-size="25" font-weight="700" fill="#8c351f">ACT</text><path d="M310 650 H420" stroke="#334155" stroke-width="6" marker-end="url(#arrow)"/><circle cx="485" cy="650" r="45" fill="#eef4fb" stroke="#315b8a" stroke-width="4"/><text x="485" y="659" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#17365d">STOP</text><path d="M545 650 H650" stroke="#334155" stroke-width="6" marker-end="url(#arrow)"/><text x="650" y="705" text-anchor="middle" font-family="Arial" font-size="22" font-weight="700" fill="#215b3b">RECOVER</text><text x="440" y="742" text-anchor="middle" font-family="Arial" font-size="22" fill="#475569">Adaptive systems return toward baseline</text>
  <rect x="865" y="510" width="590" height="260" rx="24" fill="#fff3ed" stroke="#a9472b" stroke-width="4"/><text x="1160" y="560" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#8c351f">REPEATED OR UNRESOLVED DEMANDS</text><text x="1160" y="608" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#17365d">inadequate recovery</text><path d="M1010 650 H1290" stroke="#334155" stroke-width="7" stroke-dasharray="14 9" marker-end="url(#arrow)"/><text x="1160" y="705" text-anchor="middle" font-family="Arial, sans-serif" font-size="25" font-weight="700" fill="#8c351f">ALLOSTATIC LOAD</text><text x="1160" y="742" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#475569">immune · cardiovascular · metabolic · sleep · behavior</text>
  <text x="800" y="905" text-anchor="middle" font-family="Arial, sans-serif" font-size="40" font-weight="700" fill="#17365d">Useful in the short run; costly when left running.</text>
</svg>
