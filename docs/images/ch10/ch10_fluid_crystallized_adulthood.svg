<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Different average cognitive trajectories across adulthood</title><desc id="desc">A schematic chart shows some speeded novel-problem abilities declining earlier on average, while accumulated knowledge and expertise often remain stable or increase longer. Wide overlapping bands show substantial individual variation and overlap among age groups. Notes emphasize that aging is a tradeoff rather than uniform decline and that dementia is not ordinary aging.</desc><defs><style>text{font-family:Arial,Helvetica,sans-serif;fill:#18324a}.title{font-size:46px;font-weight:700}.sub{font-size:27px;fill:#56697a}.head{font-size:28px;font-weight:700}.body{font-size:23px;fill:#465d70}.axis{stroke:#334b60;stroke-width:3}.card{fill:#fff;stroke:#c7d5de;stroke-width:3}.fluid{stroke:#39738f;fill:none;stroke-width:9}.crystal{stroke:#66884e;fill:none;stroke-width:9}.bf{fill:#a9cbd9;opacity:.42}.bc{fill:#bcd5ac;opacity:.44}.note{font-size:25px;font-weight:700}</style><filter id="s"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".12"/></filter></defs><rect width="1600" height="900" fill="#fbfcfa"/><text class="title" x="800" y="68" text-anchor="middle">Cognitive aging involves different average trajectories</text><text class="sub" x="800" y="108" text-anchor="middle">Group patterns overlap; no curve predicts one person’s path</text><g filter="url(#s)"><rect class="card" x="90" y="150" width="1420" height="590" rx="28"/></g><path class="axis" d="M190 640H1410M190 640V245"/><text class="body" x="800" y="700" text-anchor="middle">early adulthood → midlife → later adulthood</text><text class="body" x="120" y="445" transform="rotate(-90 120 445)" text-anchor="middle">relative performance</text>
  <path class="bf" d="M190 285C430 245 690 335 920 410C1120 475 1280 525 1410 550L1410 665C1250 640 1080 600 895 550C670 490 430 405 190 425Z"/><path class="fluid" d="M190 350C430 305 690 395 910 470C1110 535 1280 575 1410 600"/><path class="bc" d="M190 560C430 460 660 355 900 310C1110 270 1280 300 1410 340L1410 470C1270 440 1110 420 910 445C660 480 430 585 190 690Z"/><path class="crystal" d="M190 625C430 520 660 415 900 370C1110 330 1280 365 1410 405"/>
  <rect x="245" y="205" width="500" height="95" rx="22" fill="#eef6fa"/><text class="head" x="280" y="242" fill="#39738f">Speeded novel-problem abilities</text><text class="body" x="280" y="278">often decline earlier on average</text><rect x="855" y="205" width="500" height="95" rx="22" fill="#f0f6ec"/><text class="head" x="890" y="242" fill="#66884e">Knowledge and expertise</text><text class="body" x="890" y="278">often remain stable or increase longer</text>
  <text class="body" x="800" y="725" text-anchor="middle">Wide bands show individual variation and overlap among age groups</text><g><rect x="110" y="780" width="430" height="68" rx="28" fill="#eef4f6"/><text class="note" x="325" y="823" text-anchor="middle">Aging is a tradeoff</text><rect x="585" y="780" width="430" height="68" rx="28" fill="#eef4f6"/><text class="note" x="800" y="823" text-anchor="middle">Variation is substantial</text><rect x="1060" y="780" width="430" height="68" rx="28" fill="#f8eee9"/><text class="note" x="1275" y="823" text-anchor="middle">Dementia is not ordinary aging</text></g></svg>
