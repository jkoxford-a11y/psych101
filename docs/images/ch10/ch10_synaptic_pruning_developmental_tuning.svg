<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Selective stabilization tunes developing neural networks</title>
  <desc id="desc">A three-stage sequence begins with many initial neural connections. In the middle stage, patterns of activity together with biological maturation stabilize some pathways. In the final stage, stabilized pathways remain prominent while less-stabilized connections weaken, producing a more tuned network.</desc>
  <defs><style>
    text{font-family:Arial,Helvetica,sans-serif;fill:#18324a}.title{font-size:48px;font-weight:700}.sub{font-size:27px;fill:#56697a}.num{font-size:25px;font-weight:700;fill:#fff}.head{font-size:30px;font-weight:700}.body{font-size:23px;fill:#465d70}.caption{font-size:20px;fill:#465d70}.take{font-size:28px;font-weight:700}.card{fill:#fff;stroke:#c7d5de;stroke-width:3}.weak{stroke:#c8d2d9;stroke-width:4;fill:none}.strong{stroke:#2f7991;stroke-width:9;fill:none}.mid{stroke:#7c98a8;stroke-width:6;fill:none}.dot{fill:#fff;stroke:#2f7991;stroke-width:5}.arrow{stroke:#6c8798;stroke-width:7;fill:none}
  </style><marker id="a" markerWidth="13" markerHeight="13" refX="11" refY="6.5" orient="auto"><path d="M0 0L13 6.5L0 13Z" fill="#6c8798"/></marker><filter id="s"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".12"/></filter></defs>
  <rect width="1600" height="900" fill="#fbfcfa"/><text class="title" x="800" y="75" text-anchor="middle">Developing networks are selectively stabilized and tuned</text><text class="sub" x="800" y="118" text-anchor="middle">Activity matters, but it works together with biological maturation</text>
  <g filter="url(#s)"><rect class="card" x="65" y="180" width="430" height="520" rx="28"/><rect class="card" x="585" y="180" width="430" height="520" rx="28"/><rect class="card" x="1105" y="180" width="430" height="520" rx="28"/></g>
  <g><circle cx="120" cy="235" r="28" fill="#bd7429"/><text class="num" x="120" y="244" text-anchor="middle">1</text><text class="head" x="165" y="245">Many initial connections</text>
    <g transform="translate(105 300)"><path class="mid" d="M70 75L205 35M70 75l150 105M70 75l35 205m100-245 115 95m-100 50 100-50m-215 150 115-30m-10-170 10 170m0 0 90 85"/><circle class="dot" cx="70" cy="75" r="18"/><circle class="dot" cx="205" cy="35" r="18"/><circle class="dot" cx="220" cy="180" r="18"/><circle class="dot" cx="105" cy="280" r="18"/><circle class="dot" cx="320" cy="130" r="18"/><circle class="dot" cx="220" cy="250" r="18"/><circle class="dot" cx="310" cy="335" r="18"/></g>
    <text class="caption" x="280" y="635" text-anchor="middle">Development produces many</text><text class="caption" x="280" y="663" text-anchor="middle">possible pathways</text></g>
  <path class="arrow" marker-end="url(#a)" d="M505 435H565"/>
  <g><circle cx="640" cy="235" r="28" fill="#6c8798"/><text class="num" x="640" y="244" text-anchor="middle">2</text><text class="head" x="685" y="230">Some pathways stabilize</text><text class="body" x="685" y="262">activity + biological maturation</text>
    <g transform="translate(625 300)"><path class="weak" d="M70 75L205 35M70 75l150 105M70 75l35 205m100-245 115 95m-100 50 100-50m-215 150 115-30m-10-170 10 170m0 0 90 85"/><path class="strong" d="M70 75l150 105 100-50M220 180l0 70 90 85"/><circle class="dot" cx="70" cy="75" r="18"/><circle class="dot" cx="205" cy="35" r="18"/><circle class="dot" cx="220" cy="180" r="18"/><circle class="dot" cx="105" cy="280" r="18"/><circle class="dot" cx="320" cy="130" r="18"/><circle class="dot" cx="220" cy="250" r="18"/><circle class="dot" cx="310" cy="335" r="18"/></g>
    <text class="caption" x="800" y="635" text-anchor="middle">Repeated patterns help stabilize</text><text class="caption" x="800" y="663" text-anchor="middle">selected routes</text></g>
  <path class="arrow" marker-end="url(#a)" d="M1025 435H1085"/>
  <g><circle cx="1160" cy="235" r="28" fill="#2f7991"/><text class="num" x="1160" y="244" text-anchor="middle">3</text><text class="head" x="1205" y="230">A more tuned network</text><text class="body" x="1205" y="262">other connections weaken</text>
    <g transform="translate(1145 300)"><path class="weak" d="M70 75L205 35M70 75l35 205m100-245 115 95m-215 150 115-30" opacity=".35"/><path class="strong" d="M70 75l150 105 100-50M220 180l0 70 90 85"/><circle class="dot" cx="70" cy="75" r="18"/><circle class="dot" cx="220" cy="180" r="18"/><circle class="dot" cx="320" cy="130" r="18"/><circle class="dot" cx="220" cy="250" r="18"/><circle class="dot" cx="310" cy="335" r="18"/></g>
    <text class="caption" x="1320" y="635" text-anchor="middle">Tuning changes efficiency</text><text class="caption" x="1320" y="663" text-anchor="middle">and flexibility</text></g>
  <rect x="185" y="760" width="1230" height="78" rx="30" fill="#edf5f2" stroke="#a9c7b8" stroke-width="3"/><text class="take" x="800" y="810" text-anchor="middle">Pruning is selective development—not experience acting alone and not literal “use it or lose it.”</text>
</svg>
