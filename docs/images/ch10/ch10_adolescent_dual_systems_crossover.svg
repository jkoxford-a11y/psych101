<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">A schematic average model of adolescent development</title><desc id="desc">A chart shows reward and novelty sensitivity changing earlier on average while regulatory coordination develops over a longer period. Broad shaded bands indicate wide individual variation. A second panel shows peers, stakes, context, and opportunity shaping whether motivation becomes exploration, learning, or risk. A note says there is no single age when the brain becomes finished.</desc>
  <defs><style>text{font-family:Arial,Helvetica,sans-serif;fill:#18324a}.title{font-size:46px;font-weight:700}.sub{font-size:27px;fill:#56697a}.head{font-size:28px;font-weight:700}.body{font-size:23px;fill:#465d70}.axis{stroke:#334b60;stroke-width:3}.card{fill:#fff;stroke:#c7d5de;stroke-width:3}.reward{stroke:#c65f4b;fill:none;stroke-width:9}.control{stroke:#39738f;fill:none;stroke-width:9}.band-r{fill:#e9b8ad;opacity:.38}.band-c{fill:#a9cbd9;opacity:.42}.pill{font-size:24px;font-weight:700}.note{font-size:26px;font-weight:700}</style><filter id="s"><feDropShadow dx="0" dy="5" stdDeviation="7" flood-opacity=".12"/></filter></defs>
  <rect width="1600" height="900" fill="#fbfcfa"/><text class="title" x="800" y="68" text-anchor="middle">Adolescent development: average tendencies, wide variation</text><text class="sub" x="800" y="108" text-anchor="middle">One useful model—not a timetable for every person</text>
  <g filter="url(#s)"><rect class="card" x="90" y="150" width="940" height="610" rx="28"/><rect class="card" x="1070" y="150" width="440" height="610" rx="28"/></g>
  <text class="head" x="145" y="205">Schematic group averages</text><path class="axis" d="M170 650H950M170 650V260"/><text class="body" x="560" y="710" text-anchor="middle">early adolescence → later adolescence → young adulthood</text><text class="body" x="105" y="455" transform="rotate(-90 105 455)" text-anchor="middle">relative tendency</text>
  <path class="band-r" d="M170 570C330 300 470 230 610 260C740 285 850 390 950 450L950 535C830 480 720 390 605 365C470 340 330 415 170 650Z"/><path class="reward" d="M170 610C330 350 470 285 610 310C740 335 850 430 950 490"/>
  <path class="band-c" d="M170 650C360 620 520 560 670 470C800 390 890 325 950 280L950 375C870 420 790 475 675 540C520 625 360 675 170 700Z"/><path class="control" d="M170 675C360 650 520 590 670 505C800 430 890 365 950 325"/>
  <text class="head" x="565" y="278" fill="#c65f4b">Reward / novelty sensitivity</text><text class="head" x="585" y="610" fill="#39738f">Regulatory coordination</text><text class="body" x="280" y="735">Shaded bands = substantial individual variation</text>
  <text class="head" x="1290" y="205" text-anchor="middle">Behavior also depends on</text>
  <g><rect x="1120" y="255" width="150" height="70" rx="24" fill="#f5e6f7"/><text class="pill" x="1195" y="299" text-anchor="middle">Peers</text><rect x="1310" y="255" width="150" height="70" rx="24" fill="#fff0df"/><text class="pill" x="1385" y="299" text-anchor="middle">Stakes</text><rect x="1120" y="355" width="150" height="70" rx="24" fill="#e7f1fb"/><text class="pill" x="1195" y="399" text-anchor="middle">Context</text><rect x="1310" y="355" width="150" height="70" rx="24" fill="#e9f4e4"/><text class="pill" x="1385" y="399" text-anchor="middle">Opportunity</text></g>
  <path d="M1290 455v70" stroke="#6c8798" stroke-width="6"/><path d="M1280 515l10 18 10-18" fill="none" stroke="#6c8798" stroke-width="6"/>
  <text class="body" x="1290" y="575" text-anchor="middle">The same motivation can support</text><text class="head" x="1290" y="620" text-anchor="middle">exploration · learning · risk</text><text class="body" x="1290" y="675" text-anchor="middle">depending on the situation</text>
  <rect x="215" y="795" width="1170" height="62" rx="31" fill="#eef4f6" stroke="#c7d5de" stroke-width="2"/><text class="note" x="800" y="835" text-anchor="middle">There is no single age at which every brain or regulatory skill becomes “finished.”</text>
</svg>
